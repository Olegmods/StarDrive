name: Notify Discord on Release

# Fires when a draft release is published (clicking "Publish release" in the GitHub UI).
# Publishing a draft is the moment the tag actually lands in the repo, so this also covers
# the "tag created" notification — drafts don't push the tag until publish.
#
# Direct `git push --tags` of a tag created outside the release flow won't trigger this
# workflow. If that ever becomes a use case, add a `push: tags: ['*']` trigger.
#
# Latest-release gate: only fires the Discord notification when the published release
# is also flagged "Set as latest release" in the GitHub UI. This lets maintainers
# publish test/staged patches as not-latest without spamming the channel.
# The release webhook payload has no `is_latest` field — `make_latest` is write-only —
# so we compare the published release's id against /releases/latest after publish.

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check if release is flagged latest
        id: check_latest
        shell: bash
        env:
          GH_TOKEN:   ${{ github.token }}
          REPO:       ${{ github.repository }}
          RELEASE_ID: ${{ github.event.release.id }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          # Pre-releases are never "latest" by GitHub's rules; skip immediately.
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Release $RELEASE_TAG is a pre-release; skipping Discord notification"
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_ID=$(gh api "/repos/$REPO/releases/latest" --jq .id 2>/dev/null || echo "")
          if [ -z "$LATEST_ID" ]; then
            echo "No 'latest' release found on $REPO; skipping Discord notification"
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$LATEST_ID" != "$RELEASE_ID" ]; then
            echo "Release id=$RELEASE_ID ($RELEASE_TAG) is published but NOT flagged 'Set as latest' (latest id=$LATEST_ID); skipping Discord notification"
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Release $RELEASE_TAG matches /releases/latest; proceeding to Discord notification"
          echo "is_latest=true" >> "$GITHUB_OUTPUT"

      - name: Send Discord webhook
        if: steps.check_latest.outputs.is_latest == 'true'
        shell: bash
        env:
          WEBHOOK_URL:  ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG:  ${{ github.event.release.tag_name }}
          RELEASE_URL:  ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          ACTOR:        ${{ github.event.release.author.login }}
          REPO:         ${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL secret not set; skipping notification"
            exit 0
          fi

          # Discord embed description has a 4096 char limit; truncate body just in case.
          BODY_TRIMMED=$(printf '%s' "$RELEASE_BODY" | head -c 1500)

          # Build payload with jq so quoting/escaping is handled correctly (the legacy
          # AppVeyor PowerShell webhook tripped on this — `Invoke-RestMethod : The request
          # body contains invalid JSON` in build 15118).
          PAYLOAD=$(jq -n \
            --arg name  "$RELEASE_NAME" \
            --arg tag   "$RELEASE_TAG" \
            --arg url   "$RELEASE_URL" \
            --arg body  "$BODY_TRIMMED" \
            --arg actor "$ACTOR" \
            --arg repo  "$REPO" \
            '{
              username: "GitHub Releases",
              embeds: [{
                title:       $name,
                url:         $url,
                color:       3447003,
                description: ("New tag `" + $tag + "` published in " + $repo + " by " + $actor + "\n\n" + $body),
                fields: [
                  { name: "Tag",  value: $tag,   inline: true },
                  { name: "Repo", value: $repo,  inline: true },
                  { name: "By",   value: $actor, inline: true }
                ]
              }]
            }')

          curl -sS -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$WEBHOOK_URL"
          echo "Discord release notification sent for $RELEASE_TAG"
