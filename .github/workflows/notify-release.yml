name: Notify Discord on Release

# Fires when a draft release is published (clicking "Publish release" in the GitHub UI).
# Publishing a draft is the moment the tag actually lands in the repo, so this also covers
# the "tag created" notification — drafts don't push the tag until publish.
#
# Direct `git push --tags` of a tag created outside the release flow won't trigger this
# workflow. If that ever becomes a use case, add a `push: tags: ['*']` trigger.
#
# Pre-release gate: the Discord notification fires whenever a release is published
# UNLESS the pre-release flag is set. Rationale (Jupiter 1.60+ semantics):
# AutoUpdateChecker scans the full /releases array via TrySelectMaxVersionRelease,
# not /releases/latest — so any non-pre-release patch auto-distributes to users
# regardless of whether it's flagged "Set as latest". If users are getting the
# patch, the Discord channel should know about it. Conversely, pre-release
# patches are skipped by TrySelectMaxVersionRelease (they don't auto-distribute),
# so the Discord channel doesn't need to know about them either — those are for
# manual installation by testers from the Releases page.
#
# "Set as latest" no longer gates this workflow. It still controls /releases/latest
# (used by the Mars 1.51 in-line patch flow), bold-latest badging on the Releases
# page, and the order of `gh release list` output — but not Discord announcements.

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check if release is a pre-release
        id: check_prerelease
        shell: bash
        env:
          RELEASE_TAG:   ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Release $RELEASE_TAG is a pre-release; skipping Discord notification (testers install manually from the Releases page)"
            echo "should_notify=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $RELEASE_TAG is not a pre-release; proceeding to Discord notification"
            echo "should_notify=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord webhook
        if: steps.check_prerelease.outputs.should_notify == 'true'
        shell: bash
        env:
          WEBHOOK_URL:  ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG:  ${{ github.event.release.tag_name }}
          RELEASE_URL:  ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          ACTOR:        ${{ github.event.release.author.login }}
          REPO:         ${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL secret not set; skipping notification"
            exit 0
          fi

          # Discord embed description has a 4096 char limit; truncate body just in case.
          BODY_TRIMMED=$(printf '%s' "$RELEASE_BODY" | head -c 1500)

          # Build payload with jq so quoting/escaping is handled correctly (the legacy
          # AppVeyor PowerShell webhook tripped on this — `Invoke-RestMethod : The request
          # body contains invalid JSON` in build 15118).
          PAYLOAD=$(jq -n \
            --arg name  "$RELEASE_NAME" \
            --arg tag   "$RELEASE_TAG" \
            --arg url   "$RELEASE_URL" \
            --arg body  "$BODY_TRIMMED" \
            --arg actor "$ACTOR" \
            --arg repo  "$REPO" \
            '{
              username: "GitHub Releases",
              embeds: [{
                title:       $name,
                url:         $url,
                color:       3447003,
                description: ("New tag `" + $tag + "` published in " + $repo + " by " + $actor + "\n\n" + $body),
                fields: [
                  { name: "Tag",  value: $tag,   inline: true },
                  { name: "Repo", value: $repo,  inline: true },
                  { name: "By",   value: $actor, inline: true }
                ]
              }]
            }')

          curl -sS -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$WEBHOOK_URL"
          echo "Discord release notification sent for $RELEASE_TAG"
