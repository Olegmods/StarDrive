      #     & $vstest $dll '/Settings:unittests.runsettings' '/Logger:console;verbosity=normal'
      #     if ($LASTEXITCODE -ne 0) { throw "vstest.console failed with exit $LASTEXITCODE" }

      - name: Build patch artefacts (ZIP + NSIS)
        env:
          APPVEYOR_BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          py -3 Deploy/MakeInstaller.py --root_dir=. --patch --type=zip
          py -3 Deploy/MakeInstaller.py --root_dir=. --patch --type=nsis

      - name: List produced artefacts
        shell: pwsh
        run: Get-ChildItem -Path Deploy/upload -File | Select-Object Name, Length

      - name: Generate commit summary since previous patch tag
        id: summary
        shell: pwsh
        run: |
          $codename = $env:CODENAME.ToLower()
          $prev = git tag --list "$codename-patch-*" --sort=-v:refname | Select-Object -First 1
          if ($prev) {
            Write-Host "Previous tag: $prev"
            $log = git log "$prev..HEAD" --oneline --no-merges
          } else {
            Write-Host "No previous patch tag; falling back to last 20 commits"
            $log = git log -20 --oneline --no-merges
          }
          if (-not $log) { $log = "_(no new commits since previous patch)_" }

          $delim = "EOF_$([guid]::NewGuid().ToString('N'))"
          "summary<<$delim" >> $env:GITHUB_OUTPUT
          $log               >> $env:GITHUB_OUTPUT
          $delim             >> $env:GITHUB_OUTPUT

      # Explicit gate: do NOT create a release if any prior step (build, tests,
      # MakeInstaller) failed. This is also GHA's default for steps with no `if:`
      # condition, but stating it here protects against future edits that might
      # add `continue-on-error: true` to a prior step and silently let a broken
      # build through to a release.
      - name: Create draft GitHub release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag    = '${{ steps.version.outputs.tag }}'
          $title  = '${{ steps.version.outputs.title }}'
          $body   = @"
          ## Changes since previous patch

          ${{ steps.summary.outputs.summary }}
          "@
          $bodyFile = Join-Path $env:RUNNER_TEMP "release-notes.md"
          Set-Content -Path $bodyFile -Value $body -Encoding utf8

          $assets = Get-ChildItem -Path Deploy/upload -File | ForEach-Object FullName
          Write-Host "Creating draft release $tag with $($assets.Count) asset(s)"

          $args = @(
            'release', 'create', $tag,
            '--draft',
            '--title',     $title,
            '--target',    '${{ github.sha }}',
            '--notes-file', $bodyFile
          ) + $assets

          & gh @args
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed with exit $LASTEXITCODE" }

      - name: Notify Discord (build status)
        if: always()
        shell: pwsh
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS:      ${{ job.status }}
          VERSION:     ${{ steps.version.outputs.version }}
          TAG:         ${{ steps.version.outputs.tag }}
          RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO:        ${{ github.repository }}
          BRANCH:      ${{ github.ref_name }}
          COMMIT_SHA:  ${{ github.sha }}
          ACTOR:       ${{ github.actor }}
        run: |
          if (-not $env:WEBHOOK_URL) {
            Write-Host "DISCORD_WEBHOOK_URL secret not set; skipping Discord notification"
            exit 0
          }

          # Discord embed colors: green/red/gray for success/failure/cancelled
          $color = switch ($env:STATUS) {
            'success'   { 3066993 }
            'failure'   { 15158332 }
            'cancelled' { 9807270 }
            default     { 9807270 }
          }
          $statusUpper = $env:STATUS.ToUpper()
          $shortSha    = $env:COMMIT_SHA.Substring(0, 7)
          $title       = if ($env:VERSION) { "${env:CODENAME} Patch v$($env:VERSION) - $statusUpper" } else { "Patch Build - $statusUpper" }

          $payload = @{
            username = 'GitHub Actions'
            embeds   = @(@{
              title       = $title
              url         = $env:RUN_URL
              color       = $color
              description = "Status: **$statusUpper**"
              fields      = @(
                @{ name = 'Repository'; value = $env:REPO;   inline = $true }
                @{ name = 'Branch';     value = $env:BRANCH; inline = $true }
                @{ name = 'Commit';     value = $shortSha;   inline = $true }
                @{ name = 'Tag';        value = $(if ($env:TAG) { $env:TAG } else { '_(not assigned)_' }); inline = $true }
                @{ name = 'Triggered by'; value = $env:ACTOR; inline = $true }
              )
            })
          } | ConvertTo-Json -Depth 6 -Compress

          try {
            Invoke-RestMethod -Uri $env:WEBHOOK_URL -Method Post -ContentType 'application/json' -Body $payload | Out-Null
            Write-Host "Discord notification sent ($statusUpper)"
          } catch {
            Write-Host "Discord webhook failed: $($_.Exception.Message)"
            # don't fail the workflow over a notification miss
          }
