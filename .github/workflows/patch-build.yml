      #
      # - name: Run unit tests
      #   # Use vstest.console (not `dotnet test`) — closer to AppVeyor's known-good
      #   # invocation. Either runner hits the OpenUserConfiguration NRE without the
      #   # pre-seed step above; vstest is just the lower-overhead path.
      #   shell: pwsh
      #   run: |
      #     $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
      #     if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }
