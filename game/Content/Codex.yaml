# Codex content tree. String content lives in GameText.yaml (token IDs 100000+).
# GameText NameIds are derived from UID by convention via CodexEntry.ResolveDefaults():
#   TitleId     = "Codex" + PascalCase(UID)
#   ShortDescId = TitleId + "Short"
#   TextId      = TitleId + "Text"
# Override any of the three explicitly on a per-entry basis if you need to.
# Hot-reload: edit and re-open the codex screen to pick up changes.
#
# YAML note: sequence items must use the dash-on-its-own-line form
# (`-` followed by indented properties). The shorter inline form
# (`- UID: foo`) drops the first key's scalar value in SDUtils' YamlParser
# when followed by additional keys on the next line.

-
  UID: blackbox
  Children:
    -
      UID: blackbox_what_is
    -
      UID: blackbox_current_version
    -
      UID: blackbox_links
    -
      UID: blackbox_support
-
