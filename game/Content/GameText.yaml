ArmorPenetrationEnablesThisWeapon:
 Id: 1830
 ENG: "Armor Penetration enables this weapon to \"bypass\" armor on impact. The number indicates the size of the armor which can be penetrated (or combination of smaller sized armor). Some armor modules might have resistance to Armor Penetration. Golden color means that this value is modified from the original number."
 RUS: "Пробитие брони позволяет этому оружию \"обходить\" броню при попадании. Число это размер брони, которую можно пробить (или комбинацию брони меньшего размера). Некоторые модули брони могут иметь сопротивление к пробитию брони. Золотой цвет означает, что это значение изменено по сравнению с исходным числом."
 UKR: "Бронепробивність дозволяє цій зброї \"обходити\" броню при ударі. Число вказує на розмір броні, яку можна пробити (або комбінацію броні меншого розміру). Деякі модулі броні можуть мати опір до пробиття броні. Золотий колір означає, що це значення було змінено в порівнянні з початковим числом."
 PTB: "A Penetração de Blindagem permite que esta arma \"ignore\" a blindagem no impacto. O número indica o tamanho da blindagem que pode ser penetrada, ou a combinação de blindagens menores. Alguns módulos de blindagem podem ter resistência à Penetração de Blindagem. A cor dourada significa que este valor foi modificado em relação ao número original."
