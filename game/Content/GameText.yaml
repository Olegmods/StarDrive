ThisShipDesignIsInvalid:
 Id: 2049
 ENG: "This ship design is invalid. Every ship requires a command module such as a cockpit, bridge, or combat information center. Additionally, all of the ship's available slots must be filled. "
 RUS: "Этот дизайн корабля некорректен. Каждому кораблю требуется командный модуль, такой как кокпит, мостик или КИЦ. Кроме того, все доступные ячейки корабля должны быть заполнены. "
 SPA: "Este diseño de nave no es válido. Las naves requieren un módulo de mando, como un puente, una cabina o un centro de información de combate. Además, deben llenarse todas las ranuras disponibles de la nave. "
 UKR: "Цей проект корабля є недійсним. Кожному кораблю потрібен командний модуль, такий як кокпіт, місток або бойовий інформаційний центр. Крім того, всі доступні слоти корабля повинні бути заповнені."
 PTB: "Este projeto de nave é inválido. Toda nave exige um módulo de comando, como cockpit, ponte ou centro de informações de combate. Além disso, todos os espaços disponíveis da nave devem estar preenchidos."
TT_Mass:
 Id: 2050
 ENG: "A ship's total mass determines its maneuverability and maximum velocity both at warp and at sublight speeds. Mass cannot be reduced below the ship's size value (the number of module slots)."
 RUS: "Общая масса корабля определяется его маневренностью и максимальной скоростью как в варпе, так и на субсветовых скоростях. Масса не может быть уменьшена ниже значения размера корабля (кол-во ячеек модулей)."
 SPA: "La masa total de una nave es la que determina su maniobrabilidad y máximas velocidades tanto por encima como por debajo de la luz. La masa no puede reducirse más del valor del tamaño de la nave (el número de ranuras modulares)."
 UKR: "Загальна маса корабля визначає його маневреність і максимальну швидкість як у викривленні, так і на досвітлових швидкостях. Маса не може бути зменшена нижче значення розміру корабля (кількості модульних слотів)."
 PTB: "A massa total de uma nave determina sua manobrabilidade e velocidade máxima tanto em dobra quanto em velocidades subluz. A massa não pode ser reduzida abaixo do valor de tamanho da nave (o número de espaços de módulo)."
AModulesHealthRepresentsHow:
 Id: 2051
 ENG: "A module's health represents how much damage it can take before being destroyed"
 RUS: "Здоровье модуля определяет, сколько урона он может получить, прежде чем будет уничтожен"
 SPA: "La salud de un módulo representa el daño que puede encajar antes de quedar destruido"
 UKR: "Здоров'я модуля показує, якої шкоди він може зазнати, перш ніж буде знищений"
 PTB: "A vida de um módulo representa quanto dano ele pode sofrer antes de ser destruído"
IndicatesHowMuchPowerThis:
 Id: 2052
 ENG: "Indicates how much power this module adds to or subtracts from a ship's power stores per second. Ships without power cannot warp or fire energy-based weaponry."
 RUS: "Указывает, сколько энергии этот модуль добавляет или потребляет в секунду из энергоресурсов корабля. Корабли, запас энергии которых истощен, не могут перемещаться в варпе или вести огонь из энергетического оружия."
 SPA: "Indica cuánta potencia suma o resta este módulo a las reservas de energía de una nave por segundo. Las naves sin energía no pueden viajar a velocidad estelar supraluminal ni disparar armas de energía."
 UKR: "Показує, скільки енергії цей модуль додає або віднімає від запасів енергії корабля за секунду. Кораблі без енергії не можуть викривлятися або стріляти з енергетичної зброї."
 PTB: "Indica quanta energia este módulo adiciona ou subtrai das reservas de energia de uma nave por segundo. Naves sem energia não podem entrar em dobra nem disparar armamento baseado em energia."
IndicatesTheMaximumRangeOf:
 Id: 2053
 ENG: "Indicates the maximum range of this weapon"
 RUS: "Указывает максимальную дальность для этого оружия"
 SPA: "Indica el alcance máximo del arma"
 UKR: "Вказує на максимальну дальність стрільби цієї зброї"
 PTB: "Indica o alcance máximo desta arma"
IndicatesTheMaximumAmountOf:
 Id: 2054
 ENG: "Indicates the maximum amount of damage inflicted by a projectile fired from this weapon. Explosive weapons inflict this damage in a radius. "
 RUS: "Указывает максимальный урон, наносимый снарядом, выпущенным из этого оружия. Взрывчатое оружие наносит этот урон в определенном радиусе."
 SPA: "Indica la cantidad máxima de daño que inflige un proyectil disparado con esta arma. Las armas explosivas causan ese mismo daño en un radio. "
 UKR: "Показує максимальну кількість шкоди, що наноситься снарядом, випущеним з цієї зброї. Вибухова зброя наносить цю шкоду в радіусі."
 PTB: "Indica a quantidade máxima de dano causada por um projétil disparado por esta arma. Armas explosivas causam esse dano em um raio."
IndicatesTheProductionCostOf:
 Id: 2055
 ENG: "Indicates the production cost of this module"
 RUS: "Указывает стоимость производства этого модуля"
 SPA: "Indica el coste de producción de este módulo"
 UKR: "Вказує на вартість виробництва цього модуля"
 PTB: "Indica o custo de produção deste módulo"
IndicatesTheDistanceAProjectile:
 Id: 2056
 ENG: "Indicates the distance a projectile fired from this weapon will travel in one second"
 RUS: "Указывает расстояние,которое пролетает снаряд, выпущенный из этого оружия, за одну секунду"
 SPA: "Indica la distancia que recorrerá en un segundo un proyectil disparado con esta arma"
 UKR: "Показує відстань, яку пройде снаряд, випущений з цієї зброї, за одну секунду"
 PTB: "Indica a distância que um projétil disparado por esta arma viajará em um segundo"
IndicatesTheMaximumDamagePer:
 Id: 2057
 ENG: "Indicates the maximum damage per second that this weapon can inflict based on its fire rate and damage statistics"
 RUS: "Указывает максимальный урон в секунду, который может нанести это оружие в соответствии с его скорострельностью и статистикой по урону"
 SPA: "Indica el daño máximo por segundo que causará esta arma basándose en su cadencia de disparo y las estadísticas de daño"
 UKR: "Показує максимальну шкоду за секунду, яку може завдати ця зброя, виходячи з її швидкості стрільби та статистики шкоди"
 PTB: "Indica o dano máximo por segundo que esta arma pode causar com base em sua cadência de tiro e estatísticas de dano"
TheAmountOfPowerThis:
 Id: 2058
 ENG: "The amount of power this beam weapon will drain per second from its ship's power stores while the beam is firing. Beam weapons fire in 2 second bursts."
 RUS: "Количество энергии, которое это лучевое оружие выкачает за секунду из запаса энергии вражеского корабля, пока луч активен. Лучевое оружие стреляет импульсами по 2 секунды."
 SPA: "Indica la cantidad de energía de las reservas de la nave que esta arma de rayos consumirá por segundo. Las armas de rayos disparan en ráfagas de 2 segundos."
 UKR: "Кількість енергії, яку ця променева зброя буде витрачати за секунду з акумуляторів корабля під час стрільби променем. Променева зброя стріляє серіями по 2 секунди."
 PTB: "A quantidade de energia que esta arma de feixe drenará por segundo das reservas de energia da nave enquanto o feixe estiver disparando. Armas de feixe disparam em rajadas de 2 segundos."
AWeaponMayOnlyFire:
 Id: 2059
 ENG: "A weapon may only fire at targets that are inside its firing arc. This statistic indicates the width of that arc in degrees."
 RUS: "Любое оружие может атаковать только цели, находящиеся в его секторе обстрела. Этот параметр указывает ширину этого сектора в градусах."
 SPA: "Un arma solo puede disparar a objetivos que estén dentro de su arco de disparo. Esta estadística indica la anchura en grados de dicho arco."
 UKR: "Зброя може стріляти лише по цілях, які знаходяться в межах її дуги обстрілу. Ця статистика показує ширину цієї дуги у градусах."
 PTB: "Uma arma só pode disparar contra alvos que estejam dentro de seu arco de disparo. Esta estatística indica a largura desse arco em graus."
IndicatesTheAmountOfOrdnance:
 Id: 2060
 ENG: "Indicates the amount of ordnance required to fire this weapon once."
 RUS: "Указывает количество боеприпасов, требуемых для осуществления одного выстрела из этого оружия."
 SPA: "Indica la cantidad de munición necesaria para disparar esta arma una vez."
 UKR: "Показує кількість боєприпасів, необхідних для одного пострілу з цієї зброї."
 PTB: "Indica a quantidade de munição necessária para disparar esta arma uma vez."
IndicatesTheAmountOfPower:
 Id: 2061
 ENG: "Indicates the amount of power required to fire this weapon once."
 RUS: "Указывает количество энергии, требуемой для осуществления одного выстрела из этого оружия."
 SPA: "Indica la cantidad de energía necesaria para disparar esta arma una vez."
 UKR: "Показує кількість енергії, необхідної для одного пострілу з цієї зброї."
 PTB: "Indica a quantidade de energia necessária para disparar esta arma uma vez."
IndicatesTheAmountOfThrust:
 Id: 2062
 ENG: "Indicates the amount of thrust this ship module adds for sublight purposes"
 RUS: "Указывает количество тяги, которое этот модуль добавляет при движении с субсветовой скоростью"
 SPA: "Indica la cantidad de propulsión que añade este módulo a la velocidad infraluminal"
 UKR: "Показує кількість тяги, яку цей корабельний модуль додає для досвітлових цілей"
 PTB: "Indica a quantidade de impulso que este módulo de nave adiciona para fins subluz"
IndicatesTheAmountOfThrust2:
 Id: 2063
 ENG: "Indicates the amount of thrust this ship module adds for warp speed purposes"
 RUS: "Указывает количество тяги, которое этот модуль добавляет при движении в варпе"
 SPA: "Indica la cantidad de propulsión que añade este módulo a la velocidad supraluminal"
 UKR: "Вказує на кількість тяги, яку цей корабельний модуль додає до швидкості викривлення"
 PTB: "Indica a quantidade de impulso que este módulo de nave adiciona para fins de velocidade de dobra"
Warp:
 Id: 2064
 ENG: "Warp"
 RUS: "Варп"
 SPA: "Velocidad estelar supraluminal"
 UKR: "Викривлення"
 PTB: "Dobra"
IndicatesTheHitpointsOfThis:
 Id: 2065
 ENG: "Indicates the hitpoints of this shield. If the title is Golden, it indicates that this shield is being amplified by Shield Amplifiers within your ship."
 RUS: "Указывает кол-во ОП щита"
 SPA: "Indica los puntos de vida del escudo"
 UKR: "Вказує на кількість хитпоінтів цього щита. Якщо заголовок золотий, це означає, що цей щит підсилюється підсилювачами щита на вашому кораблі."
 PTB: "Indica os pontos de vida deste escudo. Se o título estiver dourado, isso indica que este escudo está sendo amplificado por Amplificadores de Escudo dentro da sua nave."
IndicatesTheProtectiveRadiusOf:
 Id: 2066
 ENG: "Indicates the protective radius of this shield"
 RUS: "Указывает радиус защиты щита"
 SPA: "Indica el radio de protección del escudo"
 UKR: "Вказує на захисний радіус цього щита"
 PTB: "Indica o raio de proteção deste escudo"
IndicatesTheNumberOfHitpoints:
 Id: 2067
 ENG: "Indicates the number of hitpoints that this shield will regenerate per second. Shields will automatically begin to regenerate so long as they have not taken any hits within the past few seconds."
 RUS: "Указывает кол-во ОП, которые щит будет восстанавливать в секунду. Щиты автоматически восстанавливают ресурс, если они не получали урона в последние несколько секунд."
 SPA: "Indica el número de puntos de vida que este escudo regenerará por segundo. Los escudos comenzarán a regenerarse automáticamente siempre que no hayan recibido impactos en los últimos segundos."
 UKR: "Вказує на кількість хитпоінтів, які цей щит буде регенерувати за секунду. Щити автоматично починають регенерувати, якщо вони не отримали жодного удару за останні кілька секунд."
 PTB: "Indica o número de pontos de vida que este escudo regenerará por segundo. Escudos começarão a se regenerar automaticamente desde que não tenham sofrido acertos nos últimos segundos."
IndicatesTheAdditionalSensorRange:
 Id: 2068
 ENG: "Indicates the additional sensor range added by this module. Sensor modules do not provide cumulative bonuses - only the highest bonus will apply."
 RUS: "Указывает дополнительный радиус сенсора, добавленный за счет этого модуля. Эффекты сенсорных модулей не складываются - всегда используется самый мощный из них."
 SPA: "Indica el alcance sensorial extra que añade este módulo. Los módulos de sensores no acumulan bonificaciones; solo se aplica la bonificación más alta."
 UKR: "Показує додатковий діапазон датчиків, який додається цим модулем. Модулі датчиків не дають кумулятивних бонусів - застосовується лише найвищий бонус."
 PTB: "Indica o alcance adicional de sensores adicionado por este módulo. Módulos de sensores não fornecem bônus cumulativos; apenas o maior bônus será aplicado."
IndicatesTheBonusToOutofcombat:
 Id: 2069
 ENG: "Indicates the bonus to out-of-combat repair rate for the ship. Repair rate bonuses are cumulative and indicate the amount that each ship module will heal per second. "
 RUS: "Указывает бонус к скорости внебоевого ремонта данного корабля. Бонусы к скорости ремонта складываются и указывают количество ОП, которые каждый корабельный модуль будет восстанавливать за секунду."
 SPA: "Indica la bonificación del ritmo de reparación de una nave que no esté en combate. Las bonificaciones al ritmo de reparación son acumulativas e indican la cantidad que cada módulo de la nave puede reparar por segundo. "
 UKR: "Показує бонус до швидкості небойового ремонту корабля. Бонуси до швидкості ремонту є кумулятивними і вказують на кількість, яку кожен модуль корабля вилікує за секунду."
 PTB: "Indica o bônus à taxa de reparo fora de combate da nave. Bônus de taxa de reparo são cumulativos e indicam a quantidade que cada módulo da nave curará por segundo."
HangarsAreCapableOfSustaning:
 Id: 2070
 ENG: "Hangars are capable of sustaning a single ship per hangar at a time. If that ship is destroyed, then the hangar goes on cooldown for the amount of time indicated here. When the hangar is off of cooldown, a new ship will be generated and can launch from the hangar."
 RUS: "Ангары могут вмещать единовременно по одному кораблю. Если корабль будет уничтожен, для ангара запустится таймер простоя, указанный здесь. Когда таймер простоя истечет, будет создан новый корабль, который можно будет выпустить из ангара."
 SPA: "Los hangares pueden albergar a una sola nave a la vez. Si esa nave es destruida, el hangar pasa a un estado de recuperación que dura el tiempo indicado aquí. Pasado ese tiempo, el hangar genera una nueva nave lista para volar."
 UKR: "Ангари здатні підтримувати один корабель в ангарі одночасно. Якщо цей корабель знищено, ангар переходить в режим очікування на вказаний тут час. Коли ангар вийде з режиму очікування, буде згенеровано новий корабель, який зможе стартувати з ангару."
 PTB: "Hangares são capazes de sustentar uma única nave por hangar de cada vez. Se essa nave for destruída, o hangar entra em recarga pelo tempo indicado aqui. Quando o hangar sair da recarga, uma nova nave será gerada e poderá ser lançada a partir do hangar."
TT_ProductionCost:
 Id: 2071
 ENG: "Indicates the total production value of this ship design"
 RUS: "Указывает общее кол-во очков производства для этого дизайна корабля"
 SPA: "Indica el valor total de producción de este diseño de nave"
 UKR: "Вказує на загальну вартість виробництва цього дизайну судна"
 PTB: "Indica o valor total de produção deste projeto de nave"
TT_PowerCapacity:
 Id: 2072
 ENG: "Indicates the maximum amount of power that can be stored in this ship's reserves. Red value is an indication that the ship's energy consumption when firing is overwhelming the power reserve, and you need to add more reserves or more reactors."
 RUS: "Указывает максимальное количество энергии, которое может запасти этот корабль"
 SPA: "Indica la cantidad máxima de energía que puede almacenarse en las reservas de esta nave"
 UKR: "Показує максимальну кількість енергії, яка може зберігатися в резервах цього корабля. Червоне значення вказує на те, що споживання енергії кораблем під час стрільби перевищує запас потужності, і вам потрібно додати більше резервів або більше реакторів."
 PTB: "Indica a quantidade máxima de energia que pode ser armazenada nas reservas desta nave. Um valor vermelho indica que o consumo de energia da nave ao disparar está sobrecarregando a reserva de energia, e você precisa adicionar mais reservas ou mais reatores."
TT_PowerRecharge:
 Id: 2073
 ENG: "Indicates the net power flow of this vessel. In most cases, a net positive power flow is an absolute requirement. Otherwise, your ship will immediately begin to lose power and will ultimately be unable to warp or fire energy-based weapons"
 RUS: "Указывает суммарный баланс энергии для этого судна. В большинстве случаев положительный баланс является обязательным требованием - в противном случае корабль сразу начнет терять энергию и в конечном счете не сможет войти в варп или использовать энергетическое оружие."
 SPA: "Indica el flujo neto de energía de esta nave. En la mayoría de casos, es imprescindible que este flujo neto sea positivo. Si no, la nave empezará a perder potencia de inmediato y acabará siendo incapaz de disparar armas de energía o de viajar a velocidad estelar supraluminal"
 UKR: "Вказує на чистий баланс енергії цієї посудини. У більшості випадків позитивний баланс енергії є абсолютною вимогою. В іншому випадку ваш корабель негайно почне втрачати енергію і в кінцевому підсумку буде не в змозі викривлятися або стріляти з енергетичної зброї"
 PTB: "Indica o fluxo líquido de energia desta embarcação. Na maioria dos casos, um fluxo líquido positivo de energia é um requisito absoluto. Caso contrário, sua nave começará imediatamente a perder energia e acabará incapaz de entrar em dobra ou disparar armas baseadas em energia"
TT_RechargeAtWarp:
 Id: 2074
 ENG: "Indicates the net power flow of this vessel when its warp-drive is engaged. A negative value here indicates that the ship will have a limited warp range before it needs to stop and recharge its fuel cells. A positive value indicates that the ship can keep its warp drive engaged indefinitely."
 RUS: "Указывает суммарный баланс энергии для этого судна при активированном варп-драйве. Отрицательное значение означает, что в варпе корабль может пройти только ограниченное расстояние, после чего он вынужден будет остановиться и зарядить свои топливные элементы. Положительное значение означает, что варп-драйв может быть активен сколь угодно долго."
 SPA: "Indica el flujo neto de energía de esta nave al activarse su propulsión estelar supraluminal. Un valor negativo indica que la nave tendrá un alcance estelar supraluminal limitado y deberá detenerse antes a recargar sus células de combustible. Un valor positivo indica que la nave puede mantener indefinidamente su velocidad estelar supraluminal."
 UKR: "Показує чистий баланс енергії цього корабля, коли ввімкнено його двигун викривлення. Від'ємне значення вказує на те, що корабель матиме обмежену дальність польоту, перш ніж йому потрібно буде зупинитися і перезарядити паливні елементи. Позитивне значення вказує на те, що корабель може тримати увімкненим свій варп-привід нескінченно довго."
 PTB: "Indica o fluxo líquido de energia desta embarcação quando seu motor de dobra está acionado. Um valor negativo aqui indica que a nave terá alcance de dobra limitado antes de precisar parar e recarregar suas células de combustível. Um valor positivo indica que a nave pode manter o motor de dobra acionado indefinidamente."
TT_HitPoints:
 Id: 2075
 ENG: "Indicates the total hitpoints of all of the ship's modules combined"
 RUS: "Указывает общее количество ОП всех модулей корабля в сумме"
 SPA: "Indica los puntos de vida totales de todos los módulos de la nave combinados"
 UKR: "Показує загальну кількість хітпоінтів усіх модулів корабля разом узятих"
 PTB: "Indica o total de pontos de vida de todos os módulos da nave combinados"
TT_ShieldPower:
 Id: 2076
 ENG: "Indicates the total hitpoints of all of the ship's shield modules combined, including all Shield Amplifiers. The Color of the title will be Gold if any Shield Amplifiers are installed and effective."
 RUS: "Указывает общее количество ОП всех щитов корабля в сумме"
 SPA: "Indica los puntos de vida totales de todos los módulos de escudos de la nave combinados"
 UKR: "Показує загальну кількість хітпоінтів усіх модулів щита корабля разом узятих, включно з усіма підсилювачами щита. Колір заголовка буде золотим, якщо встановлені та діють підсилювачі щита."
 PTB: "Indica o total de pontos de vida de todos os módulos de escudo da nave combinados, incluindo todos os Amplificadores de Escudo. A cor do título será dourada se algum Amplificador de Escudo estiver instalado e efetivo."
TT_SublightSpeed:
 Id: 2077
 ENG: "Indicates the distance this ship can travel in one second while using its sublight engines"
 RUS: "Указывает расстояние, которое этот корабль может пройти в секунду на субсветовых двигателях."
 SPA: "Indica la distancia que puede recorrer esta nave por segundo usando motores de velocidad infraluminal"
 UKR: "Показує відстань, яку цей корабель може подолати за одну секунду, використовуючи свої досвітлові двигуни"
 PTB: "Indica a distância que esta nave pode viajar em um segundo usando seus motores subluz"
IndicatesTheDistanceThisShip2:
 Id: 2078
 ENG: "Indicates the distance this ship can travel in one second while using its faster than light engines"
 RUS: "Указывает расстояние, которое этот корабль может пройти в секунду на сверхсветовых двигателях."
 SPA: "Indica la distancia que puede recorrer esta nave por segundo usando sus motores de velocidad supraluminal"
 UKR: "Показує відстань, яку цей корабель може подолати за одну секунду, використовуючи двигуни викривлення"
 PTB: "Indica a distância que esta nave pode viajar em um segundo usando seus motores mais rápidos que a luz"
TT_TurnRate:
 Id: 2079
 ENG: "Indicates the number of degrees this ship may rotate in one second"
 RUS: "Указывает количество градусов, на которое этот корабль может повернуться за секунду."
 SPA: "Indica el número de grados que puede girar esta nave por segundo"
 UKR: "Показує кількість градусів, на які може повернутися корабель за одну секунду"
 PTB: "Indica o número de graus que esta nave pode girar em um segundo"
TT_OrdnanceCap:
 Id: 2080
 ENG: "Indicates the maximum amount of multi-purpose ordnance this ship can carry. "
 RUS: "Указывает максимальное количество многоцелевых боеприпасов, которые может вместить этот корабль. "
 SPA: "Indica la cantidad máxima de munición polivalente que puede llevar esta nave. "
 UKR: "Вказує на максимальну кількість багатоцільових боєприпасів, які може нести цей корабель."
 PTB: "Indica a quantidade máxima de munição multiuso que esta nave pode carregar."
TT_CargoSpace:
 Id: 2081
 ENG: "Indicates the total cargo space available on this ship. Each point of cargo space allows this ship to carry a single unit of food or production, or a small amount of colonists."
 RUS: "Указывает общую вместимость трюма этого корабля. Каждая единица вместимости трюма позволяет перевозить одну единицу еды, производства или небольшое количество колонистов."
 SPA: "Indica el espacio de carga total disponible en la nave. Cada punto de espacio de carga le permite transportar una unidad de comida o producción, o un pequeño número de colonos."
 UKR: "Показує загальну кількість вантажного простору, доступного на цьому кораблі. Кожна одиниця вантажного простору дозволяє кораблю перевозити одну одиницю їжі або продукції, або невелику кількість колоністів."
 PTB: "Indica o espaço total de carga disponível nesta nave. Cada ponto de espaço de carga permite que esta nave carregue uma única unidade de alimento ou produção, ou uma pequena quantidade de colonos."
