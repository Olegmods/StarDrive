 PTB: "Envie este Agente em uma missão para roubar uma tecnologia inimiga. O Agente ficará em missão pelo número indicado de turnos. Se tiver sucesso, o Agente roubará dados de uma tecnologia inimiga aleatória, o que ajudará muito nosso progresso na pesquisa da tecnologia relacionada."
