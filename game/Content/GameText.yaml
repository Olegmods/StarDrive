AeroponicsIsTheUseOf:
 Id: 404
 ENG: "Aeroponics is the use of a hydro-atomized spray to deliver nutrients to plants suspended in the air. This technique offers excellent plant growth and eliminates the need for soil while at the same time minimizing pathogen risks."
 RUS: "Аэропоника - это использование атомизированного водяного спрея для доставки питательных веществ растениям, подвешенным в воздухе. Использование этой технологии позволяет растениям расти очень быстро, устраняет необходимость в почве и минимизирует риски заражения микроорганизмами."
 SPA: "La aeroponia es el cultivo en un entorno aéreo de plantas a las que se transmiten los nutrientes por hidroatomización. Con esta técnica, las plantas crecen a un ritmo excelente y se elimina la necesidad de tierra a la vez que se reducen al mínimo los riesgos patógenos."
 UKR: "Аеропоніка - це використання гідроатомізованого розпилювача для доставки поживних речовин рослинам у вигляді завислих у повітрі частинок. Ця технологія забезпечує чудовий ріст рослин і усуває потребу в ґрунті, водночас мінімізуючи ризики зараження патогенами."
 PTB: "Aeroponia é o uso de um spray hidroatomizado para fornecer nutrientes a plantas suspensas no ar. Esta técnica oferece excelente crescimento vegetal e elimina a necessidade de solo, ao mesmo tempo em que minimiza riscos de patógenos."
Biospheres:
 Id: 406
 ENG: "Biospheres"
 RUS: "Биосферы"
 SPA: "Biosferas"
 UKR: "Біосфери"
 PTB: "Biosferas"
BiospheresAreSpecialHighlyAdaptable:
 Id: 407
 ENG: "Biospheres are special, highly adaptable living habitats. Biospheres may only be built on Uninhabitable terrain; in doing so, the terrain becomes habitable and the planet gains max population based on the half of the Colonists per Tile. Economic buildings can thereafter be built underneath the biosphere."
 RUS: "Биосферы - это специальные легкоадаптируемые живые жилища. Биосферы можно строить только на планетах, непригодных для обитания; после их строительства планета становится обитаемой и получает 0,5 к максимальному населению на клетку. Затем внутри биосферы уже можно строить другие объекты."
 SPA: "Las biosferas son hábitats especiales en las que la vida se adapta fácilmente. Solo pueden construirse en terreno no habitable; al hacerlo, dicho terreno pasa a ser habitable y el planeta añade 0,5 a su población máxima. Al amparo de la biosfera pueden construirse edificios económicos."
 UKR: "Біосфери - це особливі, високоадаптивні середовища проживання. Біосфери можна будувати лише на непридатній для життя місцевості; при цьому місцевість стає придатною, а планета отримує максимальну кількість населення, виходячи з половини кількості колоністів на тайл. Після цього під біосферою можна будувати економічні будівлі."
 PTB: "Biosferas são habitats vivos especiais e altamente adaptáveis. Biosferas só podem ser construídas em terreno Inabitável; ao fazer isso, o terreno se torna habitável e o planeta ganha população máxima com base em metade dos Colonos por Espaço. Edifícios econômicos poderão então ser construídos sob a biosfera."
PopulationCapTurnsInhabitableTiles:
 Id: 408
 ENG: "population cap; turns inhabitable tiles into habitable"
 RUS: "Увеличивает максимальное население планеты; делает непригодную для жизни территорию пригодной для заселения"
 SPA: "+0,5 de capacidad de población; vuelve habitables casillas que antes no lo eran"
 UKR: "ліміт населення; перетворює придатні для проживання тайли на придатні для проживання"
