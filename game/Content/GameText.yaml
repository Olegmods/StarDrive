OtherRacesMaySeekTo:
 Id: 2210
 ENG: "Other races may seek to build bigger ships; we seek to build better ships. With this technology our ships will be the mightiest in the galaxy!"
 RUS: "Другие расы, возможно, хотят строить самые большие корабли - но мы хотим строить самые лучшие. С этой технологией наши корабли будут самыми могучими в галактике!"
 SPA: "Otras razas tal vez aspiren a construir naves más grandes, nosotros tratamos de hacerlas mejores. Con esta tecnología, ¡nuestras naves serán las más poderosas de la galaxia!"
 UKR: "Інші раси прагнуть будувати більші кораблі; ми ж прагнемо будувати кращі кораблі. З цією технологією наші кораблі будуть наймогутнішими в галактиці!"
 PTB: "Outras raças podem buscar construir naves maiores; nós buscamos construir naves melhores. Com esta tecnologia, nossas naves serão as mais poderosas da galáxia!"
