YouCanIncreaseOrDecrease:
 Id: 2205
 ENG: "You can increase or decrease the game speed with the +/- keys. The maximum game speed is normally capped at 4x speed. You may disable that cap with this option. Note that higher game speeds may result in low frame rates."
 RUS: "При помощи клавиш +/- вы можете управлять скоростью игры. Максимальная скорость игры - 6х от нормальной. При помощи этой опции вы можете снять это ограничение. Обратите внимание, что при высокой скорости игры ее быстродействие может снизиться."
 SPA: "Puedes aumentar o reducir la velocidad del juego con las teclas +/-. La velocidad máxima suele tener un tope de x4. Con esta opción, puedes deshabilitar ese tope. Ten en cuenta que a mayor velocidad de juego, menor es la frecuencia de imágenes."
 UKR: "Ви можете збільшити або зменшити швидкість гри за допомогою клавіш +/-. Зазвичай максимальна швидкість гри обмежена 4-кратною швидкістю. Ви можете вимкнути це обмеження за допомогою цієї опції. Зверніть увагу, що вища швидкість гри може призвести до низької частоти кадрів."
 PTB: "Você pode aumentar ou diminuir a velocidade do jogo com as teclas +/-. A velocidade máxima do jogo normalmente é limitada a 4x. Você pode desativar esse limite com esta opção. Observe que velocidades de jogo mais altas podem resultar em baixa taxa de quadros."
