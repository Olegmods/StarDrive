WeaponTargetError:
 Id: 4114
 ENG: "Weapon target error radius measured in ship slots. An accuracy of -6 means the weapon will hit within a 6 slot radius of the target point. above or below range 2300 The error will gradually increase or decrease. Fire Control Systems, turreted weapons, traits, and crew level can modify this"
 RUS: "Радиус ошибки прицела оружия измеряется в ячейках корабля. Точность -6 означает, что оружие поразит в радиусе 6 ячеек от целевой точки. Выше или ниже диапазона 2300 точность будет постепенно увеличиваться или уменьшаться. Системы управления огнем, турельное оружие, расовые особенности и уровень экипажа могут поднять точность."
 UKR: "Радіус похибки влучання зброї в ціль вимірюється в слотах корабля. Точність -6 означає, що зброя влучить у радіусі 6 слотів від точки цілі. вище або нижче діапазону 2300 Похибка буде поступово збільшуватися або зменшуватися. Системи керування вогнем, баштове озброєння, риси та рівень екіпажу можуть змінювати цю похибку."
 PTB: "Raio de erro do alvo da arma medido em espaços de nave. Uma precisão de -6 significa que a arma acertará dentro de um raio de 6 espaços a partir do ponto-alvo. Acima ou abaixo do alcance 2300, o erro aumentará ou diminuirá gradualmente. Sistemas de Controle de Fogo, armas em torre, traços e nível da tripulação podem modificar isso"
