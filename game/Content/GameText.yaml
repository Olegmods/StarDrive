ThisMonstrousCannonFiresFastmoving:
 Id: 913
 ENG: "This monstrous cannon fires fast-moving, high explosive shells.  It consumes considerable ordnance to fire this weapon but its power is unquestionable.  That said, only a few ships are large enough to mount this weapon.\n      "
 RUS: "Это чудовищная пушка стреляет мощными бризантными снарядами. Потребляет много боеприпасов, но по мощности с ней мало что может сравниться. Лишь немногие корабли достаточно велики, чтобы вместить этого монстра.\n      "
 SPA: "Este cañón monstruoso dispara veloces proyectiles de gran potencia explosiva.  Consume una cantidad considerable de munición, pero su poder destructivo es incuestionable.  Dicho esto, son pocas las naves suficientemente grandes para llevarla.\n      "
 UKR: "Ця жахлива гармата стріляє швидкісними, фугасними снарядами.  Для стрільби з неї витрачається значна кількість боєприпасів, але її потужність не викликає сумнівів.  Тим не менш, лише кілька кораблів є достатньо великими, щоб встановити цю зброю.\n       "
 PTB: "Este canhão monstruoso dispara projéteis altamente explosivos e de alta velocidade. Ele consome uma quantidade considerável de munição para disparar, mas seu poder é inquestionável. Ainda assim, apenas algumas naves são grandes o bastante para montar esta arma.\n      "
