 ENG: "These cramped quarters provide enough living space for a single platoon of marines. Marines increase a ship's boarding defense and can also be used offensively if their ship has an assault shuttle. Marines receive any racial ground combat bonuses or penalties. "
 RUS: "В этих тесных казармах может разместиться один взвод морпехов. Морпехи усиливают степень защиты корабля при вражеском абордаже и могут осуществлять абордаж вражеских кораблей сами, если их корабль оснащен штурмовыми шаттлами. На морпехов распространяются все расовые бонусы и штрафы расы на наземные бои."
 SPA: "En estas reducidas dependencias puede alojarse un solo pelotón de marines. Los marines aumentan la defensa contra abordajes de una nave y también pueden utilizarse si su nave dispone de una lanzadera de asalto. Los marines son susceptibles a cualquier bonificación o penalización racial de combate. "
 UKR: "Ці тісні каюти забезпечують достатній життєвий простір для одного взводу морських піхотинців. Морпіхи посилюють абордажний захист корабля, а також можуть використовуватися в наступі, якщо на кораблі є штурмовий шаттл. Морпіхи отримують всі расові бойові бонуси та штрафи за ведення бою на місцевості."
