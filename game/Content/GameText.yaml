 ENG: "Low Warp Time"
 RUS: "Малая длительность варп-прыжка"
 UKR: "Низький час викривлення"
 PTB: "Baixo tempo de dobra"
TheShipsAbilityToSustain:
 Id: 2517
 ENG: "The ship's ability to sustain Warp Speed is limited"
 RUS: "Способность корабля поддерживать варп-прыжок ограничена"
 UKR: "Здатність корабля підтримувати викривлення обмежена"
 PTB: "A capacidade da nave de manter Velocidade de Dobra é limitada"
AddReactorsToIncreaseThe:
 Id: 2518
 ENG: "Add Reactors to increase the power output of the ship to get infinite warp time, or Energy Storage to increase warp time."
 RUS: "Добавьте реакторы, чтобы увеличить выходную мощность корабля, или накопитель энергии, чтобы увеличить время варпа"
 UKR: "Додайте Реактори, щоб збільшити потужність корабля і отримати нескінченну тривалість викривлення, або Сховище енергії, щоб збільшити час викривлення."
 PTB: "Adicione Reatores para aumentar a produção de energia da nave e obter tempo de dobra infinito, ou Armazenamento de Energia para aumentar o tempo de dobra."
NegativePowerRecharge:
 Id: 2519
 ENG: "Negative Power Recharge"
 RUS: "Отрицательный уровень перезарядки энергии"
 UKR: "Негативна підзарядка енергії"
 PTB: "Recarga de energia negativa"
TheShipDoesNotHave2:
 Id: 2520
 ENG: "The ship does not have enough Reactors to properly recharge itself. It will have reduced or no effectiveness in the battlefield."
 RUS: "Кораблю не хватает реакторов для полноценной перезарядки. Эффективность на поле боя будет снижена."
 UKR: "Корабель не має достатньої кількості реакторів, щоб належним чином перезарядитися. Його ефективність на полі бою буде знижена або взагалі відсутня."
 PTB: "A nave não possui Reatores suficientes para recarregar corretamente. Ela terá eficácia reduzida ou nenhuma eficácia no campo de batalha."
AddReactorsToIncreaseThe2:
 Id: 2521
 ENG: "Add Reactors to increase the power output of the ship"
 RUS: "Добавьте реакторы,чтоб повысить выроботку энергии."
 UKR: "Додайте Реактори, щоб збільшити потужність корабля"
 PTB: "Adicione Reatores para aumentar a produção de energia da nave"
NoWarpSpeed:
 Id: 2522
 ENG: "No Warp Speed"
 RUS: "Без варпа"
 UKR: "Немає викривлення"
 PTB: "Sem velocidade de dobra"
TheShipIsNotWarp:
 Id: 2523
 ENG: "The ship is not Warp capable or it's warp engines are unpowered. This might be ok for small craft like Fighters or even Corvettes dedicated for Carrier or Colony Defense."
 RUS: "Корабль не способен к варпу. Это может быть приемлемо для небольших кораблей, таких как истребители или даже корветы, предназначенные для авианосцев или защиты колоний."
 UKR: "Корабель не здатний на викривлення або його двигуни викривлення не працюють. Це може бути нормально для невеликих кораблів, таких як винищувачі або навіть корвети, призначені для захисту авіаносців або колоній."
 PTB: "A nave não tem capacidade de Dobra ou seus motores de dobra estão sem energia. Isso pode ser aceitável para naves pequenas, como Caças, ou até Corvetas dedicadas à defesa de Porta-aviões ou Colônias."
AddWarpCapableModulesUsually:
 Id: 2524
 ENG: "Add Warp capable modules (usually Warp Engines) and power them to enable Warp capabilities."
 RUS: "Добавьте модули с поддержкой варп-прыжка(обычно это варп двишатели) и запитайте их от реактора, чтобы иметь возможность варп-прыжка."
 UKR: "Додайте модулі з підтримкою викривлення (як правило, двигуни викривлення) та увімкніть їх, щоб увімкнути можливості викривлення."
 PTB: "Adicione módulos capazes de Dobra (geralmente Motores de Dobra) e energize-os para habilitar capacidades de Dobra."
SlowWarpSpeed:
 Id: 2525
 ENG: "Slow Warp Speed"
 RUS: "Медленная скорость при варпе"
 UKR: "Повільна швидкість викривлення"
 PTB: "Velocidade de dobra baixa"
TheShipsWarpSpeedBelow:
 Id: 2526
 ENG: "The ship's Warp Speed below the average Ships' Warp speed available to your empire. Since fleets travel at the speed of the slowest ship, this ship will delay the fleet's speed capabilities if assigned to one."
 RUS: "Скорость варпа корабля ниже средней скорости варпа кораблей, доступных в вашей империи. Поскольку флот движется со скоростью самого медленного корабля, этот корабль будет задерживать скоростные возможности флота, если он выделен вместе с другими более быстрыми кораблями."
 UKR: "Швидкість викривлення корабля нижче середньої швидкості викривлення кораблів, доступної для вашої імперії. Оскільки флотилії рухаються зі швидкістю найповільнішого корабля, цей корабель затримує швидкісні можливості флотилії, якщо його призначено одному з них."
 PTB: "A Velocidade de Dobra da nave está abaixo da velocidade média de Dobra das naves disponíveis ao seu império. Como frotas viajam na velocidade da nave mais lenta, esta nave reduzirá a velocidade da frota caso seja designada para uma."
AddWarpCapableModulesUsually2:
 Id: 2527
 ENG: "Add Warp capable modules (usually Warp Engines) and power them to match the average Warp speed of"
 RUS: "Добавьте модули с поддержкой варп-прыжка (обычно варп двигатели) и приведите их в действие, чтобы они соответствовали средней скорости варпа"
 UKR: "Додайте модулі з можливістю викривлення (зазвичай двигуни викривлення) і налаштуйте їхню потужність на середню швидкість викривлення"
 PTB: "Adicione módulos capazes de Dobra (geralmente Motores de Dobra) e energize-os para igualar a velocidade média de Dobra de"
