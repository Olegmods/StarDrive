OrdnanceRepresentsAShipsStores:
 Id: 1007
 ENG: "Ordnance represents a ship's stores of munitions and explosives such as bullets, missiles, torpedoes, mines, and other special weapons.  A basic ordnance locker such as this one provides a captain with a safe and convenient place to store his munitions.\n      "
 RUS: "Боеприпасы - это корабельный запас пуль, ракет, торпед, снарядов, мин и т.п. Базовый отсек для хранения боеприпасов необходим для их удобного и безопасного хранения.\n      "
 SPA: "En el arsenal se guarda la munición y los explosivos, esto es, proyectiles, misiles, torpedos, minas y otras armas especiales.  Un depósito básico como este proporciona a un capitán un lugar seguro y práctico para guardar las municiones.\n      "
 UKR: "Боєприпаси - це корабельні запаси боєприпасів і вибухових речовин, таких як кулі, ракети, торпеди, міни та інша спеціальна зброя.  Базовий рундук для боєприпасів, такий як цей, забезпечує капітану безпечне і зручне місце для зберігання боєприпасів.\n      "
 PTB: "Munição representa os estoques da nave de armamentos e explosivos, como balas, mísseis, torpedos, minas e outras armas especiais. Um compartimento básico de munição como este fornece ao capitão um local seguro e conveniente para armazenar suas munições.\n      "
