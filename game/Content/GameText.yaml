AllowsYouToCustomizeAn:
 Id: 214
 ENG: "Allows you to customize an \"Area of Operations\" or \"AO\" for a freighter. Freighters will only trade within their AO (both Manual and Auto Trade), allowing you to define custom trade areas. Drag a selection box around the area of the galaxy you want to define as the AO. You can define more than one AO per ship. Right click the AO to delete it. Esc key or right clicking on this button will exit AO creation mode."
 RUS: "Позволяет вам задать для корабля область операций. Грузовые корабли будут осуществлять перевозку товаров только внутри своей области операций, что позволит вам создавать пользовательские торговые маршруты. Боевые корабли будут патрулировать свои области и атаковать вражеские корабли, вторгшиеся туда.\nОчертите прямоугольник для определения области операций. Вы можете задать для одного корабля более одной ОО. Для удаления ОО щелкните по ней ПКМ."
 SPA: "Permite personalizar una \"zona de operaciones\" o \"ZO\" para una nave. Los cargueros solo comerciarán dentro de la ZO, por lo que puedes personalizar rutas comerciales. Las naves de combate patrullarán su ZO y atacarán a los enemigos presentes en ella.\n\nArrastra el puntero para dibujar un cuadro de selección alrededor de la zona de la galaxia que quieras definir como ZO. Puedes definir más de una zona por nave. Haz clic con el botón derecho en la ZO para eliminarla.\n      "
 UKR: "Дозволяє налаштувати \"Зону операцій\" або \"ЗО\" для вантажного судна. Вантажники торгуватимуть лише в межах свого ЗО (як ручної, так і автоматичної торгівлі), що дозволяє вам визначати власні торгові зони. Перетягніть рамку вибору навколо області галактики, яку потрібно визначити як ЗО. Ви можете визначити більше одного ЗО на судно. Клацніть ЗО правою кнопкою миші, щоб видалити його. Клавіша Esc або клацання правою кнопкою миші на цій кнопці призведе до виходу з режиму створення AO."
 PTB: "Permite personalizar uma \"Área de Operações\" ou \"AO\" para um cargueiro. Cargueiros só negociarão dentro de sua AO (tanto em Comércio Manual quanto em Comércio Automático), permitindo definir áreas comerciais personalizadas. Arraste uma caixa de seleção ao redor da área da galáxia que deseja definir como AO. Você pode definir mais de uma AO por nave. Clique com o botão direito na AO para excluí-la. A tecla Esc ou clicar com o botão direito neste botão sai do modo de criação de AO."
SendTroopsToThisShip:
 Id: 217
 ENG: "Send Troops to this ship if it's troop number is less than the maximum or less than 25% if in combat. If you toggle this off, the ship will go to resupply when it has no troops left. A ship set to Kamikaze will not retreat to resupply, but will request troops if the button is on."
 RUS: "Отправляет войска на этот корабль, если его количество меньше максимального или меньше 25% в бою. Если вы выключите эту кнопку, корабль отправится на пополнение запасов, когда на нем не останется войск. Корабль, установленный как Камикадзе, не будет отступать для пополнения запасов, но запросит войска, если кнопка включена."
 SPA: "Activa o desactiva los escudos de la nave. Los escudos desactivados no consumen energía"
 UKR: "Надішліть війська на цей корабель, якщо його кількість менша за максимальну або менша за 25%, якщо в бою. Якщо вимкнути цю функцію, корабель піде на поповнення запасів, коли на ньому не залишиться військ. Корабель, налаштований на Камікадзе, не відступить для поповнення запасів, але запитає війська, якщо кнопку увімкнено."
 PTB: "Envie tropas para esta nave se o número de tropas dela estiver abaixo do máximo ou abaixo de 25% em combate. Se você desativar isto, a nave irá reabastecer quando não tiver mais tropas. Uma nave configurada como Kamikaze não recuará para reabastecer, mas solicitará tropas se o botão estiver ligado."
WhenActiveAllAvailableFighters:
 Id: 218
 ENG: "When active, all available fighters will launch and escort the carrier. If not active, fighters will launch only for combat and return to their hangars for resupply when combat ends."
 RUS: "Когда кнопка активена, все доступные истребители запускаются и сопровождают авианосец. Если не активен, истребители будут запускаться только для боя и возвратяться в свои ангары для пополнения запасов по окончании боя."
 SPA: "Determina si los cazas de la nave deben salir o regresar a los hangares"
 UKR: "Коли активне, усі доступні винищувачі запускаються та супроводжують носій. Якщо не активно, винищувачі запускатимуться лише для бою та повертатимуться до своїх ангарів для поповнення запасів після завершення бою."
 PTB: "Quando ativo, todos os caças disponíveis serão lançados e escoltarão o porta-aeronaves. Se não estiver ativo, os caças serão lançados apenas em combate e retornarão aos hangares para reabastecimento quando o combate terminar."
IndicatesHowMuchFoodThis:
 Id: 219
 ENG: "Indicates how much food this planet will produce per assigned colonist per turn (a turn is 0.1 StarDate). Some buildings or environmental effects might increase or decrease the maximum value, in which case the current value will gradually match the max value over time. The number in parentheses indicates the fertility modifier of this colony, based on your empire's suitable environments. Buildings which grant food per assigned colonist are greatly affected by Fertility, as Fertiliy is a multiplier. Non Cybernetic Races consume food."
 UKR: "Вказує, скільки їжі ця планета вироблятиме на одного призначеного колоніста за хід (хід становить 0,1 StarDate). Деякі будівлі або вплив навколишнього середовища можуть збільшити або зменшити максимальне значення, і в цьому випадку поточне значення поступово збігатиметься з максимальним значенням з часом. Число в дужках вказує на модифікатор родючості цієї колонії на основі відповідного середовища вашої імперії. На будівлі, які дають їжу кожному призначеному колоністу, сильно впливає родючість, оскільки родючість є множником. Некібернетичні раси споживають їжу."
 PTB: "Indica quanta comida este planeta produzirá por colono designado por turno (um turno equivale a 0,1 Data Estelar). Alguns edifícios ou efeitos ambientais podem aumentar ou diminuir o valor máximo; nesse caso, o valor atual se ajustará gradualmente ao valor máximo ao longo do tempo. O número entre parênteses indica o modificador de fertilidade desta colônia, com base nos ambientes adequados do seu império. Edifícios que concedem comida por colono designado são muito afetados pela Fertilidade, pois Fertilidade é um multiplicador. Raças não cibernéticas consomem comida."
IndicatesHowMuchResearchThis:
 Id: 221
 ENG: "Indicates how much research this planet will produce per assigned colonist per turn (a turn is .1 StarDate)"
 RUS: "Указывает, сколько исследований на выделенного колониста колония произведет за ход (ход - 0,1 ЗД)"
 SPA: "Indica cuánta investigación producirá este planeta por colono asignado y por turno (un turno es 0,1 en la fecha estelar)"
 UKR: "Вказує, скільки досліджень ця планета вироблятиме на одного призначеного колоніста за хід (хід становить .1 StarDate)"
 PTB: "Indica quanta pesquisa este planeta produzirá por colono designado por turno (um turno equivale a 0,1 Data Estelar)"
MarkThisPlanetForColonization:
 Id: 222
 ENG: "Mark this planet for colonization. If you own a colony ship that has no current mission then it will be assigned to colonize this planet. Otherwise, a new colony ship will be constructed at your best available shipyard and dispatched to this planet upon completion"
 RUS: "Отметить планету для колонизации. Если у вас есть корабль-колонист, у которого нет текущего задания, ему будет дано указание колонизировать эту планету. В противном случае на лучшей из ваших доступных верфей будет построен новый корабль-колонист, который по завершении строительства будет сразу отправлен на выбранную планету"
 SPA: "Marca este planeta para la colonización. Si tienes una nave colonial sin misiones en curso, se le asignará la tarea de colonizarlo. Si no, en el mejor astillero que haya disponible se construirá una nueva nave colonial que será enviada al planeta"
 UKR: "Позначте цю планету для колонізації. Якщо у вас є колоніальний корабель, який не має поточної місії, то йому буде призначено колонізувати цю планету. В іншому випадку новий корабель колонії буде побудовано на вашій найкращій доступній верфі та відправлено на цю планету після завершення"
 PTB: "Marca este planeta para colonização. Se você possuir uma nave-colônia sem missão atual, ela será designada para colonizar este planeta. Caso contrário, uma nova nave-colônia será construída no seu melhor estaleiro disponível e enviada para este planeta após a conclusão"
CancelTheColonizationMissionThat:
 Id: 223
 ENG: "Cancel the colonization mission that is underway for this planet"
 RUS: "Отменить миссию по колонизации этой планеты"
 SPA: "Cancela la misión de colonización en curso para ese planeta"
 UKR: "Скасувати місію колонізації цієї планети"
 PTB: "Cancela a missão de colonização em andamento neste planeta"
