 UKR: " стали неймовірними машинами витонченості та смертоносності, з витонченим, смертоносним і красивим зовнішнім виглядом."
 PTB: " tornaram-se máquinas incríveis de graça e letalidade, com uma aparência elegante, mortal e bela. "
HaveBecomeConfusingTechnologicalMonstrosities:
 Id: 1329
 ENG: " have become confusing technological monstrosities with deadly-looking appendages and a decidedly hostile appearance. "
 RUS: " превратились в технологических монстров, одним своим видом способных напугать кого угодно. "
 SPA: " se han convertido en desconcertantes monstruosidades tecnológicas con apéndices de apariencia letal y un aspecto claramente hostil. "
 UKR: " перетворилися на заплутані технологічні потвори зі смертоносними придатками та виразно ворожим виглядом."
