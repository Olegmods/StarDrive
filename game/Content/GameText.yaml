 PTB: "Clique para descer na fila. Ctrl-clique para mover para o final"
ShipWillAttemptToHold:
 Id: 263
 ENG: "Ship will attempt to hold position and will not move to engage enemies"
 RUS: "Корабли будут пытаться удерживать позицию и не будут уходить с нее, чтобы атаковать врагов"
 SPA: "La nave intentará mantener la posición y no se moverá para enfrentarse a los enemigos"
 UKR: "Корабель намагатиметься утримувати позицію і не рухатиметься, щоб вступити у бій з ворогом"
 PTB: "A nave tentará manter posição e não se moverá para atacar inimigos"
TaxesAreCollectedFromYour:
 Id: 264
 ENG: "Taxes are collected from your planets as a portion of their populations income. The negative side of taxes is that they reduce moral and productivity. For instance, a tax rate of 25% means that research and industrial output will be reduced by 25% across all planets."
 RUS: "Налоги с планет собираются в виде доли ее промышленного и исследовательского потенциала. Например, налог в 25% означает, что промышленное производство и исследования на всех планетах сократятся на 25%. За счет налогов ваша империя будет получать эти потерянные ресурсы в виде кредитов."
 SPA: "Los impuestos se recaudan en los planetas como una parte de su rendimiento de producción e investigación. Por ejemplo, un tipo impositivo del 25% reducirá la capacidad industrial e investigadora en ese mismo 25% en todos los planetas. Tu imperio transformará en créditos la producción e investigación perdidas."
 UKR: "Податки збираються з ваших планет як частина доходу їхнього населення. Негативною стороною податків є те, що вони знижують мораль і продуктивність. Наприклад, податкова ставка 25% означає, що наукові дослідження і промислове виробництво скоротяться на 25% на всіх планетах."
 PTB: "Impostos são coletados de seus planetas como uma parte da renda de suas populações. O lado negativo dos impostos é que eles reduzem o moral e a produtividade. Por exemplo, uma taxa de imposto de 25% significa que a pesquisa e a produção industrial serão reduzidas em 25% em todos os planetas."
LaunchThisTroopIntoOrbit:
 Id: 265
 ENG: "Launch this troop into orbit"
 RUS: "Отправить этот отряд на орбиту"
 SPA: "Poner esta tropa en órbita"
 UKR: "Запустити цей загін на орбіту"
 PTB: "Lança esta tropa em órbita"
TogglesWhetherThisShipsAssault:
 Id: 266
 ENG: "Left Click - Toggles whether this ship's assault shuttles should be launched and escort the troop ship or recovered to hangars\nRight Click - Toggle allowing troops to board ships from this troop ship."
 RUS: "Переключает, следует ли запускать штурмовые шаттлы этого корабля и сопровождать военный корабль или возвратиться в ангары"
 UKR: "Лівий клік - перемикає, чи повинні штурмові шатли цього корабля запускатися і супроводжувати військовий корабель або повертатися в ангари\nПравий клік - перемикач, що дозволяє військам брати на абордаж кораблі з цього десантного корабля."
 PTB: "Clique esquerdo - Alterna se os transportes de assalto desta nave devem ser lançados para escoltar a nave de tropas ou recolhidos aos hangares\nClique direito - Alterna a permissão para tropas embarcarem em naves a partir desta nave de tropas."
