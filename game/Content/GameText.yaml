AnOrdnanceSupplyBayAllows:
 Id: 1011
 ENG: "An ordnance supply bay allows a ship to launch supply shuttles filled with ammunition to resupply friendly ships. Only one shuttle may be active per bay at a time. Supply shuttles can ferry 100 ordnance at a time.\n      "
 RUS: "Отсек снабжения боеприпасами пзволяет кораблю выпускать шаттлы, груженные боеприпасами, для пополнения боекомплекта находящихся поблизости дружественных кораблей. Единвоременно может быть активен только один шаттл для каждого отсека. Шаттлы перевозят 50 ед. боеприпасов за раз.\n      "
 SPA: "Un muelle de artillería permite enviar lanzaderas de reabastecimiento para reaprovisionar a otras naves amigas. Solo puede haber activa una lanzadera por muelle al mismo tiempo. Estas lanzaderas tienen una capacidad de 50 unidades de artillería.\n      "
 UKR: "Відсік постачання боєприпасів дозволяє кораблю запускати шатли з боєприпасами для поповнення запасів дружніх кораблів. У кожному ангарі може бути активний лише один шаттл. За один раз шатли постачання можуть доставити 100 боєприпасів.\n"
 PTB: "Uma baía de suprimento de munição permite que uma nave lance ônibus de suprimento carregados com munição para reabastecer naves aliadas. Apenas um ônibus pode ficar ativo por baía de cada vez. Ônibus de suprimento podem transportar 100 unidades de munição por viagem.\n      "
