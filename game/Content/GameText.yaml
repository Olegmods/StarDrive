AddShipDesignsToThis:
 Id: 4043
 ENG: "Add ship designs to this fleet from the panel on the right. Use 'Shift' key to place multiple ships of the same type. When you are done, you can press the 'Requisition' button, which will search your empire for ships that can fill your fleet. If you do not have the ships, it will order that they are built at a suitable planet.\n\nReturn here at any time to requisition replacements for any ships that are lost in combat."
 RUS: "Добавьте дизайны кораблей к этому флоту с панели справа. Используйте клавишу 'Shift', чтобы разместить несколько кораблей одного типа. Когда вы закончите, вы можете нажать кнопку 'Запрос', она будет искать в вашей империи корабли, которые могут заполнить ваш флот. Если у вас нет кораблей, то они построятся на подходящей планете. Вернитесь сюда в любое время, чтобы запросить замену любых кораблей, потерянных в бою."
 SPA: "Añade diseños de naves a esta flota desde el panel de la derecha. Cuando hayas terminado, pulsa el botón \"Solicitar\" y se iniciará una búsqueda en tu imperio de naves que puedan conformar tu flota. Si no dispones de esas naves, se enviará la orden de que sean construidas en un planeta adecuado.\n\nVuelve aquí cuando quieras solicitar reemplazos para las naves perdidas en combate."
 UKR: "Додайте проекти кораблів до цього флоту з панелі праворуч. Використовуйте клавішу 'Shift', щоб розмістити кілька кораблів одного типу. Коли ви закінчите, ви можете натиснути кнопку 'Запит', яка шукатиме у вашій імперії кораблі, які можуть поповнити ваш флот. Якщо у вас немає потрібних кораблів, він накаже побудувати їх на відповідній планеті.\n\nПоверніться сюди в будь-який час, щоб замовити заміну для будь-яких кораблів, втрачених у бою."
 PTB: "Adicione projetos de naves a esta frota pelo painel à direita. Use a tecla 'Shift' para colocar várias naves do mesmo tipo. Quando terminar, você pode pressionar o botão 'Requisitar', que procurará no seu império naves capazes de completar sua frota. Se você não tiver as naves, será dada a ordem para construí-las em um planeta adequado.\n\nVolte aqui a qualquer momento para requisitar substituições para naves perdidas em combate."
