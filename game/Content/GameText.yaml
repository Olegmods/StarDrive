TT_FireControl:
 Id: 5088
 ENG: "Fire Control Systems or FCS. This indicates how powerful weapon fire control is on the ship. Higher FCS increases weapon accuracy and target tracking. Weapon accuracy is the highest FCS of any module except where noted. Tacking systems is accumulated FCS."
 RUS: "Системы управления огнем или СУО.Показывает, насколько мощным является управление огнем оружия на корабле. Более лучшая СУО увеличивает точность оружия и сопровождение цели. Точность оружия - самая высокая у СУО среди всех модулей, если не указано иное. Система перехвата - это накопленные СУО."
 UKR: "Системи управління вогнем або FCS. Вона показує, наскільки потужним є управління вогнем зброї на кораблі. Чим вищий FCS, тим вища точність зброї та краще відстеження цілі. Точність зброї - це найвищий показник FCS будь-якого модуля, окрім зазначених. Причальні системи - це акумульована FCS."
 PTB: "Sistemas de Controle de Fogo ou SCF. Isto indica quão poderoso é o controle de fogo das armas na nave. Um SCF mais alto aumenta a precisão das armas e o rastreamento de alvos. A precisão das armas usa o maior SCF de qualquer módulo, exceto onde indicado. Sistemas de rastreamento acumulam SCF."
