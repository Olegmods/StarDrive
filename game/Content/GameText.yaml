YourForcesEnterTheMysterious2:
 Id: 1815
 ENG: "Your forces enter the mysterious tomb and find evidence of a long dead civilization. The complex is incredibly well preserved. Yet even more curious is the fact that this site seems to have been the target of an earlier archaeological expedition by a second alien race -- very likely starfarers based on the evidence found. \n \n The wealth of information presented here will pay dividends to our scientists for years to come. Your race gains a bonus to all scientific efforts for the discovery."
 RUS: "Ваши отряды проникли в таинственную гробницу и обнаружили в ней следы присутствия давно вымершей цивилизации. Гробница на удивление хорошо сохранилась, но еще более странно то, что здесь, судя по всему, ранее побывала археологическая экспедиция другой инопланетной расы. \n \n Вы нашли там огромное количество интересной и ценной информации - она станет огромным подспорьем для ваших ученых на протяжении многих лет. Ваша раса получает за это открытие 3% бонус ко всем научным исследованиям."
 SPA: "Tus fuerzas acceden a la tumba misteriosa y hallan pruebas de una civilización que desapareció hace mucho tiempo. El complejo está increíblemente bien conservado, aunque lo más curioso es que el lugar parece haber sido estudiado por una segunda raza alienígena, pues hay restos de una expedición arqueológica anterior; es muy probable que los viajeros del espacio usaran en su provecho las pruebas encontradas. \n \n La abundante información recopilada les será muy útil a nuestros científicos y rendirá sus frutos en años venideros. Tu raza gana por el descubrimiento una bonificación del 3% en investigación científica."
 UKR: "Ваші війська проникають у таємничу гробницю і знаходять докази існування давно загиблої цивілізації. Комплекс неймовірно добре зберігся. Ще більш цікавим є той факт, що це місце, схоже, було метою попередньої археологічної експедиції другої інопланетної раси - дуже ймовірно, що це були зоряні мандрівники, судячи зі знайдених доказів. \n \n Багатство інформації, представленої тут, принесе дивіденди нашим вченим на довгі роки. Ваша раса отримує бонус до всіх наукових зусиль за це відкриття."
 PTB: "Suas forças entram na tumba misteriosa e encontram evidências de uma civilização há muito extinta. O complexo está incrivelmente bem preservado. Ainda mais curioso é o fato de que este local parece ter sido alvo de uma expedição arqueológica anterior de uma segunda raça alienígena — muito provavelmente viajantes estelares, com base nas evidências encontradas. \n \n A riqueza de informações apresentada aqui renderá dividendos aos nossos cientistas por muitos anos. Sua raça ganha um bônus em todos os esforços científicos por esta descoberta."
