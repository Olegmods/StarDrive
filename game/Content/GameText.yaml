SendThisAgentOnA4:
 Id: 2191
 ENG: "Send this Agent on a mission to wreak havoc on an enemy colony. The Agent will be on assignment for the indicated number of turns. If successful, resource harvesting at the colony will be halted for a number of turns depending on your Agent's level."
 RUS: "Отправить этого агента на задание по осуществлению диверсии во вражеской колонии. Агент будет выполнять задание в течение указанного количества ходов. Если задание будет выполнено успешно, добыча ресурсов на этой планете будет остановлена на определенное количество ходов в зависимости от уровня вашего агента."
 SPA: "Envía a este agente a una colonia enemiga para que cause estragos en ella. El agente tratará de cumplir la misión durante el número indicado de turnos. Si tiene éxito, la recolección de recursos de la colonia se verá interrumpida durante varios turnos, cuyo número dependerá del nivel de tu agente."
 UKR: "Відправте цього Агента на місію, щоб посіяти хаос у ворожій колонії. Агент буде на завданні протягом вказаної кількості ходів. У разі успіху видобуток ресурсів у колонії буде зупинено на кілька ходів, залежно від рівня вашого агента."
 PTB: "Envie este Agente em uma missão para causar estragos em uma colônia inimiga. O Agente ficará em missão pelo número indicado de turnos. Se tiver sucesso, a coleta de recursos na colônia será interrompida por um número de turnos dependendo do nível do seu Agente."
