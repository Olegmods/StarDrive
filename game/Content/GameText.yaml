 ENG: "Use Shift + Click to bulk replace all similar modules. It is useful if you are upgrading your ship. It will also keep your old weapons' facing when bulk replacing weapons."
 RUS: "Используйте Shift + Click, чтобы массово заменить все похожие модули. Это полезно, если вы улучшаете свой корабль.Также сохраняется внешний вид вашего старого оружия при массовой замене оружия."
 UKR: "Використовуйте Shift + Клік, щоб замінити всі подібні модулі. Це корисно, якщо ви модернізуєте свій корабель. Це також збереже вигляд вашої старої зброї при груповій заміні зброї."
 PTB: "Use Shift + Clique para substituir em massa todos os módulos semelhantes. É útil ao atualizar sua nave. Isso também manterá a orientação das armas antigas ao substituir armas em massa."
