 UKR: "Додайте реактори, які збільшать потужність перезарядки корабля."
 PTB: "Adicione reatores, que aumentarão a recarga de energia da nave."
LowPowerCapacity:
 Id: 1465
 ENG: "Low Power Capacity"
 RUS: "Низкий уровень энергии"
 UKR: "Низька енергоємність"
 PTB: "Baixa Capacidade de Energia"
TheShipsPowerCapacityIt:
 Id: 1466
 ENG: "The ship's Power Capacity is too low to support all of it's installed energy weaponry. The ship might have enough power output, but it must also have sufficient capacity to store it."
