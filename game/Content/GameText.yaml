 ENG: "Shipboard Medicine"
 RUS: "Корабельная медицина"
 SPA: "Medicina a bordo"
 UKR: "Корабельна медицина"
 PTB: "Medicina de Bordo"
BB_Tech_ShipboardMedicine_Desc:
 Id: 2039
 ENG: "Troops are an investment and we should protect that investment by providing medical facilities. These sickbay facilities can be placed on stations or larger ships and will slowly heal any troops stationed there. Multiple sickbays will have cumulative results. "
 RUS: "Войска - это инвестиции, и мы должны защищать их, оказывая им необходимые медицинские услуги. Корабельные лазареты могут размещаться на станциях или крупных кораблях, и они будут постепенно лечить все находящиеся там войска. Эффекты от нескольких лазаретов складываются. "
 SPA: "Las tropas son una inversión y debemos protegerlas con instalaciones médicas. Estas enfermerías pueden ubicarse en estaciones o naves más grandes y curarán poco a poco a las tropas apostadas en ellas. Con varias enfermerías se acumulan los efectos. "
 UKR: "Війська - це інвестиції, і ми повинні захистити ці інвестиції, забезпечивши їх медичними закладами. Такі лазарети можна розмістити на станціях або великих кораблях, і вони будуть поступово лікувати всіх військовослужбовців, які там перебувають. Кілька лазаретів матимуть кумулятивний ефект."
 PTB: "Tropas são um investimento e devemos proteger esse investimento fornecendo instalações médicas. Essas enfermarias podem ser instaladas em estações ou naves maiores e curarão lentamente quaisquer tropas estacionadas nelas. Várias enfermarias terão resultados cumulativos."
