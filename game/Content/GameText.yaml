ThisLaserEmploysAClever:
 Id: 2217
 ENG: "This laser employs a clever two-way magnetic field to direct energy into an asteroid where it breaks up the ores inside; the ores are then propeled by energy of the laser blast back towards the mining ship, using a second magnetic field to contain and funnel the ores to the proper cargo recepticle."
 RUS: "Этот лазер использует \"умное\" двунаправленное магнитное поле, которое направляет энергию на астероид, выбивая из него руду, которая затем направляется вторым магнитным полем в специальный грузовой контейнер добывающего корабля."
 SPA: "Este láser emplea un campo magnético bidireccional inteligente para dirigir la energía a un asteroide, cuyos minerales fragmenta en su interior; a continuación, el mineral es atraído con el haz láser hacia la nave minera, usando un campo magnético que contiene y canaliza el mineral hacia el receptáculo de carga correspondiente."
 UKR: "Цей лазер використовує розумне двостороннє магнітне поле для спрямування енергії в астероїд, де він розщеплює руди всередині; потім руди рухаються за допомогою енергії лазерного вибуху назад до гірничодобувного корабля, використовуючи друге магнітне поле, щоб утримувати і спрямовувати руди до відповідного вантажного відсіку."
 PTB: "Este laser usa um campo magnético bidirecional engenhoso para direcionar energia para um asteroide, onde ela fragmenta os minérios internos; os minérios então são impulsionados pela energia do disparo do laser de volta para a nave de mineração, usando um segundo campo magnético para conter e canalizar os minérios ao receptáculo de carga adequado."
