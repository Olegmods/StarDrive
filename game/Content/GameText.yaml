 ENG: "This fighter-bomber weapon has a relatively huge impact for its size. It has a small guidance package but relies on the momentum of its mothership for its speed. "
 RUS: "Этот истребитель-бомбардировщик имеет относительно большую пользу для своих размеров. У него есть небольшая система наведения, но его скорость зависит от движущей силы своего материнского корабля. "
 SPA: "Esta arma de caza-bombardero tiene un impacto relativamente alto para su tamañao. Posee un pequeño sistema de apuntado, pero depende de la velocidad de su nave madre para su momentum. "
 UKR: "Ця зброя винищувача-бомбардувальника має відносно великий вплив для свого розміру. Він має невелику систему наведення, але в швидкості покладається на імпульс свого материнського корабля."
 PTB: "Esta arma de caça-bombardeiro tem um impacto relativamente enorme para seu tamanho. Ela possui um pequeno pacote de guiagem, mas depende do impulso da nave-mãe para obter velocidade. "
