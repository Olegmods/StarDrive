AsTheRemnantExterminatorsSweep:
 Id: 5085
 ENG: "As the Remnant Exterminators sweep across the galaxy, burning and killing all that they find, you step inside the completed Ascension Array. In one glorious moment you are given True Knowledge. You are all things that have ever lived. You know all the joys and sorrows of your people and every people to ever populate the galaxy. You experience lives beyond counting. You are Father and Son reunited, friend and foe, predator and prey. You are the light at the end of the tunnel. \n \n And you are not alone."
 RUS: "По мере того как Предтечи-истребители проносятся по галактике, сжигая и убивая все что находят, вы входите в завершенный Массив Вознесения.И в один прекрасный момент вам дается Истинное Знание. Вы это все живые существа , которые когда-либо жили. Вы знаете все радости и горести вашего народа и каждого народа, когда-либо населявшего галактику. Вы переживаете несчетное количество жизней. Вы воссоединились... Отец и Сын, друг и враг, хищник и жертва.Вы - свет в конце туннеля. \n \n И вы не одиноки."
 SPA: "Mientras lo exterminadores remanentes barren la galaxia, quemando y asesinando todo lo que ven, tu das un paso adentro del ya completado complejo de ascensión. en un momento de gloria, eres otorgado con el verdadero conocimiento, eres todas las cosas que han vivido, conoces todas las alegrias y los sufrimientos de tu gente y de cada persona que ha habitado la galaxia. Experimentas vidas, mas allá de las que son posibles contar. Eres el padre e hijo reunidos, aliado y enemigo, eres la luz al final del camino.\n \n Y no estas solo."
 UKR: "Поки Винищувачі Древніх проносяться галактикою, спалюючи і вбиваючи все, що знаходять, ви входите всередину завершеного масиву Вознесіння. В одну славну мить вам дається Істинне Знання. Ви - це все, що коли-небудь жило. Ви знаєте всі радощі і печалі свого народу і всіх народів, які коли-небудь населяли галактику. Ви переживаєте життя, які неможливо порахувати. Ти - Отець і Син, що возз'єдналися, друг і ворог, хижак і жертва. Ти - світло в кінці тунелю. \n \n І ви не самотні."
 PTB: "Enquanto os Exterminadores Remanescentes varrem a galáxia, queimando e matando tudo que encontram, você entra na Matriz de Ascensão concluída. Em um momento glorioso, você recebe o Conhecimento Verdadeiro. Você é todas as coisas que já viveram. Você conhece todas as alegrias e tristezas do seu povo e de todos os povos que já povoaram a galáxia. Você vivencia vidas incontáveis. Você é Pai e Filho reunidos, amigo e inimigo, predador e presa. Você é a luz no fim do túnel. \n \n E você não está sozinho."
WarningCpuIntenseThisOption:
 Id: 5086
 ENG: "WARNING: CPU INTENSE! This option will force a full combat simulation for 100% accuracy even when battles are occurring out of sight and between non-player factions, including detailed module targeting. If this option is unchecked, approximations will be used to speed up the game when occurring well outside the players view, and for some aspects of combat between AI factions."
 RUS: "ВНИМАНИЕ: ИНТЕНСИВНАЯ НАГРУЗКА НА CPU! Эта опция включит полную симуляцию боя со 100% точностью, даже когда битвы происходят вне поля зрения и между неигровыми фракциями, включая детальное нацеливание модулей. Если этот параметр не отмечен, приближения будут использоваться для ускорения игры, если они происходят далеко за пределами поля зрения игроков, а также для некоторых аспектов боя между фракциями ИИ."
 SPA: "ADVERTENCIA: USO INTENSIVO DEL CPU. Esta opción va a forzar una simulacion de combate completa con una precisión del 100%, incluso cuando las batallas estan fuera de vista y ademas, con las facciones que no sean del jugador, incluyendo el apuntado a los módulos de forma detallada. Si esta opcion se deja desmarcada, se usaran aproximaciones para acelerar el juego cuando las batallas ocurren fuera del campo se vista del jugador, y para algunos aspectos de combate entre facciones de la IA."
 UKR: "ПОПЕРЕДЖЕННЯ: ВИСОКЕ НАВАНТАЖЕННЯ НА ПРОЦЕСОР! Ця опція забезпечує повну симуляцію бою зі 100% точністю, навіть коли битви відбуваються поза зоною видимості і між неігровими фракціями, включаючи детальне наведення на цілі модулів. Якщо цю опцію знято, то для прискорення гри будуть використовуватися наближення, коли бої відбуваються далеко за межами видимості гравця, а також для деяких аспектів бою між фракціями ШІ."
 PTB: "AVISO: USO INTENSO DE CPU! Esta opção forçará uma simulação completa de combate para 100% de precisão, mesmo quando batalhas ocorrerem fora da visão e entre facções não controladas pelo jogador, incluindo mira detalhada em módulos. Se esta opção estiver desmarcada, aproximações serão usadas para acelerar o jogo quando ocorrerem bem fora da visão do jogador e para alguns aspectos do combate entre facções de IA."
