CapitalCity:
 Id: 409
 ENG: "Capital City"
 RUS: "Столица"
 SPA: "Capital urbana"
 UKR: "Столиця"
 PTB: "Capital"
TheCapitalCityIsA:
 Id: 410
 ENG: "The Capital City is a unique building that provides research while improving industrial and agricultural capacity. Capital Cities also provide excellent self defense and can withstand a sustained siege by determined opponents. Finally, Capital cities allow you to recruit basic infantry units. "
 RUS: "Столица - это уникальное строение, генерирующее научные исследования и одновременно улучшающее промышленный и сельскохозяйственный потенциал планеты. Столица также предоставляет мощный оборонительный потенциал и способна выдержать серьезную осаду. Кроме того, столица позволяет набирать базовые пехотные отряды."
 SPA: "La Capital urbana es un edificio único que proporciona investigación al tiempo que mejora la capacidad industrial y agrícola. Las Capitales urbanas también ofrecen una autodefensa excelente y pueden soportar asedios prolongados ante determinados rivales. Por último, las capitales te permiten reclutar unidades de infantería básicas. "
 UKR: "Столиця - це унікальна будівля, яка забезпечує дослідження, одночасно покращуючи промислові та сільськогосподарські потужності. Столиці також забезпечують відмінну самооборону і можуть витримати тривалу облогу рішуче налаштованих супротивників. Нарешті, столиці дозволяють вам набирати базові піхотні підрозділи."
 PTB: "A Capital é um edifício único que fornece pesquisa enquanto melhora a capacidade industrial e agrícola. Capitais também oferecem excelente autodefesa e podem resistir a um cerco prolongado por oponentes determinados. Por fim, Capitais permitem recrutar unidades básicas de infantaria. "
