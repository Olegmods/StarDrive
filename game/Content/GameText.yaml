 RUS: "Это оружие выпускает более одного снаряда за выстрел. Он также будет стрелять этими несколькими снарядами за залп, если у него есть залповый огонь. Например, оружие с числом снарядов 2 и залпом 3 будет выпускать 6 снарядов за залп"
 UKR: "Ця зброя вистрілює більше одного снаряда за постріл. Вона також вистрілить цю кількість снарядів за залп, якщо у неї є залповий вогонь. Наприклад, зброя з кількістю снарядів 2 і залпом 3 вистрілить 6 снарядів за залп"
 PTB: "Esta arma dispara mais de um projétil por tiro. Ela também disparará esses múltiplos projéteis por Salva, se possuir disparo em Salva. Uma arma com contagem de projéteis 2 e salva 3, por exemplo, disparará 6 projéteis por salva"
TheMoreComplexTheModule:
