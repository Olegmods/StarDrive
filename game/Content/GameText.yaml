SendThisAgentOnA3:
 Id: 2189
 ENG: "Send this Agent on a mission to infiltrate an enemy colony. If successful, your agent will go Undercover to provide sensor data from that colony and you will be able to view that colony's details as if it were your own colony. Success or failure will be determined at the end of the indicated number of turns. The Agent can be reassigned to a new mission after a successful infiltration, but you will lose access to the data provided by the Agent."
 RUS: "Отправить этого агента на задание по внедрению на одну из колоний выбранной империи. Если задание будет выполнено успешно, агент уйдет в подполье и будет поставлять вам данные с той колонии, в результате чего вы сможете просматривать все ее параметры, как если бы она была вашей. Успех или неудача определяются по истечении указанного количества ходов. После успешного проникновения агента можно будет отправить на новое задание, но в этом случае вы потеряете доступ к данным, поставляемым тем агентам."
 SPA: "Envía a este agente a una misión de infiltración en una colonia enemiga. Si tiene éxito, el agente pasará al estado Encubierto y facilitará datos sensoriales sobre dicha colonia, por lo que podrás saber tanto de ella como si fuera tuya. El éxito o fracaso se determinará al final del número indicado de turnos. Si el agente logra infiltrarse, puedes reasignarle una misión, pero perderás acceso a los datos que proporcionaba."
 UKR: "Відправте цього агента на місію з проникнення у ворожу колонію. У разі успіху, ваш агент піде під прикриттям і передасть дані сенсорів з цієї колонії, а ви зможете переглядати деталі цієї колонії так, як якщо б це була ваша власна колонія. Успіх чи невдача буде визначена в кінці вказаної кількості ходів. Після успішного проникнення агента можна перепризначити на нову місію, але ви втратите доступ до даних, наданих агентом."
 PTB: "Envie este Agente em uma missão para infiltrar uma colônia inimiga. Se tiver sucesso, seu agente ficará disfarçado para fornecer dados de sensores dessa colônia e você poderá ver os detalhes da colônia como se ela fosse sua. O sucesso ou fracasso será determinado ao fim do número indicado de turnos. O Agente pode ser transferido para uma nova missão após uma infiltração bem-sucedida, mas você perderá acesso aos dados fornecidos pelo Agente."
