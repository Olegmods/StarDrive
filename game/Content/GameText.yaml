 ENG: "In Sandbox game mode you may win the game by conquering all of your enemies or by uniting the galaxy in alliance. Starting positions are balanced so each Empire has some room to expand before encountering other Empires."
 RUS: "В режиме игры «Песочница» вы можете выиграть игру, победив всех своих врагов или объединив галактику в альянс. Стартовые позиции сбалансированы, поэтому у каждой Империи есть пространство для расширения перед столкновением с другими Империями."
 SPA: "En el modo de juego Sandbox, puedes ganar el juego conquistando a todos tus enemigos o uniendo la galaxia en una alianza. Las posiciones iniciales están equilibradas para que cada Imperio tenga algo de espacio para expandirse antes de encontrarse con otros Imperios."
 UKR: "У режимі Пісочниця ви можете виграти гру, перемігши всіх своїх ворогів або об'єднавши галактику в альянс. Початкові позиції збалансовані, тому кожна імперія має певний простір для розвитку, перш ніж зіткнеться з іншими імперіями."
 PTB: "No modo de jogo Sandbox, você pode vencer conquistando todos os seus inimigos ou unindo a galáxia em uma aliança. As posições iniciais são equilibradas para que cada Império tenha algum espaço para se expandir antes de encontrar outros Impérios."
InTheAscensionGameMode:
 Id: 2107
 ENG: "In the Ascension game mode, the goal is to be the first race to ascend to Godhood by capturing the Remnant homeworld at the center of the galaxy."
 RUS: "В режиме \"Вознесение\" цель игры - стать первой расой, достигшей божественности, для чего необходимо захватить родной мир Выживших в центре галактики."
 SPA: "En el modo Ascensión, la meta es ser la primera raza en ascender y convertirse en una divinidad mediante la captura del mundo Remanente, situado en el centro de la galaxia."
 UKR: "В ігровому режимі Вознесіння мета полягає в тому, щоб стати першою расою, яка підніметься до Божества, захопивши рідну планету Древніх в центрі галактики."
 PTB: "No modo de jogo Ascensão, o objetivo é ser a primeira raça a ascender à Divindade capturando o mundo natal Remnant no centro da galáxia."
