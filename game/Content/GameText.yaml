 PTB: "Estudos Remnant"
BB_Tech_RemnantStudies_Desc:
 Id: 2145
 ENG: "We are literally piecing together the mystery of the Remnant using the salvage we have obtained. Some of this technology should be relatively simple to reverse engineer."
 RUS: "Сейчас мы буквально по крупицам собираем информацию о Предтечах, используя в своем анализе найденные фрагменты их уничтоженных кораблей. Некоторые из их технологий должны довольно легко поддаваться обратному инжинирингу."
 SPA: "Utilizamos los restos recuperados de naves Remanentes destruidas para reunir las piezas del puzle del misterio de los Remanentes. Parte de esta tecnología debería ser relativamente fácil de descifrar con ingeniería inversa."
 UKR: "Ми буквально збираємо по шматочках таємницю Древніх, використовуючи отримані нами уламки. Деякі з цих технологій відносно легко піддаються реінжинірингу."
 PTB: "Estamos literalmente montando o mistério dos Remnant usando os salvamentos que obtivemos. Parte desta tecnologia deve ser relativamente simples de aplicar engenharia reversa."
BB_Tech_RemnantComputing_Name:
 Id: 2146
 ENG: "Remnant Computing"
 RUS: "Компьютеры Предтечь"
 SPA: "Computación Remanente"
 UKR: "Комп'ютери Древніх'"
 PTB: "Computação Remnant"
BB_Tech_RemnantComputing_Desc:
 Id: 2147
 ENG: "Our study of Remnant Ships has led us to believe we can build a structure that will detect incoming Remnant ships, should they every target us."
 RUS: "Наше исследование кораблей-Предтечь привело нас к мысли, что мы можем построить радар, который будет обнаруживать прибывающие корабли-Предтечей, если те будут лететь на нас."
 SPA: "Nuestro estudio de la tecnología Remanente ha revelado dos datos clave: que se trata de una tecnología antiquísima, y que las naves Remanentes que hemos encontrado hasta ahora son, sin duda alguna, drones automatizados. No obstante, dichos drones no parecen ser totalmente autónomos. De alguna forma, reciben una señal, aunque somos incapaces de detectar su origen. Nuestros científicos quieren construir un dispositivo para localizar la fuente de la señal. "
 UKR: "Наше дослідження кораблів Древніх привело нас до думки, що ми можемо побудувати структуру, яка буде виявляти кораблі Древніх, якщо вони будуть націлені на нас."
 PTB: "Nosso estudo das Naves Remnant nos levou a acreditar que podemos construir uma estrutura capaz de detectar naves Remnant se algum dia elas nos tiverem como alvo."
RemnantDetectionArray:
 Id: 2148
 ENG: "Remnant Detection Array"
 RUS: "Радарная станция Предтечь"
 SPA: "Matriz de detección Remanente"
 UKR: "Масив виявлення Древніх"
 PTB: "Matriz de Detecção Remnant"
OurScientistsBelieveThatThis:
 Id: 2149
 ENG: "Our scientists believe that this building will allow us to detect any remnant fleet targeting a system if this building in built on any of it's planets. it will also have an ETA."
 RUS: "Ученые считают, что это здание позволит нам обнаружить любой флот Предтечей, нацеленный на систему, если это здание построено на любой из ее планет."
 SPA: "Nuestros científicos creen que este edificio nos permitirá detectar el origen de la señal que controla los drones Remanentes en nuestra galaxia. "
 UKR: "Наші вчені вважають, що ця будівля дозволить нам виявити будь-який флот Древніх, що націлився на систему, якщо ця будівля буде побудована на одній з її планет. вона також визначить час прибуття."
 PTB: "Nossos cientistas acreditam que este edifício nos permitirá detectar qualquer frota Remnant mirando um sistema se este edifício estiver construído em qualquer um de seus planetas. Ele também exibirá um ETA."
SpecialBuilding:
 Id: 2150
 ENG: "Remnant Fleet Detector"
 RUS: "Детектор флота Предтечь"
 SPA: "Edificio especial"
 UKR: "Детектор флоту Древніх"
 PTB: "Detector de Frota Remnant"
YouCurrentlyHaveAPeace:
 Id: 2151
 ENG: "You currently have a peace treaty with this empire and cannot declare war until it expires"
 RUS: "Сейчас у вас с этой империей подписан мирный договор, и вы не можете объявить ей войну, пока срок его действия не истечет."
 SPA: "Actualmente, tienes un tratado de paz con este imperio y no puedes declararle la guerra hasta que expire"
 UKR: "Наразі ви маєте мирний договір з цією імперією і не можете оголосити війну, поки він не закінчиться"
 PTB: "Você atualmente tem um tratado de paz com este império e não pode declarar guerra até que ele expire"
ANonaggressionPactIsA:
 Id: 2152
 ENG: "A Non-Aggression Pact is a mutual pledge to not attack one another. Entering into this pact will steadily improve your relations with the target empire. Breaking this pact will cause a serious negative impact on your relationship with every other empire."
 RUS: "Пакт о ненападении - это взаимное обещание не нападать друг на друга. При заключении пакта о ненападении с другой империей ее отношение к вам будет постоянно улучшаться. Нарушение пакта приведет к значительному ухудшению отношений со всеми остальными империями."
 SPA: "Un pacto de no agresión es una promesa entre dos imperios de no atacarse. Al firmar este pacto, tus relaciones con el otro imperio mejorarán a ritmo constante. Si violas el pacto, las consecuencias para tus relaciones con todos los demás imperios serán muy negativas."
 UKR: "Пакт про ненапад - це взаємна обіцянка не нападати один на одного. Укладення цього пакту буде постійно покращувати ваші відносини з цільовою імперією. Порушення цього пакту спричинить серйозний негативний вплив на ваші відносини з усіма іншими імперіями."
 PTB: "Um Pacto de Não Agressão é uma promessa mútua de não atacar um ao outro. Entrar neste pacto melhorará gradualmente suas relações com o império-alvo. Quebrar este pacto causará um sério impacto negativo no seu relacionamento com todos os outros impérios."
AnOpenBordersTreatyWill:
 Id: 2153
 ENG: "An open borders treaty will allow you to move freely within the other empire's space. Note that this is not necessarily a reciprocal treaty. If you offer open borders then the target empire will be able to move within your space as if it were there own. However, you will need the target empire to offer you open borders as well if you wish to move freely within their space. The target empire will not become angry with you for having ships in their space if they have opened their borders to you. "
 RUS: "Договор об открытых границах позволит вам беспрепятственно перемещаться в пространстве империи, с которой у вас заключен этот договор. Обратите внимание, что данный договор необязательно является обоюдным. Если вы предложите другой империи открыть свои границы для нее, она сможет перемещать свои корабли в вашем пространстве, как в своем собственном. Однако для того чтобы вы могли делать то же самое в ее пространстве, та империя сама должна предложить вам открытие границ. При действующем договоре об открытых границах в империи не будет нарастать недовольство при находящихся в ее пространстве кораблях империи-партнера."
 SPA: "Un tratado de apertura de fronteras te permitirá moverte con libertad por el espacio de otro imperio. Ten en cuenta que este acuerdo no es necesariamente recíproco. Si se lo ofreces a otro imperio, este podrá moverse por tu territorio como si fuera el suyo. Sin embargo, tendrás que tener el permiso de dicho imperio si tú deseas hacer lo mismo. Si te abre sus fronteras, el otro imperio no se enfadará contigo por que tengas naves en su espacio. "
 UKR: "Договір про відкриті кордони дозволить вам вільно пересуватися територією іншої імперії. Зверніть увагу, що це не обов'язково взаємний договір. Якщо ви запропонуєте відкриті кордони, то цільова імперія зможе пересуватися у вашому просторі так, ніби він є її власним. Однак, якщо ви хочете вільно пересуватися в їхньому просторі, вам потрібно, щоб і імперія-ціль також запропонувала вам відкриті кордони. Цільова імперія не буде гніватися на вас за наявність кораблів у її просторі, якщо вона відкрила вам свої кордони."
 PTB: "Um tratado de fronteiras abertas permitirá que você se mova livremente pelo espaço do outro império. Observe que isso não é necessariamente um tratado recíproco. Se você oferecer fronteiras abertas, o império-alvo poderá se mover pelo seu espaço como se fosse o dele. No entanto, você precisará que o império-alvo também ofereça fronteiras abertas a você se quiser se mover livremente pelo espaço dele. O império-alvo não ficará irritado com você por ter naves em seu espaço se tiver aberto suas fronteiras para você."
PeaceTreatiesLastForTurns:
 Id: 2154
 ENG: "Peace treaties last for 100 turns. During this time, neither empire may declare war on the other empire. Existing grievances between the two empires will slowly abate. "
 RUS: "Мирный договор длится 100 ходов. В это время ни одна из империй-участниц договора не может объявить войну партнерской империи. Существующие обиды между этими двумя империи в период мирного договора будут постепенно сходить на нет."
 SPA: "Los tratados de paz duran 100 turnos. Durante este tiempo, ninguno de los imperios firmantes puede declarar la guerra al otro. Si existen disputas entre los dos, se aplacarán gradualmente. "
 UKR: "Мирні договори тривають 100 ходів. Протягом цього часу жодна з імперій не може оголосити війну іншій імперії. Існуючі претензії між двома імперіями поступово вщухають."
 PTB: "Tratados de paz duram 100 turnos. Durante esse tempo, nenhum império pode declarar guerra ao outro. Queixas existentes entre os dois impérios desaparecerão lentamente."
TradeTreatiesCreateWealthFor:
 Id: 2155
 ENG: "Trade treaties create wealth for both empires depending on how long the treaty has been in effect. At the beginning of a trade treaty, both empires will lose income while the trade routes are established. After a period of time, the trade treaties will eventually break even and then begin to produce profits."
 RUS: "Торговое соглашение приносит выгоду обеим империям в зависимости от того, сколько времени оно уже просуществовало. Сразу после заключения торгового соглашения империи будут терять какое-то количество своего дохода, пока идет формирование торговых маршрутов. Спустя некоторое время торговля выйдет на нулевой баланс, а затем начнет приносить дивиденды."
 SPA: "Los tratados comerciales generan riqueza para los dos imperios en función de cuanto tiempo estén en vigor. Al principio de un tratado, ambos perderán ingresos mientras se establecen las rutas comerciales. Al cabo de cierto tiempo, los tratados incluso se romperán y se empezarán a generar beneficios."
 UKR: "Торговельні договори створюють багатство для обох імперій в залежності від того, як довго діє договір. На початку дії торговельного договору обидві імперії втрачають доходи, поки встановлюються торговельні шляхи. Через деякий час торгові договори стають беззбитковими, а потім починають приносити прибутки."
 PTB: "Tratados comerciais criam riqueza para ambos os impérios dependendo de há quanto tempo o tratado está em vigor. No início de um tratado comercial, ambos os impérios perderão renda enquanto as rotas comerciais são estabelecidas. Após um período, os tratados comerciais acabarão atingindo o equilíbrio e então começarão a gerar lucro."
AlliancesAreSeriousCommitmentsBetween:
 Id: 2156
 ENG: "Alliances are serious commitments between two or more empires. Alliance members will expect you to war upon their enemies and will become angry if you refuse. Alliances carry all of the benefits of open borders treaties and non-aggression pacts as well. Finally, Alliances increase the maximum trust possible between two empires, meaning that large trade deals can occur more frequently."
 RUS: "Альянс - это серьезный договор о взаимопомощи между двумя или несколькими империями. Члены альянса вправе ожидать от вас помощи в войнах, которые они ведут, и они рассердятся на вас, если вы им откажете. Альянс автоматически подразумевает заключение договоров об открытых границах и ненападении. Кроме того, при альянсе максимальный уровень доверия между империями может быть выше, что позволяет чаще заключать крупные сделки."
 SPA: "Las alianzas son compromisos serios entre dos o más imperios. Sus integrantes esperarán de ti que combatas a sus enemigos y se enojarán si te niegas. Las alianzas conllevan todas las ventajas de los tratados de apertura de fronteras y pactos de no agresión. Por último, las alianzas incrementan al máximo posible la confianza entre dos imperios, lo cual aumentará la frecuencia de los tratados comerciales importantes."
 UKR: "Альянси - це серйозні зобов'язання між двома або більше імперіями. Члени альянсу очікують, що ви будете воювати проти їхніх ворогів, і розсердяться, якщо ви відмовитеся. Альянси несуть в собі всі переваги договорів про відкриті кордони і пактів про ненапад. Нарешті, альянси підвищують рівень довіри між двома імперіями, а це означає, що великі торгові угоди можуть відбуватися частіше."
 PTB: "Alianças são compromissos sérios entre dois ou mais impérios. Membros da aliança esperarão que você declare guerra contra os inimigos deles e ficarão irritados se você se recusar. Alianças também carregam todos os benefícios de tratados de fronteiras abertas e pactos de não agressão. Por fim, Alianças aumentam a confiança máxima possível entre dois impérios, o que significa que grandes acordos comerciais podem ocorrer com mais frequência."
SignalOrigin:
 Id: 2157
 ENG: "Signal Origin"
 RUS: "Источник сигнала"
 SPA: "Origen de señal"
 UKR: "Походження сигналу"
 PTB: "Origem do Sinal"
ThisMysteriousBuildingAppearsTo:
 Id: 2158
 ENG: "This mysterious building appears to be the origin of the Remnant Control signal. We need to get a team on the ground to investigate it, but it is heavily defended."
 RUS: "Это странное здание, похоже, является источником управляющих сигналов Выживших. Чтобы исследовать его, мы должны отправить к нему наземные войска - но оно очень хорошо защищено."
 SPA: "Este misterioso edificio parece ser el origen de la señal de control de los Remanentes. Tenemos que desplegar un equipo sobre el terreno para investigarla, pero su defensa es muy sólida."
 UKR: "Ця таємнича будівля, схоже, є джерелом сигналу яка контролює Древніх. Нам потрібно відправити туди команду, щоб дослідити її, але вона добре захищена."
 PTB: "Este edifício misterioso parece ser a origem do sinal de Controle Remnant. Precisamos colocar uma equipe em solo para investigá-lo, mas ele é fortemente defendido."
AnAncientPortalOfSome:
 Id: 2159
 ENG: "An ancient portal of some kind"
 RUS: "Какой-то древний портал"
 SPA: "Un portal antiguo de algún tipo"
 UKR: "Якийсь древній портал"
 PTB: "Um portal antigo de algum tipo"
BB_Tech_OwlwokFreedom_Name:
 Id: 2160
 ENG: "Owlwok Freedom"
 RUS: "Свобода соворков"
 SPA: "Libertad Owlwok"
 UKR: "Свобода оввоків"
 PTB: "Liberdade Owlwok"
BB_Tech_OwlwokFreedom_Desc:
 Id: 2161
 ENG: "We believe that we can engineer an antidote to the Cordrazine control serum used to enslave the Owlwoks. Ideally we could spread this antidote via a bomb dropped into the atmosphere of a Cordrazine world, freeing the Owlwoks from their slavery."
 RUS: "Мы полагаем, что сможем синтезировать антидот к сыворотке Кордразинов, с помощью которой они порабощают соворков. В идеале его нужно будет разбрызгать над планетой, взорвав в атмосфере химическую бомбу. После этого соворки освободятся от рабства."
 SPA: "Creemos que podemos diseñar un antídoto para el suero de control que los Cordrazine emplean para esclavizar a los Owlwoks. Lo ideal sería esparcir en la atmósfera este antídoto lanzando una bomba sobre un mundo Cordrazine; con ello liberaríamos a los Owlwoks de su esclavitud."
 UKR: "Ми віримо, що зможемо створити протиотруту від контрольної сироватки Кордразинів, яку використовували для поневолення оввоків. В ідеалі ми могли б розповсюдити цю протиотруту за допомогою бомби, скинутої в атмосферу кордразинового світу, звільнивши Оввоків від їхнього рабства."
 PTB: "Acreditamos que podemos desenvolver um antídoto para o soro de controle Cordrazine usado para escravizar os Owlwoks. O ideal seria espalhar esse antídoto por meio de uma bomba lançada na atmosfera de um mundo Cordrazine, libertando os Owlwoks da escravidão."
OwlwokLiberator:
 Id: 2162
 ENG: "Owlwok Liberator"
 RUS: "Освободитель соворков"
 SPA: "Liberador Owlwok"
 UKR: "Визволитель Оввоків"
 PTB: "Libertador Owlwok"
ThisDeviceWillSpreadA:
 Id: 2163
 ENG: "This device will spread a fast-acting antidote to the mind control serum used by the Cordrazine to enslave the Owlwoks."
 RUS: "Это устройство распылит в атмосфере быстродействующий антидот к сыворотке Кордразинов, с помощью которой они порабощают соворков."
 SPA: "Este dispositivo esparcirá un antídoto de acción rápida contra el suero de control que los Cordrazine emplean para esclavizar a los Owlwoks."
 UKR: "Цей пристрій поширюватиме швидкодіючий антидот проти сироватки для контролю свідомості, яку кордразини використовували для поневолення Оввоків."
 PTB: "Este dispositivo espalhará um antídoto de ação rápida contra o soro de controle mental usado pelos Cordrazine para escravizar os Owlwoks."
ReinforcedBulkhead:
 Id: 2164
 ENG: "Reinforced Bulkhead"
 RUS: "Средняя переборка"
 SPA: "Mamparo reforzado"
 UKR: "Посилена перегородка"
 PTB: "Antepara Reforçada"
ThisLargeMetalBulkheadProvides:
 Id: 2165
 ENG: "This large metal bulkhead provides moderate protection for your internal systems at a low cost. This module is not suitable for use in external slots because the metal is not treated for protection against the rigors of space travel."
 RUS: "Эта мощная металлическая переборка обеспечивает средний уровень защиты внутренних систем корабля за очень доступную цену. Этот модуль непригоден к использованию во внешних ячейках, поскольку металл переборки не приспособлен к условиям открытого космоса."
 SPA: "Este gran mamparo metálico proporciona una protección moderada para tus sistemas internos a un coste bajo. Este módulo no es apto para usarse en ranuras externas porque el metal no está tratado para resguardar contra los rigores de los viajes espaciales."
 UKR: "Ця велика металева перегородка забезпечує помірний захист ваших внутрішніх систем за низькою ціною. Цей модуль не підходить для використання в зовнішніх слотах, оскільки метал не оброблений для захисту від суворих умов космічної подорожі."
 PTB: "Esta grande antepara de metal fornece proteção moderada para seus sistemas internos a baixo custo. Este módulo não é adequado para uso em espaços externos porque o metal não é tratado para proteção contra os rigores das viagens espaciais."
InternalBulkhead:
 Id: 2166
 ENG: "Internal Bulkhead"
 RUS: "Малая переборка"
 SPA: "Mamparo interior"
 UKR: "Внутрішня перегородка"
 PTB: "Antepara Interna"
ThisSmallMetalBulkheadProvides:
 Id: 2167
 ENG: "This small metal bulkhead provides protection for your internal systems at a low cost. This module is not suitable for use in external slots because the metal is not treated for protection against the rigors of space travel."
 RUS: "Эта маленькая металлическая переборка обеспечивает средний уровень защиты критических внутренних систем за очень доступную цену. Этот модуль непригоден к использованию во внешних ячейках, поскольку металл переборки не приспособлен к условиям открытого космоса."
 SPA: "Este pequeño mamparo metálico protege tus sistemas internos a un coste bajo. Este módulo no es apto para usarse en ranuras externas porque el metal no está tratado para resguardar contra los rigores de los viajes espaciales."
 UKR: "Ця невелика металева перегородка забезпечує захист ваших внутрішніх систем за низькою ціною. Цей модуль не підходить для використання в зовнішніх слотах, оскільки метал не оброблений для захисту від суворих умов космічної подорожі."
 PTB: "Esta pequena antepara de metal fornece proteção para seus sistemas internos a baixo custo. Este módulo não é adequado para uso em espaços externos porque o metal não é tratado para proteção contra os rigores das viagens espaciais."
TogglesTheWeaponFireArc:
 Id: 2168
 ENG: "Toggles the weapon fire arc and shield protection radius display on or off for this ship. Hotkey: TAB"
 RUS: "Переключает режим отображения сектора огня оружия и радиуса защиты щита для данного корабля. Горячая клавиша: TAB"
