YourEmpireWillAutomaticallyManage:
 Id: 2226
 ENG: "Your empire will automatically manage ANY scouts ships that you own. If you do not own enough, it will create more scout ships (matching the name selected below) so long as the galaxy has unexplored systems. If you assign a scout ship to a fleet or give it orders, it will stay under your manual command, until the order is complete or it is not assigned to a fleet anymore."
 UKR: "Ваша імперія автоматично керуватиме всіма кораблями-розвідниками, якими ви володієте. Якщо у вас недостатньо кораблів-розвідників, вона створить більше кораблів-розвідників (з відповідною назвою, вибраною нижче) до тих пір, поки в галактиці є недосліджені системи. Якщо ви призначите корабель-розвідник до флоту або віддасте йому наказ, він залишатиметься під вашим ручним командуванням доти, доки наказ не буде виконано або поки його не буде призначено до флоту."
 PTB: "Seu império gerenciará automaticamente QUALQUER nave exploradora que você possuir. Se você não possuir o suficiente, ele criará mais naves exploradoras (correspondendo ao nome selecionado abaixo) enquanto a galáxia tiver sistemas inexplorados. Se você atribuir uma nave exploradora a uma frota ou der ordens a ela, ela permanecerá sob seu comando manual até que a ordem seja concluída ou ela não esteja mais atribuída a uma frota."
YourEmpireWillAutomaticallyCreate:
 Id: 2227
 ENG: "Your empire will automatically create and deploy colony ships to desirable planets. Colony ships will not be dispatched to planets with a known nearby enemy presence"
 RUS: "Ваша империя будет автоматически создавать корабли-колонисты и отправлять их к планетам, которые желательно колонизировать. Колонисты не будут отправляться к планетам, где присутствуют силы противника"
 SPA: "Tu imperio creará y desplegará automáticamente naves coloniales en los planetas convenientes. Las naves coloniales no se enviarán a planetas con presencia enemiga cercana"
 UKR: "Ваша імперія автоматично створить і відправить кораблі-колонії на бажані планети. Кораблі-колонії не будуть відправлені на планети з відомою присутністю ворога поблизу"
 PTB: "Seu império criará e implantará automaticamente naves coloniais em planetas desejáveis. Naves coloniais não serão enviadas a planetas com presença inimiga próxima conhecida"
YourEmpireWillAutomaticallyCreate2:
 Id: 2228
 ENG: "Your empire will automatically create and deploy subspace projectors for the creation of star lanes between your systems. Note that this depends on your freighter lanes traffic. The more traffic passes between 2 systems, the better the chance a lane will be created."
 UKR: "Ваша імперія автоматично створить і розгорне підпросторові проектори для створення зоряних доріжок між вашими системами. Зверніть увагу, що це залежить від трафіку на ваших вантажних шляхах. Чим більше трафіку проходить між 2 системами, тим більша ймовірність того, що смуга буде створена."
 PTB: "Seu império criará e implantará automaticamente projetores subespaciais para a criação de rotas estelares entre seus sistemas. Observe que isso depende do tráfego das suas rotas de cargueiros. Quanto mais tráfego passar entre 2 sistemas, maior a chance de uma rota ser criada."
YourEmpireWillAutomaticallyManage2:
 Id: 2229
 ENG: "Your empire will automatically manage your freighter needs, creating freighters to transport food and passengers where needed. You will still need to designate which planets import and export various goods or select a Governor for them. You may select here a specific Freighter name you wish your Empire will use."
 RUS: "Ваша империя будет автоматически контролировать вашу транспортную сеть, строя транспорты для перевозки еды и пассажиров в случае необходимости. Вам по-прежнему придется указывать вручную, какие планеты будут экспортировать и импортировать различные товары."
 SPA: "Tu imperio gestionará automáticamente tus necesidades de transporte, creando cargueros para llevar comida y pasajeros donde haga falta. Seguirás teniendo que decidir qué planetas importarán y exportarán los distintos bienes"
 UKR: "Ваша імперія буде автоматично управляти вашими потребами у вантажоперевезеннях, створюючи вантажні кораблі для транспортування їжі та пасажирів, де це необхідно. Вам все одно потрібно буде визначити, які планети імпортують і експортують різні товари, або вибрати для них губернатора. Тут ви можете вибрати конкретне ім'я вантажного корабля, яке буде використовуватися вашою імперією."
 PTB: "Seu império gerenciará automaticamente suas necessidades de cargueiros, criando cargueiros para transportar alimento e passageiros conforme necessário. Você ainda precisará definir quais planetas importam e exportam vários bens ou selecionar um Governador para eles. Você pode selecionar aqui um nome específico de Cargueiro que deseja que seu Império use."
YourTroopsWillAutomaticallyEngage:
 Id: 2230
 ENG: "Your troops will automatically engage in ground combat even if you are viewing the combat. If you disable this option then you will need to manually control the ground combat if you are viewing it. Unviewed combats will still be automatically managed."
 RUS: "Ваши войска будут автоматически вступать в наземный бой, даже если вы сами наблюдаете за ним. Если вы отключите эту опцию, вы должны будете управлять ходом боя самостоятельно, если вы ведете за ним наблюдение. Бои, за которыми вы не наблюдаете лично, по-прежнему будут проходить в автоматическом режиме."
 SPA: "Tus tropas emprenderán automáticamente el combate terrestre aunque tú lo observes. Si desactivas esta opción, tendrás que controlar de forma manual el combate terrestre si lo estás viendo. Los combates que no se estén viendo, se resolverán de manera automática."
 UKR: "Ваші війська будуть автоматично брати участь у наземному бою, навіть якщо ви його переглядаєте. Якщо ви вимкнете цю опцію, вам доведеться вручну керувати наземним боєм, якщо ви його переглядаєте. Бої, які ви не переглядаєте, все одно будуть управлятися автоматично."
 PTB: "Suas tropas entrarão automaticamente em combate terrestre mesmo se você estiver visualizando o combate. Se desativar esta opção, você precisará controlar manualmente o combate terrestre se estiver visualizando-o. Combates não visualizados ainda serão gerenciados automaticamente."
