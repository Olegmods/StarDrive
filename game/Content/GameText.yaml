ThisPlanetsPopulationIsShrinking:
 Id: 344
 ENG: "This planet's population is shrinking due to starvation!"
 RUS: "Население этой планеты уменьшается из-за голода!"
 SPA: "¡La población de este planeta está disminuyendo por falta de alimentos!"
 UKR: "Населення планети скорочується через голод!"
 PTB: "A população deste planeta está diminuindo por causa da fome!"
ThisPlanetIsManuallyExporting:
 Id: 345
 ENG: "This planet is manually exporting production. It will only allocate some percentage of it's net production to the build queue if freighters are exporting production from this planet. If there is no demand, it will allocate it's storage to the building queue as well."
 RUS: "Поскольку эта планета занята экспортом производства. 25% ее промышленности складируется, а не идет в счет очереди строительства. Оставшаяся часть промышленности планеты идет на очередь строительства."
 SPA: "Este planeta exporta producción, así que el 25% de su producción neta se almacena en vez de destinarse a la cola de construcción y solo el resto se usa para construir."
 UKR: "Ця планета експортує продукцію вручну. Вона виділить певний відсоток свого чистого виробництва в чергу на будівництво, тільки якщо вантажні кораблі експортують продукцію з цієї планети. Якщо попит відсутній, вона також виділить свої запаси в чергу на будівництво."
 PTB: "Este planeta está exportando produção manualmente. Ele só alocará uma porcentagem de sua produção líquida para a fila de construção se cargueiros estiverem exportando produção deste planeta. Se não houver demanda, ele também alocará seu armazenamento à fila de construção."
ThisPlanetIsManuallyImporting:
 Id: 346
 ENG: "This planet is manually importing production. Any storage available as well as any production produced here will be automatically applied to the construction queue"
 RUS: "Эта планета импортирует производство. Все производство на этой планете автоматически идет в очередь строительства, а сохраненная продукция может быть распределена вручную для ускорения строительства."
 SPA: "Este planeta importa producción. Lo que se produzca aquí se destinará automáticamente a la cola de construcción, mientras que la producción almacenada deberá seleccionarse manualmente para acelerar la producción."
 UKR: "Ця планета імпортує виробництво вручну. Будь-яке доступне сховище, а також будь-яка продукція, вироблена тут, буде автоматично використана в черзі будівництва"
 PTB: "Este planeta está importando produção manualmente. Todo armazenamento disponível, bem como qualquer produção produzida aqui, será automaticamente aplicado à fila de construção"
ThisPlanetIsManuallyStoring:
 Id: 347
 ENG: "This planet is manually storing production. Only 50% of net production capacity will be allocated to the build queue, the rest will be stored, until the storage is full."
 RUS: "Эта планета не импортирует и не экспортирует производство. Если в очереди строительства нет кораблей, зданий или войск, эта продукция будет складироваться для использования в дальнейшем."
 SPA: "Este planeta ni importa ni exporta producción. Si no hay naves, edificios o tropas en la cola de construcción, la producción se almacenará para usarse más tarde."
 UKR: "Ця планета зберігає виробництво вручну. Лише 50% чистої виробничої потужності буде виділено в чергу на будівництво, решта буде зберігатися, поки сховище не заповниться."
 PTB: "Este planeta está armazenando produção manualmente. Apenas 50% da capacidade líquida de produção será alocada à fila de construção; o restante será armazenado até o armazenamento ficar cheio."
