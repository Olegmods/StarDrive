VegetarianRebelsHaveDevelopedA:
 Id: 2090
 ENG: "Vegetarian rebels have developed a sick taste for the leaves of their own people. They have been rumored to sometimes even eat themselves. "
 RUS: "Бунтовщикам-вегетарианцам нравится вкус листьев своих собственных собратьев. Ходят слухи, что иногда они едят друг друга целиком. "
 SPA: "Los rebeldes vegetarianos han desarrollado un gusto enfermizo por las hojas de su propio pueblo. Se rumorea que a veces hasta se comen entre ellos. "
 UKR: "повстанці-вегетаріанці розвинули хворобливий смак до листя власного народу. Подейкують, що іноді вони навіть їдять самих себе."
 PTB: "Rebeldes vegetarianos desenvolveram um gosto doentio pelas folhas de seu próprio povo. Há rumores de que às vezes até comem a si mesmos."
ChampionsOfTheFreedOwlwok:
 Id: 2091
 ENG: "Champions of the Freed Owlwok rebellion, these courageous troops fight to free their enslaved brothers and sisters."
 RUS: "Эти отважные воины из движения за свободу соворков ведут борьбу за освобождение их братьев и сестер из рабства."
 SPA: "Estos valientes, los campeones de la rebelión Owlwok libertaria, luchan por liberar a sus hermanos y hermanas esclavizados."
 UKR: "Чемпіони повстання Вільних Оввоків, ці мужні воїни борються за звільнення своїх поневолених братів і сестер."
 PTB: "Campeões da rebelião Owlwok Livre, estas tropas corajosas lutam para libertar seus irmãos e irmãs escravizados."
EspousingARadicallyXenophobicAgenda:
 Id: 2092
 ENG: "Espousing a radically xenophobic agenda, these troops fight to overthrow a government they feel is too xeno-friendly."
 RUS: "Отряды этих воинов, являющихся ксенофобами до мозга костей, пытаются свергнуть правительство, являющееся, на их взгляд, слишком толерантным."
 SPA: "Estas tropas son partidarias de una agenda xenófoba, luchan por derrocar un gobierno que, para su gusto, es demasiado tolerante con los alienígenas."
 UKR: "Відстоюючи радикально ксенофобські погляди, ці війська борються за повалення уряду, який, на їхню думку, є надто дружнім до ксеносів."
 PTB: "Defendendo uma agenda radicalmente xenofóbica, estas tropas lutam para derrubar um governo que consideram amigável demais aos xenos."
EspousingARadicallyXenophobicAgenda2:
 Id: 2093
 ENG: "Espousing a radically xenophobic agenda, these troops fight to overthrow a government they feel is too xeno-friendly."
 RUS: "Отряды этих воинов, являющихся ксенофобами до мозга костей, пытаются свергнуть правительство, являющееся, на их взгляд, слишком толерантным."
 SPA: "Estas tropas son partidarias de una agenda xenófoba, luchan por derrocar un gobierno que, para su gusto, es demasiado tolerante con los alienígenas."
 UKR: "Відстоюючи радикально ксенофобські погляди, ці війська борються за повалення уряду, який, на їхню думку, є надто дружнім до ксеносів."
 PTB: "Defendendo uma agenda radicalmente xenofóbica, estas tropas lutam para derrubar um governo que consideram amigável demais aos xenos."
TheseNobleTroopsFightTo:
 Id: 2094
 ENG: "These noble troops fight to tear down the ruling council and to replace it with a fairly elected democratic parliment."
 RUS: "Эти благородные воины пытаются низложить правящий совет, заместив его народным демократическим открыто избранным правительством."
 SPA: "Estas nobles tropas luchan por derrocar al consejo gobernante y sustituirlo por un parlamento elegido justa y democráticamente."
 UKR: "Ці благородні війська борються за повалення правлячої ради і заміну її чесно обраним демократичним парламентом."
 PTB: "Estas nobres tropas lutam para derrubar o conselho governante e substituí-lo por um parlamento democraticamente eleito."
TheseKulrathiHaveLostThemselves:
 Id: 2095
 ENG: "These Kulrathi have lost themselves to bloodlust, living only for battle, glory, and honor."
 RUS: "Эти Кулрати полностью отдались охватившему их боевому безумию, и теперь они живут только ради битв, чести и славы."
 SPA: "Estos Kulrathi están sedientos de sangre: solo viven para la batalla, la gloria y el honor."
 UKR: "Ці Кулратхі втратили себе у жадобі крові, живучи лише заради битви, слави та честі."
 PTB: "Estes Kulrathi se perderam na sede de sangue, vivendo apenas pela batalha, glória e honra."
CyberneticDronesThatHaveEvolved:
 Id: 2096
 ENG: "Cybernetic drones that have evolved a sense of independence, they fight only to retain their unique consciousness seperate from the hive mind."
 RUS: "Эти кибернетические организмы смогли выработать в себе чувство независимости, и теперь сражаются за право сохранить свое сознание, отделенное от общего разума."
 SPA: "Los drones cibernéticos han desarrollado un marcado sentido de independencia: luchan únicamente por conservar su conciencia única separada de la mente de la colmena."
 UKR: "Кібернетичні дрони, які розвинули в собі почуття незалежності, борються лише за те, щоб зберегти свою унікальну свідомість, відокремлену від розуму вулика."
 PTB: "Drones cibernéticos que desenvolveram um senso de independência; eles lutam apenas para preservar sua consciência única, separada da mente coletiva."
HereticalRalyehPriestsWhoQuestion:
 Id: 2097
 ENG: "Heretical Ralyeh priests who question the emperor's spiritual connection with The Elder God."
 RUS: "Ральехи-еретики, которые ставят под сомнение наличие духовной связи их императора с Древним Богом."
 SPA: "Los sacerdotes heréticos Ralyeh que cuestionan la conexión espiritual del emperador con el Dios Antiguo."
 UKR: "Єретичні священики Ралієх, які ставлять під сумнів духовний зв'язок імператора зі Старшим Богом."
 PTB: "Sacerdotes hereges Ralyeh que questionam a conexão espiritual do imperador com O Deus Ancião."
TheIntellectualClassHasRisen:
 Id: 2098
 ENG: "The intellectual class has risen up and fights to promote education and individual rights."
 RUS: "Класс интеллектуалов, восставших на борьбу за всеобщее образование и права."
 SPA: "La clase intelectual se ha sublevado y lucha por promover la educación y los derechos individuales."
 UKR: "Інтелектуальний клас піднявся і бореться за розвиток освіти та індивідуальних прав."
 PTB: "A classe intelectual se levantou e luta para promover a educação e os direitos individuais."
IndicatesTheAmountOfEmp:
 Id: 2099
 ENG: "Indicates the amount of EMP damage inflicted per shot. All ships have a natural EMP resistance equal to their size. When EMP damage exceeds a ship's EMP resistance, then the ship will temporarily be disabled. Ships shed EMP damage naturally at a fixed rate regardless of size. "
 RUS: "Указывает количество ЭМИ-урона, наносимого с каждым выстрелом. Все корабли обладают естественной ЭМИ-защитой в зависимости от размера. Если ЭМИ-урон превосходит сопротивляемость корабля, последний на короткое время выходит из строя. Корабли естественным образом восстанавливают часть полученного ЭМИ-урона с фиксированной скоростью вне зависимости от размера."
 SPA: "Indica la cantidad de daño PEM infligido por disparo. Todas las naves tienen una resistencia natural contra PEM igual a su tamaño. Cuando el daño PEM supera la resistencia PEM de una nave, esta queda temporalmente incapacitada. Las naves se recuperan del daño PEM a un ritmo fijo, con independencia del tamaño. "
 UKR: "Показує кількість електромагнітної шкоди, що наноситься за один постріл. Всі кораблі мають природну стійкість до ЕМІ, що дорівнює їхньому розміру. Коли шкода від ЕМІ перевищує опір корабля до ЕМІ, корабель буде тимчасово виведено з ладу. Кораблі відновлюють пошкодження від ЕМІ природним чином з фіксованою швидкістю, незалежно від розміру."
 PTB: "Indica a quantidade de dano EMP infligido por disparo. Todas as naves têm uma resistência natural a EMP igual ao seu tamanho. Quando o dano EMP excede a resistência EMP de uma nave, ela será temporariamente desativada. Naves dissipam dano EMP naturalmente a uma taxa fixa, independentemente do tamanho."
RepairDroneLauncher:
 Id: 2100
 ENG: "Repair Drone Launcher"
 RUS: "Модуль ремонтных зондов"
 SPA: "Reparar lanzadrones"
 UKR: "Модуль ремонтних дронів"
 PTB: "Lançador de Drones de Reparo"
ThisModuleLaunchesRepairDrones:
 Id: 2101
 ENG: "This module launches repair drones equipped with nano-repair modules. These drones will automatically target and heal nearby vessels, but they WONT heal ship that launched them. When their nanite supply is exhausted, the drones will deactivate. It is recommended to pair these modules with ordnance fabricators."
 RUS: "Этот модель выпускает в пространство специальные зонды, оснащенные ремонтными наномодулями. Эти зонды будут автоматически искать поврежденные корабли и ремонтировать их. После выработки ресурса зонды будут деактивированы. Рекомендуется использовать их в паре с изготовителями боеприпасов."
 SPA: "Este módulo lanza drones de reparación equipados con módulos de nanorreparación. Estos drones tratarán de reparar automáticamente las naves cercanas. Cuando sus reservas de nanobots se agotan, los drones se desactivan. Se recomienda dotar estos módulos con fabricadores de munición."
 UKR: "Цей модуль запускає ремонтні дрони, оснащені наноремонтними модулями. Ці дрони автоматично націлюватимуться на сусідні судна і ремонтуватимуть їх, але вони НЕ будуть ремонтувати кораблі, які їх висадили. Коли запас нанітів вичерпається, дрони деактивуються. Рекомендується використовувати ці модулі в парі з виробниками боєприпасів."
 PTB: "Este módulo lança drones de reparo equipados com módulos de nanorreparo. Esses drones mirarão automaticamente em embarcações próximas e as curarão, mas NÃO curarão a nave que os lançou. Quando o suprimento de nanitos se esgotar, os drones serão desativados. Recomenda-se combinar estes módulos com fabricadores de munição."
