 PTB: "Além disso, "
NavalTraditionIsVeryStrong:
 Id: 1379
 ENG: " naval tradition is very strong, and it can be expected that this race will have a strong fleet presence throughout the galaxy. "
 RUS: " известны своими сильными флотскими традициями, поэтому можно предположить, что эта раса будет наращивать в галактике свое военное присутствие. "
 SPA: " tienen una gran tradición naval, por lo que cabe esperar que sus tropas tengan una amplia presencia en toda la galaxia. "
 UKR: " військово-морські традиції дуже сильні, і можна очікувати, що ця раса матиме потужний флот по всій галактиці."
 PTB: " a tradição naval é muito forte, e pode-se esperar que esta raça tenha uma forte presença de frota por toda a galáxia. "
AreNaturalSailorsAndShipwrights:
 Id: 1380
 ENG: " are natural sailors and shipwrights, having a long and colorful history of exploring their homeworld's oceans. "
 RUS: " прирожденные моряки и кораблестроители, на протяжении многих столетий бороздившие просторы океанов своего родного мира. "
 SPA: " son constructores navales y marinos natos y tienen una rica historia en exploración oceánica de su mundo natal. "
 UKR: " є природженими моряками та корабельниками, які мають довгу та яскраву історію дослідження океанів рідної планети."
 PTB: " são marinheiros e construtores navais naturais, com uma longa e colorida história de exploração dos oceanos de seu mundo natal. "
PossessASomewhatDuplicitousNature:
 Id: 1381
 ENG: " possess a somewhat duplicitous nature and as a result make excellent spies. "
 RUS: " отличаются исключительной двуличностью, вследствие чего из них выходят отличные шпионы. "
 SPA: " poseen una naturaleza algo embaucadora, por lo que son excelentes espías. "
 UKR: " мають дещо двоїстий характер і, як наслідок, є чудовими шпигунами."
 PTB: " possuem uma natureza um tanto dúplice e, como resultado, são excelentes espiões. "
LiveVeryOpenAndHonest:
 Id: 1382
 ENG: " live very open and honest lives, and as a result have a poor understanding of the concept of espionage. "
 RUS: " стараются жить честно и открыта, поэтому сама концепция шпионажа является для них совершенно чуждой. "
 SPA: " llevan vidas muy abiertas y honestas y, como resultado, no tienen bien asimilado el concepto de espionaje. "
 UKR: " живуть дуже відкритим і чесним життям і, як наслідок, погано розуміють поняття шпигунства."
 PTB: " vivem vidas muito abertas e honestas e, como resultado, têm pouca compreensão do conceito de espionagem. "
FinallyTheyAreADeeply:
 Id: 1383
 ENG: "Finally, they are a deeply spiritual people, leading ritualistic lives devoted to their religion.  "
 RUS: "И, наконец, это глубоко духовная раса, и ее представители очень религиозны. "
 SPA: "Por último, son un pueblo profundamente espiritual: son devotos de su religión y basan sus vidas en los rituales.  "
 UKR: "Нарешті, це глибоко духовний народ, який веде ритуальне життя, присвячене своїй релігії.  "
