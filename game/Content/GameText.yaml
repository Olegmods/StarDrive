TheLushVibranceOfThis:
 Id: 1729
 ENG: "The lush vibrance of this oceanic paradise is evident even from orbit. Scans reveal incredible biodiversity in the oceans and on the few large islands poking up from the depths. "
 RUS: "Этот цветущий океанический рай радует глаз даже с орбиты. Сканирование выявило необычайное разнообразие форм жизни как в океане, так и на немногочисленных островах. "
 SPA: "La exuberancia de este paraíso oceánico se aprecia ya desde la órbita. El escáner muestra una increíble biodiversidad en los océanos y en las pocas islas de gran tamaño que emergen de las profundidades. "
 UKR: "Буйне життя цього океанського раю видно навіть з орбіти. Сканування показує неймовірне біорізноманіття в океанах і на кількох великих островах, що виринають з глибин."
