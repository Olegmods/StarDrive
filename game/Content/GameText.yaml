UsingThisSliderYouCan:
 Id: 2286
 ENG: "Using this slider, you can lower the FTL speeds of ships that are within the gravity wells of Solar Systems. A value of 100% provides no penalty, whereas a value of 10% will make all ships 10x slower inside solar systems. The default value is 100%, meaning no penalty. Set this to 50% if you want to lower the game pace."
 RUS: "При помощи этого ползунка вы можете снизить сверхсветовые скорости кораблей, находящихся в гравитационных колодцах солнечных систем. Значение 100% означает отсутствие штрафа; значение 0% полностью предотвращает вход в варп в пределах солнечной системы."
 SPA: "Con este control deslizante puedes reducir las velocidades supraluminales de las naves que estén bajo el pozo gravitatorio de un sistema solar. Un valor del 100% no supone ninguna penalización, mientras que un valor de 0% impedirá por completo viajar a una velocidad superior a la de la luz dentro de un sistema solar."
 UKR: "За допомогою цього повзунка ви можете зменшити надсвітлову швидкість кораблів, які перебувають у гравітаційних колодязях сонячних систем. Значення 100% не передбачає ніякого штрафу, тоді як значення 10% зробить всі кораблі в 10 разів повільнішими всередині сонячних систем. Значення за замовчуванням - 100%, що означає відсутність штрафу. Встановіть значення 50%, якщо хочете знизити темп гри."
 PTB: "Usando este controle deslizante, você pode reduzir as velocidades FTL das naves que estão dentro dos poços gravitacionais dos Sistemas Solares. Um valor de 100% não fornece penalidade, enquanto um valor de 10% tornará todas as naves 10x mais lentas dentro dos sistemas solares. O valor padrão é 100%, ou seja, sem penalidade. Defina para 50% se quiser reduzir o ritmo do jogo."
