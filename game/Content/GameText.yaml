 ENG: "A bomb bay that allows a ship to strike a planet with low-yield tactical nuclear bombs. The Target planet will suffer temporary reduction to its Fertility level. Constant bombing might permanently reduce fertility and even change the plant climate forever."
 RUS: "Бомбовой отсек для бомбардировки планеты маломощными тактическими ядерными бомбами."
 SPA: "Compartimento de bombas que permite a una nave atacar con bombas nucleares tácticas de baja potencia."
 UKR: "Бомбовий відсік, який дозволяє кораблю завдати удару по планеті тактичними ядерними бомбами малої потужності. Планета-мішень зазнає тимчасового зниження рівня родючості. Постійні бомбардування можуть назавжди знизити родючість і навіть назавжди змінити рослинний клімат."
 PTB: "Uma baía de bombas que permite a uma nave atacar um planeta com bombas nucleares táticas de baixo rendimento. O planeta-alvo sofrerá uma redução temporária no nível de fertilidade. Bombardeios constantes podem reduzir permanentemente a fertilidade e até mudar o clima do planeta para sempre."
MedNuclearReactor:
