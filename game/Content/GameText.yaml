 Id: 4098
 ENG: "Broadside Flak Cannon"
 RUS: "Бортовая зенитная пушка"
 SPA: "Cañón antiaereo de costado"
 UKR: "Бортова зенітна гармата"
 PTB: "Canhão Antiaéreo Lateral"
ThisBroadsidemountedCannonIsCapable:
 Id: 4099
 ENG: "This broadside-mounted cannon is capable of delivering a higher-powered kinetic blast than its turret-mounted cousins. Weapon mobility and target tracking are traded for the opportunity to unleash hellish volleys of unaimed fire."
 RUS: "Эта бортовая пушка способна производить более мощный кинетический выстрел, чем ее собратья, установленные на башне. Подвижность оружия и отслеживание цели заменяется на возможность выпускать адские залпы кинетического огня."
 SPA: "Este cañon antiaereo montado de costado es capaz de dar impactos kineticos mas fuertes que sus variantes montadas en torreta. la mobilidad y la capacidad de apuntar son intercambiadas por la oportunidad de disparar salvas de tiros infernales."
 UKR: "Ця гармата, встановлена на борту, здатна видавати більш потужний кінетичний вибух, ніж її баштові побратими. Мобільність озброєння та відстеження цілі проміняні на можливість випускати пекельні залпи неприцільного вогню."
 PTB: "Este canhão montado na lateral é capaz de disparar uma rajada cinética mais poderosa que seus equivalentes montados em torre. Mobilidade da arma e rastreamento de alvo são trocados pela oportunidade de liberar salvas infernais de fogo sem mira precisa."
TheDelayBetweenAutoSaves:
 Id: 4100
 ENG: "The delay between auto saves. This is measured in unpaused, game relative seconds.\n--Common Durations--\n60 = 1 Minute\n300 = 5 Minutes (Default)\n600 = 10 Minutes"
 RUS: "Задержка между автосохранениями.Измеряется в относительных секундах игры без пауз.\n--Common Durations--\n60 = 1 Minute\n300 = 5 Minutes (Default)\n600 = 10 Minutes"
 SPA: "La espera entre guardados automaticos. Esto es medido cuando no esta pausado, segundos relativos del juego.\n--Duración comunes--\n60 = 1 Minuto\n300 = 5 Minutos (Por defecto)\n600 = 10 Minutos"
 UKR: "Затримка між автозбереженнями. Вимірюється у секундах без паузи, відносно гри.\n--Загальні тривалості--\n60 = 1 хвилина\n300 = 5 хвилин (за замовчуванням)\n600 = 10 хвилин"
 PTB: "O intervalo entre salvamentos automáticos. É medido em segundos relativos ao jogo, sem pausa.\n--Durações Comuns--\n60 = 1 Minuto\n300 = 5 Minutos (Padrão)\n600 = 10 Minutos"
