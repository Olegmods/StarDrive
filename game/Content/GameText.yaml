MissingCommandModule:
 Id: 2501
 ENG: "Missing Command Module"
 RUS: "Отсутствует командный модуль"
 UKR: "Відсутній командний модуль"
 PTB: "Módulo de Comando Ausente"
TheShipDoesNotHave:
 Id: 2502
 ENG: "The Ship does not have a Command Module or all your Command Modules are not getting power."
 RUS: "Корабль не имеет командного модуля или все ваши командные модули не получают питание."
 UKR: "Корабель не має командного модуля або всі ваші командні модулі не отримують живлення."
 PTB: "A nave não possui um Módulo de Comando ou todos os seus Módulos de Comando estão sem energia."
AddACommandModuleTo:
 Id: 2503
 ENG: "Add a Command Module to your ship (Cockpit, Bridge, etc.) and make sure it is getting power."
 RUS: "Добавьте командный модуль на свой корабль (кабину, мостик и т. Д.) И убедитесь, что он получает питание."
 UKR: "Додайте командний модуль на ваш корабель (кокпіт, місток тощо) і переконайтеся, що він отримує живлення."
 PTB: "Adicione um Módulo de Comando à sua nave (cockpit, ponte etc.) e certifique-se de que ele esteja recebendo energia."
NoBackupCommandModule:
 Id: 2504
 ENG: "No Backup Command Module"
 RUS: "Нет резервного командного модуля"
 UKR: "Немає резервного командного модуля"
 PTB: "Sem Módulo de Comando Reserva"
TheShipCurrentlyHasOnly:
 Id: 2505
 ENG: "The ship currently has only a single Command Module, which is a problem for a ship of this size. When all Command Modules of a ship are destroyed, it cannot identify targets and will usually retreat for repairs."
 RUS: "В настоящее время на корабле есть только один командный модуль, что является проблемой для корабля такого размера. Когда все командные модули корабля уничтожены, он не может идентифицировать цели и обычно отступает для ремонта."
 UKR: "Наразі корабель має лише один командний модуль, що є проблемою для корабля такого розміру. Коли всі командні модулі корабля знищені, він не може ідентифікувати цілі і, як правило, відступає для ремонту."
 PTB: "A nave atualmente possui apenas um único Módulo de Comando, o que é um problema para uma nave deste tamanho. Quando todos os Módulos de Comando de uma nave são destruídos, ela não consegue identificar alvos e geralmente recua para reparos."
AddABackupCommandModule:
 Id: 2506
 ENG: "Add a backup Command Module to the ship (it can be a small one), preferably far from your main Command Module in order to maintain combat effectiveness of the ship."
 RUS: "Добавьте на корабль резервный командный модуль (он может быть небольшой), желательно подальше от вашего основного командного модуля, чтобы поддерживать боевую эффективность корабля."
 UKR: "Додайте на корабель резервний командний модуль (він може бути невеликим), бажано подалі від основного командного модуля, щоб зберегти боєздатність корабля."
 PTB: "Adicione um Módulo de Comando reserva à nave (pode ser pequeno), de preferência longe do Módulo de Comando principal, para manter a eficácia de combate da nave."
UnpoweredModulesDetected:
 Id: 2507
 ENG: "Unpowered Modules Detected"
 RUS: "Обнаружены обесточенные модули"
 UKR: "Виявлено модулі без живлення"
 PTB: "Módulos sem energia detectados"
SomeOfThePowerConsuming:
 Id: 2508
 ENG: "Some of the power consuming modules in this ship are not getting power. This reduces ship effectiveness as these modules won't work after the ship is built."
 RUS: "Некоторые энергопотребляющие модули на этом корабле не получают питание. Это снижает эффективность корабля, поскольку эти модули не будут работать после постройки корабля."
 UKR: "Деякі з енергоспоживаючих модулів цього корабля не отримують живлення. Це знижує ефективність корабля, оскільки ці модулі не працюватимуть після того, як корабель буде побудовано."
 PTB: "Alguns módulos que consomem energia nesta nave não estão recebendo energia. Isso reduz a eficácia da nave, pois esses módulos não funcionarão depois que ela for construída."
YouCanAddAReactor:
 Id: 2509
 ENG: "You can add a Reactor near the unpowered modules, or increase the power radius of current Reactors by placing a Power Conduit next to them."
 RUS: "Вы можете добавить реактор рядом с модулями без питания или увеличить радиус мощности текущих реакторов, поместив рядом с ними энерго провод"
 UKR: "Ви можете додати реактор біля не під'єднаних модулів або збільшити радіус дії наявних реакторів, розмістивши поруч з ними електро провідником."
 PTB: "Você pode adicionar um Reator perto dos módulos sem energia ou aumentar o raio de energia dos Reatores atuais colocando um Condutor de Energia ao lado deles."
NoOrdnanceDetected:
 Id: 2510
 ENG: "No Ordnance Detected"
 RUS: "Боеприпасы не обнаружены"
 UKR: "Боєприпасів не виявлено"
 PTB: "Nenhuma munição detectada"
ThisShipDesignNeedsOrdnance:
 Id: 2511
 ENG: "This ship design needs Ordnance to properly conduct combat. Currently you do not have ordnance stores on board your ship. Note that Hangars use Ordnance to launch ships."
 RUS: "Этой конструкции корабля нужны боеприпасы для правильного ведения боя. В настоящее время на борту вашего корабля нет боеприпасов. Обратите внимание, что в ангарах для запуска кораблей используются боеприпасы."
 UKR: "Для належного ведення бою цей корабель потребує боєприпасів. Наразі на борту вашого корабля немає запасів боєприпасів. Зверніть увагу, що ангари використовують боєприпаси для запуску кораблів."
 PTB: "Este projeto de nave precisa de Munição para conduzir combate corretamente. No momento, você não possui depósitos de munição a bordo da nave. Observe que Hangares usam Munição para lançar naves."
YouMustAddOrdnanceStores:
 Id: 2512
 ENG: "You must add Ordnance stores or Ordnance Fabricators to your ship. The more Ordnance your ship has on board, the longer it can sustain itself in the battlefield before needing resupply."
 RUS: "Вы должны добавить на свой корабль склады боеприпасов или их изготовители. Чем больше боеприпасов на борту вашего корабля, тем дольше он сможет продержаться на поле битвы, прежде чем потребуется пополнение запасов."
 UKR: "Ви повинні додати на свій корабель сховища боєприпасів або заводи з виробництва боєприпасів. Чим більше боєприпасів на борту вашого корабля, тим довше він зможе підтримувати себе на полі бою, перш ніж йому знадобиться поповнення запасів."
 PTB: "Você deve adicionar depósitos de Munição ou Fabricadores de Munição à sua nave. Quanto mais Munição sua nave tiver a bordo, por mais tempo ela poderá se manter no campo de batalha antes de precisar de reabastecimento."
LowOrdnanceTime:
 Id: 2513
 ENG: "Low Ordnance Time"
 RUS: "Быстрый расход боеприпасов"
 UKR: "Швидке вичерпання боєприпасів"
 PTB: "Baixo tempo de munição"
TheShipHasLowEffective:
 Id: 2514
 ENG: "The ship has low effective fighting time (for it's size) on the battlefield, due to the presence of Ordnance consuming weapons, coupled with low Ordnance stores."
 RUS: "Корабль имеет низкое эффективное время боя (для своего размера) на поле боя из-за наличия оружия, потребляющего боеприпасы, вкупе с низким запасом боеприпасов."
 UKR: "Корабель має низький ефективний час бою (як для свого розміру) на полі бою через наявність зброї, що споживає боєприпаси, в поєднанні з невеликими запасами боєприпасів."
 PTB: "A nave tem baixo tempo efetivo de combate (para seu tamanho) no campo de batalha, devido à presença de armas que consomem Munição combinada com poucos depósitos de Munição."
AddOrdnanceStoresOrOrdnance:
 Id: 2515
 ENG: "Add Ordnance stores or Ordnance Fabricators to your ship. The more Ordnance your ship has on board, the longer it can sustain itself in the battlefield before needing resupply."
 RUS: "Добавьте на свой корабль склады или изготовители боеприпасов. Чем больше боеприпасов на борту вашего корабля, тем дольше он сможет продержаться на поле битвы, прежде чем потребуется пополнение запасов."
 UKR: "Додайте на свій корабель сховища боєприпасів або виробників боєприпасів. Чим більше боєприпасів на борту вашого корабля, тим довше він зможе протриматися на полі бою без поповнення запасів."
 PTB: "Adicione depósitos de Munição ou Fabricadores de Munição à sua nave. Quanto mais Munição sua nave tiver a bordo, por mais tempo ela poderá se manter no campo de batalha antes de precisar de reabastecimento."
LowWarpTime:
