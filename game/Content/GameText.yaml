 UKR: "Гарматні установки стріляють стандартними зенітними снарядами і надають планеті значні оборонні бонуси двома способами. По-перше, гарматні установки наносять 1 гарантовану шкоду кожному десанту. По-друге, гарматні установки діють як оборонні одиниці під час наземного вторгнення і здатні виконувати помірні атаки по важких цілях."
 PTB: "Baterias de canhões disparam projéteis antiaéreos padrão e fornecem bônus defensivos significativos a um planeta de duas formas. Primeiro, causam 1 de dano garantido a cada tropa em pouso. Segundo, atuam como unidades defensivas em invasões terrestres e são capazes de realizar ataques moderados contra alvos pesados."
