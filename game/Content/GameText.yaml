 Id: 2213
 ENG: "Opens a menu allowing you to choose from a list of available designs that can also fit this ship's hull. The refit cost is a minimum of 10 production plus the difference between this ship's cost and the refit cost"
 RUS: "Открывает меню, в котором вы можете выбрать из списка доступных дизайнов тот, который подойдет под корпус этого корабля. Стоимость модернизации - минимум 10 ед. производства плюс разница в стоимости модернизированного корабля и текущей модели"
 SPA: "Abre un menú que te permite elegir entre una lista de diseños disponibles que pueden valer también para el caso de esta nave. El coste de reequipación es como mínimo de 10 de producción más la diferencia entre el coste de la nave y el coste de reequiparla"
 UKR: "Відкриває меню, що дозволяє вам вибрати зі списку доступних дизайнів, які також можуть підійти до корпусу цього корабля. Вартість переобладнання становить щонайменше 10 виробництв плюс різниця між вартістю цього корабля і вартістю переобладнання"
 PTB: "Abre um menu que permite escolher em uma lista de projetos disponíveis que também cabem no casco desta nave. O custo de reequipamento é de no mínimo 10 de produção mais a diferença entre o custo desta nave e o custo de reequipamento"
OrdersTheShipToReturn:
 Id: 2214
 ENG: "Orders the ship to return to the nearest shipyard to be dismantled. The planet where the ship is dismantled will have a portion of the ship's original production cost added to its production stockpile. SHIFT clicking on this ship will order ALL ships of the same design to be dismantled!"
 RUS: "Приказывает кораблю отправиться на ближайшую верфь для утилизации. Планета, на которой корабль будет утилизирован, получит частичную компенсацию промышленной стоимости его производства, которая попадет на планетарный склад"
 SPA: "Ordena a la nave volver al astillero más cercano para ser desguazada. El planeta donde se desguace se quedará con una parte del coste de producción original de la nave, que se sumará a las reservas de producción"
 UKR: "Наказує кораблю повернутися на найближчу верф для демонтажу. Планета, на якій буде розібрано корабель, отримає частину початкової виробничої вартості корабля, додану до свого виробничого запасу. Якщо натиснути на цей корабель з натиснутою клавішею SHIFT, то буде розібрано ВСІ кораблі такого ж дизайну!"
 PTB: "Ordena que a nave retorne ao estaleiro mais próximo para ser desmontada. O planeta onde a nave for desmontada terá uma parte do custo de produção original da nave adicionada ao seu estoque de produção. SHIFT + clique nesta nave ordenará que TODAS as naves do mesmo projeto sejam desmontadas!"
