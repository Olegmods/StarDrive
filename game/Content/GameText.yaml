 Id: 100041
 ENG: "What is the StarDrive experience?"
 RUS: "Что представляет собой игра StarDrive?"
 PTB: "Como é a experiência de StarDrive?"
CodexOverviewPlayingStarDriveText:
 Id: 100042
 ENG: "StarDrive places you in the role of a leader of a space-faring race. You will make choices about how to expand your fledgling empire from your homeworld and how to treat the aliens you meet in your journey. Some aliens may be friendly and some hostile. You may decide to befriend them or conquer them. You can trade with them for new technologies or just talk to them to figure out what makes them tick. \n \n At the heart of StarDrive is the ship design system. Using this system, you can create customized space ships that can be used in commerce and war. Gain new technologies to equip to your ships by researching them. Gain the economic and industrial power to research and build ships by expanding your empire to new planets and by increasing your overall population. "
 RUS: "В StarDrive вам отведена роль лидера расы звездных странников. Вам предстоит построить космическую империю, начав игру с одного-единственного родного мира, и контактировать с другими расами, с которыми вы будете встречаться во Вселенной. Некоторые из них могут быть настроены к вам дружелюбно; другие же будут видеть в вас врагов. Вы можете пытаться налаживать с ними дружеские отношения или завоевывать их; также вы можете меняться с ними технологиями или просто общаться, чтобы лучше понять их. \n \n Один из ключевых моментов игрового процесса StarDrive – система дизайна кораблей. С ее помощью вы сами сможете проектировать боевые и торговые корабли. Исследуйте новые передовые технологии и применяйте их на ваших кораблях, развивайте свою экономическую и промышленную мощь, чтобы строить больше кораблей, развивать вашу империю, заселять новые планеты и увеличивать количество вашего населения. "
 PTB: "StarDrive coloca você no papel de líder de uma raça espacial. Você fará escolhas sobre como expandir seu império recém-nascido a partir do seu mundo natal e sobre como tratar os alienígenas que encontrar em sua jornada. Alguns alienígenas podem ser amigáveis, outros hostis. Você pode decidir fazer amizade com eles ou conquistá-los. É possível negociar com eles para obter novas tecnologias ou simplesmente conversar para entender melhor o que os motiva. \n \n No centro de StarDrive está o sistema de criação de naves. Usando esse sistema, você pode criar naves espaciais personalizadas que podem ser usadas no comércio e na guerra. Obtenha novas tecnologias para equipar suas naves pesquisando-as. Ganhe poder econômico e industrial para pesquisar e construir naves expandindo seu império para novos planetas e aumentando sua população geral. "
CodexOverviewControls:
 Id: 100043
 ENG: "Controls"
 RUS: "Управление"
 PTB: "Controles"
CodexOverviewControlsShort:
 Id: 100044
 ENG: "Basic StarDrive Controls"
 RUS: "Управление в StarDrive"
 PTB: "Controles básicos de StarDrive"
CodexOverviewControlsText:
 Id: 100045
 ENG: "StarDrive follows basic real time strategy conventions with a few twists. Select any ship by left-clicking it. If you own that ship, you can give it orders with a right click that is context sensitive. For instance, if you right click a friendly planet, your ship will go orbit it. If you right click an enemy ship, your ship will go attack it. \n \n StarDrive also allows an action-oriented approach to ship control. Using the WASD keys, you can drive any ship in your empire manually. While in manual mode, you can press the \"F\" key to engage the FTL drive, which will send your ship to warp. If you have weapons on your ship, you can click your right mouse button to fire them. \n \n Pressing the TAB key will turn on the tactical overlay. This allows you to see the ship modules installed on any ship. You can also see their health which is indicated by the color of the module. Pressing Tab also allows you to see the weapon arcs on your ship. This lets you know where you can right click to fire certain weapons. Try it out and see! Your starting ship has a few weapons you can test. \n \n Pressing the Q key while a ship is selected opens the command menu for that ship, where you can access advanced commands. You will use this menu most often to order ships to transport food and passengers. If you own the ship, you also have the option of clicking the \"Assume Control\" button, which will place you in the driver's seat of that ship. \n \n You can detatch the camera from your flagship with a middle mouse click, or by scrolling to the edge of your screen. You can reattach the camera to your flagship by clicking the home button on the minimap. You can click the minus button on the minimap to rapidly zoom out. You can also press the Escape button to rapidly zoom out. If you hold the control key while scrolling the mouse wheel, you will zoom the camera quickly. \n \n Space Bar pauses the game and allows you to make decisions at your own pace. \n \n In the colony overview screen, accessible by double-clicking a planet, you can press the left or right arrow keys to move between your colonies."
 RUS: "В StarDrive используется управление, принятое в большинстве игр в жанре RTS (стратегии в реальном времени), с небольшими вариациями. Любой корабль можно выбрать, щелкнув по нему мышью. Если это ваш корабль, вы сможете отдать ему приказы с помощью щелчка правой кнопкой мыши (это действие является контекстно-зависимым). Например, если вы щелкнете ПКМ по дружественной планете, корабль отправится на ее орбиту; если вы щелкнете ПКМ по вражескому кораблю, ваш корабль атакует его. \n \n StarDrive также предоставляет возможность управлять кораблями вручную. При помощи клавиш WASD вы можете управлять вручную любым кораблем в вашей империи. Клавиша \"F\" в ручном режиме активирует сверхсветовой двигатель, и корабль переходит в варп. Если на корабле установлено оружие, вы можете выстрелить из него, щелкнув правой кнопкой мыши. \n \n Нажатие клавиши TAB активирует тактический режим. В нем вы можете просмотреть все модули, установленные на ваших кораблях, а также увидеть уровень их \"здоровья\", обозначаемый цветом модуля. Нажав Tab, вы также увидите сектора огня оружия, установленного на корабле – это подскажет вам, где вы можете щелкать ПКМ, чтобы вести огонь. Попробуйте сами и посмотрите, как это работает! На вашем стартовом корабле уже установлено оружие, и вы сможете сразу познакомиться с системой управления кораблем на реальном примере. \n \n Нажатие клавиши Q при выделенном корабле открывает командное меню для этого корабля, в котором вы можете отдавать ему команды. Чаще всего вы будете использовать это меню для отдачи кораблям приказов по транспортировке еды и пассажиров. Если вы владеете этим кораблем, вы также можете выбрать опцию \"Принять управление\" и переместиться в кресло пилота этого корабля. \n \n Вы можете открепить камеру от своего флагмана при помощи средней кнопки мыши или подведя указатель мыши к границе экрана. Прикрепить камеру к флагману снова можно нажатием клавиши Home на миникарте. Клавиша \"–\" на миникарте позволяет быстро отдалить обзор; также это можно сделать с помощью клавиши Escape. \n \n Пробел ставит игру на паузу, позволяя вам спокойно обдумать ваши дальнейшие действия.  \n\n В режиме обзора колонии, перейти к которому можно, дважды щелкнув по планете, вы можете перемещаться между своими колонии, используя клавиши-стрелки влево и вправо."
 PTB: "StarDrive segue as convenções básicas de estratégia em tempo real, com algumas diferenças. Selecione qualquer nave clicando nela com o botão esquerdo. Se a nave for sua, você pode dar ordens com um clique direito sensível ao contexto. Por exemplo, se clicar com o botão direito em um planeta aliado, sua nave irá orbitá-lo. Se clicar com o botão direito em uma nave inimiga, sua nave irá atacá-la. \n \n StarDrive também permite uma abordagem mais direta ao controle de naves. Usando as teclas WASD, você pode pilotar manualmente qualquer nave do seu império. Enquanto estiver no modo manual, você pode pressionar a tecla \"F\" para acionar o motor FTL, enviando sua nave para dobra. Se houver armas na nave, você pode clicar com o botão direito do mouse para dispará-las. \n \n Pressionar TAB ativa a sobreposição tática. Isso permite ver os módulos instalados em qualquer nave. Você também pode ver a saúde deles, indicada pela cor do módulo. Pressionar Tab também permite ver os arcos de disparo das armas da sua nave. Isso mostra onde você pode clicar com o botão direito para disparar certas armas. Teste e veja como funciona! Sua nave inicial possui algumas armas para você experimentar. \n \n Pressionar a tecla Q enquanto uma nave está selecionada abre o menu de comandos dessa nave, onde você pode acessar comandos avançados. Você usará esse menu com mais frequência para ordenar que naves transportem comida e passageiros. Se a nave for sua, você também terá a opção de clicar no botão \"Assumir Controle\", que o colocará no assento do piloto dessa nave. \n \n Você pode desacoplar a câmera da sua capitânia com um clique do botão do meio do mouse ou movendo a câmera até a borda da tela. Você pode reacoplar a câmera à sua capitânia clicando no botão de início no minimapa. Você pode clicar no botão de menos no minimapa para afastar rapidamente o zoom. Também é possível pressionar Escape para afastar rapidamente o zoom. Se mantiver a tecla Ctrl pressionada ao rolar a roda do mouse, a câmera dará zoom rapidamente. \n \n A barra de espaço pausa o jogo e permite tomar decisões no seu próprio ritmo. \n \n Na tela de visão geral da colônia, acessível com um clique duplo em um planeta, você pode pressionar as setas esquerda ou direita para alternar entre suas colônias."
CodexOverviewYourFirstGame:
 Id: 100046
 ENG: "Your First Game"
 RUS: "Ваша первая игра"
 PTB: "Sua Primeira Partida"
CodexOverviewYourFirstGameShort:
 Id: 100047
 ENG: "Things to consider the first time you play"
 RUS: "Что нужно иметь в виду, если вы играете впервые"
 PTB: "O que considerar na primeira vez que jogar"
CodexOverviewYourFirstGameText:
 Id: 100048
 ENG: "When playing your first game of StarDrive you might feel overwhelmed by everything you can do. Remember that you can pause the game at any time by hitting the space bar, which will give you all the time you need to consider your situation and to make your moves. \n \n Your first priority upon starting a new game should be to take a look at the technology screen and decide what you want to research. You can choose from a wide variety of technologies that will help define your playstyle. If you want to strengthen your military then you might consider researching new ship hulls or weapons technologies. Alternatively, you could research new colonization technologies to help you expand your empire. \n \n Once you have decided what to research, it would be a good idea to start learning about your galaxy. Send out a scout ship to explore the galaxy, or do it yourself with your starting ship! Once you have found a suitable planet to colonize, you can send your starting colony ship to make a new home for your people. Refer to the relevant sections of this Help Wiki to learn more about those specific functions. \n \n Once you have your first colony up and running, it will be important to make sure that it has the resources it needs to grow, including food, production, and more colonists! A colony that does not receive new colonists will only grow at a very slow pace, so it is very important to help them grow by assigning freighters to transport colonists. \n \n As you explore the galaxy you will run across alien races that are competing against you to control the galaxy. It is up to you to decide how to deal with them. You can speak with the aliens in the Diplomacy Screen to make deals with the aliens, to trade with them, to war on them, or just to find out a little bit more about them.  \n \n Eventually you will very likely find yourself in a war. Don't forget to research new military technologies and to design bigger and better ships when the technologies become available. \n \n If you ever find yourself wondering how to do something in the game, refer here to this Help Wiki. If you cannot find the answer, then come to the StarDrive forums at www.stardrivegame.com/"
 RUS: "Впервые сев играть в StarDrive, вы, вероятно, растеряетесь от многообразия возможных вариантов. Не забывайте, что вы в любой момент можете поставить игру на паузу, нажав пробел, и спокойно обдумать все свои дальнейшие действия. \n \n Первое, что вам нужно сделать, начав новую игру – это перейти на экран технологий и выбрать, что вы будете исследовать в первую очередь. Вам будет доступен выбор из большого количества самых разных технологий, и технологии, которые вы начнете исследовать в первую очередь, во многом определят ваш стиль игры. Если вы хотите сделать упор на военную мощь, вы можете начать исследовать корпуса кораблей или оружие. Альернативный вариант – исследовать технологии колонизации, чтобы быстрее развить свою империю. \n \n После того как вы выбрали технологию для исследования, вам стоит заняться разведкой галактики. Отправьте к другим системам корабль-разведчик или исследуйте галактику сами при помощи своего стартового корабля! Как только вы найдете планету, подходящую для колонизации, вы можете отправить туда свой стартовый корабль-колонист и основать новую колонию. В соответствующих разделах справки об этом приведена более подробная информация. \n \n После основания колонии вы должны обеспечить ее всеми ресурсами, необходимым для роста и развития колонии, включая еду, промышленность и самих колонистов! Колония, на которую не прибывают новые колонисты, будет расти очень медленно, поэтому ей нужно помочь развиваться, отправив на нее колонистов в транспортных кораблях. \n \n По мере того как вы будете исследовать и осваивать галактику, вы встретитесь с другими расами, которые будут вашими соперниками за господство во Вселенной. Решайте сами, как вы будете общаться с ними. На экране дипломатии вы можете разговаривать с инопланетными расами, заключать с ними сделки, торговать, объявлять войну и т.п. \n \n Весьма вероятно, что в какой-то момент вы окажетесь в состоянии войны с одной или несколькими другими расами. Не забывайте своевременно исследовать военные технологии и строить новые корабли, оснащенные в соответствии с вашими новейшими технологическими достижениями. \n \n Если у вас возникнет вопрос, как осуществляется то или иное действие в игре, поищите ответ в этой справке – если же вы не найдете его, возможно, нужная вам информация отыщется на форумах, посвященных игре StarDrive, которые находятся по адресу www.stardrivegame.com"
 PTB: "Ao jogar sua primeira partida de StarDrive, você pode se sentir sobrecarregado com tudo o que é possível fazer. Lembre-se de que você pode pausar o jogo a qualquer momento pressionando a barra de espaço, o que dará todo o tempo necessário para analisar sua situação e fazer suas jogadas. \n \n Sua primeira prioridade ao iniciar uma nova partida deve ser olhar a tela de tecnologia e decidir o que deseja pesquisar. Você pode escolher entre uma grande variedade de tecnologias que ajudarão a definir seu estilo de jogo. Se quiser fortalecer seu poder militar, considere pesquisar novos cascos de naves ou tecnologias de armas. Como alternativa, você pode pesquisar novas tecnologias de colonização para ajudar a expandir seu império. \n \n Depois de decidir o que pesquisar, é uma boa ideia começar a conhecer sua galáxia. Envie uma nave exploradora para investigar a galáxia ou faça isso você mesmo com sua nave inicial! Quando encontrar um planeta adequado para colonização, você poderá enviar sua nave-colônia inicial para criar um novo lar para seu povo. Consulte as seções relevantes desta Wiki de Ajuda para aprender mais sobre essas funções específicas. \n \n Quando sua primeira colônia estiver funcionando, será importante garantir que ela tenha os recursos necessários para crescer, incluindo comida, produção e mais colonos! Uma colônia que não recebe novos colonos crescerá apenas em ritmo muito lento, por isso é muito importante ajudá-la a crescer designando cargueiros para transportar colonos. \n \n Ao explorar a galáxia, você encontrará raças alienígenas que competem com você pelo controle da galáxia. Cabe a você decidir como lidar com elas. Você pode falar com os alienígenas na Tela de Diplomacia para fazer acordos, negociar, guerrear contra eles ou apenas descobrir um pouco mais sobre quem são.  \n \n Eventualmente, é muito provável que você se encontre em uma guerra. Não se esqueça de pesquisar novas tecnologias militares e projetar naves maiores e melhores quando as tecnologias estiverem disponíveis. \n \n Se em algum momento você se perguntar como fazer algo no jogo, consulte esta Wiki de Ajuda. Se não encontrar a resposta, vá aos fóruns de StarDrive em www.stardrivegame.com/"
CodexEconomy:
 Id: 100049
 ENG: "Economy"
 RUS: "Экономика"
 PTB: "Economia"
CodexEconomyEconomicBasics:
 Id: 100050
 ENG: "Economic Basics"
 RUS: "Основы экономики"
 PTB: "Noções Básicas de Economia"
CodexEconomyEconomicBasicsShort:
 Id: 100051
 ENG: "An overview of StarDrive's economy."
 RUS: "Описание экономики в StarDrive."
 PTB: "Uma visão geral da economia de StarDrive."
CodexEconomyEconomicBasicsText:
 Id: 100052
 ENG: "The four economic resources in StarDrive are Food, Production, Research, and Money.  These resources are collected and consumed each game \"turn\", which corresponds to five seconds of real time.  The game speed can be modified by pressing the + / - keys for faster or slower play. \n \n  Food is used to feed your colonists and is consumed at a rate of 1 food per 1 population unit (1 Billion colonists) per turn. Production represents raw and refined goods produced by your empire and is used to produce ships, troops, and planetary improvements. Cybernetic races consume production instead of food. Research is used to unlock new technological advances. Finally, Money (Credits) is used to pay maintenance for your ships, troops, planetary improvements, or diplomatic treaties. Money is earned primarily through automatic taxation of your citizens."
 RUS: "В StarDrive имеется 4 типа экономических ресурсов – это еда. производство, наука и деньги. Эти ресурсы собираются и расходуются каждый игровой \"ход\", которому соответствует 5 секунд реального времени. Вы можете изменять скорость игры при помощи клавиш + / - для ускорения или замедления игры. \n \n  Еда используется для того, чтобы прокормить ваших колонистов, и потребляется из расчета 1 единица еды на 1 единицу населения (1 млрд. колонистов) в ход. Производство – это товары, произведенные в вашей империи; оно требуется для строительства кораблей, планетарных объектов и формирования боевых отрядов. Кибернетические расы вместо еды потребляют производство. Наука используется для открытия новых технологий. И, наконец, деньги (кредиты) нужны для оплаты расходов по содержанию ваших кораблей, войск, планетарных объектов и для заключения дипломатических соглашений. Деньги в основном зарабатываются за счет налогообложения граждан вашей империи."
 PTB: "Os quatro recursos econômicos em StarDrive são Comida, Produção, Pesquisa e Dinheiro. Esses recursos são coletados e consumidos a cada \"turno\" do jogo, que corresponde a cinco segundos de tempo real. A velocidade do jogo pode ser modificada pressionando as teclas + / - para jogar mais rápido ou mais devagar. \n \n Comida é usada para alimentar seus colonos e é consumida à taxa de 1 comida por 1 unidade de população (1 bilhão de colonos) por turno. Produção representa bens brutos e refinados produzidos pelo seu império e é usada para produzir naves, tropas e melhorias planetárias. Raças cibernéticas consomem produção em vez de comida. Pesquisa é usada para desbloquear novos avanços tecnológicos. Por fim, Dinheiro (Créditos) é usado para pagar manutenção, fazer comércio e financiar atividades diplomáticas. "
CodexEconomyFreightersAndTradeRoutes:
 Id: 100053
 ENG: "Freighters and Trade Routes"
 RUS: "Транспорты и торговые маршруты"
 PTB: "Cargueiros e Rotas Comerciais"
CodexEconomyFreightersAndTradeRoutesShort:
 Id: 100054
 ENG: "Learn how to grow your empire with freighters"
 RUS: "Узнайте, как транспорты помогут вам развивать вашу империю"
 PTB: "Aprenda a expandir seu império com cargueiros"
CodexEconomyFreightersAndTradeRoutesText:
 Id: 100055
 ENG: "Colonization of new worlds is an expensive and laborious process. To move even a few thousand colonists to a new home light years away takes a massive investment of capital and labor, and yet even with the finest planning a new colony is a fragile thing barely capable of self-sustenance. \n \n But colonies need not go it alone. Supply ships can bring food, production, and more citizens to your newly founded colony. Food brought in via freighter can sustain your colonists even if the colony cannot yet produce its own food, as is common when settling a barren world. Production can be imported as well, representing the importation of pre-fabricated goods and materials that can be used to speed the production of basic improvements. Finally, new colonists will provide a larger breeding base which will improve a new colony's growth rate. \n \n You can customize whether you want your colony to Import, Export, or Store food and production. It would be a good idea to set your homeworld to Export these goods and to set your new colonies to import these goods. Then you can assign any ship in your empire the task of \"Transport Goods\", which will cause them to automatically run goods throughout your empire. You can also specifically assign a ship to \"Transport Passengers\", which will bring colonists from your high-population planets to your low-population planets. And of course, a ship's maximum cargo capacity is determined by the number of Cargo Hold modules installed in it."
 RUS: "Колонизация новых миров – дорогостоящий и трудоемкий процесс. Перемещение всего лишь нескольких тысяч колонистов в другой мир на расстоянии нескольких световых лет требует огромных вложений средств и труда, и даже при тщательном планировании развития колонии она вряд ли сможет быть полностью самодостаточной. \n \n Однако вы можете помогать своим новым колониям расти за счет других, которые уже развились. Транспортные корабли могут доставлять еду, накопленное производство и самих колонистов в только что колонизированные миры. Транспорты могут привозить еду в миры, где ее невозможно выращивать самим – например, на бесплодных планетах. Наколпленная продукция, представленная как уже произведенные товары, может быть также доставлена в недавно колонизированный мир и использоваться для ускорения строительства основных улучшений. И, наконец, в новый мир можно привозить колонистов, чтобы население новой колонии прирастало быстрее. \n \n Вы можете указать для каждой своей колонии, будет ли она экспортировать, импортировать или складировать еду и производство.  Хорошая идея – поставить свой родной мир на экспорт этих ресурсов, а новые развивающиеся колонии – на их импорт. После этого вы сможете отдать любому кораблю в вашей империи приказ \"Перевозить товары\", и они автоматически будут перевозить товары в пределах вашей империи. Также вы можете отдать кораблю приказ \"Перевезти колонистов\", и колонисты из миров с большим населением будут отправлены в миры, где ощущается нехватка населения. Имейте в виду, что максимальная грузоподъемность корабля определяется количеством установленных на нем грузовых отсеков."
 PTB: "A colonização de novos mundos é um processo caro e trabalhoso. Levar até mesmo alguns milhares de colonos para um novo lar a anos-luz de distância exige enorme investimento de capital e trabalho; ainda assim, mesmo com o melhor planejamento, uma nova colônia é frágil e precisa de apoio. \n \n Cargueiros são a base da logística imperial. Eles transportam comida, produção e passageiros entre planetas, ajudando colônias novas a crescerem e mantendo mundos especializados abastecidos com o que precisam. Sem cargueiros, colônias isoladas podem passar fome, ficar sem produção ou crescer lentamente por falta de colonos. \n \n Você pode construir cargueiros em seus planetas e atribuí-los a funções de comércio automático. Eles tentarão encontrar rotas úteis dentro do seu império, levando recursos de mundos com excedente para mundos que precisam deles. Cargueiros também podem ser usados manualmente para transportar recursos específicos quando você quiser controlar diretamente o fluxo econômico. "
CodexEconomyAdvancedTradeRoutes:
 Id: 100056
 ENG: "Advanced Trade Routes"
 RUS: "Сложные торговые маршруты"
 PTB: "Rotas Comerciais Avançadas"
CodexEconomyAdvancedTradeRoutesShort:
 Id: 100057
 ENG: "Create custom trade routes for freighters"
 RUS: "Создавайте для своих грузовых кораблей специфические торговые маршруты"
 PTB: "Crie rotas comerciais personalizadas para cargueiros"
CodexEconomyAdvancedTradeRoutesText:
 Id: 100058
 ENG: "You can set custom trade routes by designating one or more \"Areas of Operation\" for a freighter. To do so, select the freighter and click the arrow in the ship's selection window to show a list of advanced commands. Click the \"Area of Operations\" button or hit the \"O\" key to begin. You can drag a box around any systems where you want the ship to trade. You can set as many areas of operation as you want. Simply right click a box to delete it.   \n  \n In the advanced orders tab you will also find options to toggle whether a ship will transport only food, only production, or both."
 RUS: "Вы можете создавать пользовательские торговые маршруты, задавая для транспорта одну или несколько областей операций. Чтобы сделать это, выберите транспорт и щелкните в окне выбора корабля стрелку для вывода списка дополнительных команд. Далее нажмите кнопку \"Область операций\" или нажмите клавишу \"O\". Вы сможете очертить прямоугольную область, захватывающую системы, между которыми этот транспорт будет осуществлять грузоперевозки. Вы можете задать для корабля любое количество таких областей. Для удаления области просто щелкните по ней ПКМ.  \n  \n На вкладке дополнительных приказов вы также сможете указать, будет ли транспорт перевозить только еду, только продукцию или оба вида ресурсов."
 PTB: "Você pode definir rotas comerciais personalizadas designando uma ou mais \"Áreas de Operação\" para um cargueiro. Para fazer isso, selecione o cargueiro e clique na seta na janela de seleção da nave para exibir a lista de comandos avançados. Clique no botão \"Área de Operação\" e arraste uma caixa de seleção ao redor da região da galáxia onde deseja que o cargueiro trabalhe. \n \n Um cargueiro com uma Área de Operação só tentará negociar dentro dessa região. Isso permite criar setores logísticos específicos, impedir que cargueiros viajem para muito longe e manter recursos circulando dentro de uma parte importante do império. Você pode criar mais de uma Área de Operação para a mesma nave. Clique com o botão direito em uma área para removê-la."
CodexEconomyTradeTreaties:
 Id: 100059
 ENG: "Trade Treaties"
 RUS: "Торговые договоры"
 PTB: "Tratados Comerciais"
CodexEconomyTradeTreatiesShort:
 Id: 100060
 ENG: "Diplomatic trade agreements "
 RUS: "Дипломатические торговые соглашения"
 PTB: "Acordos comerciais diplomáticos "
CodexEconomyTradeTreatiesText:
 Id: 100061
 ENG: "An excellent source of income for any empire is a trade agreement with a friendly empire. Most races are eager to trade because to reap the benefits of trade all that is required is a trade treaty and peace between your empires. \n \n Trade treaties take a short amount of time to become profitable. In the initial stages of a trade treaty, both parties will actually lose credits each turn. However, once the trade routes are established, both parties will profit by up to 10 credits per turn maximum. Certain technologies and racial traits can increase the amounts gain."
 RUS: "Для любой империи торговый договор с дружественной империей станет прекрасным источником дохода. Большинство рас охотно будут торговать с вами, поскольку для получения доходов от торговли требуется только наличие торгового соглашения и мир между вашими двумя империями. \n \n Торговля начинает приносить дивиденды не сразу; больше того, сразу после заключения соглашения обе стороны будут терять кредиты. Однако после того, как торговые маршруты будут налажены, обе стороны начнут получать от торговли доход вплоть до 10 кредитов в ход. Определенные технологии и расовые черты могут увеличивать доходы, получаемые с торговли."
 PTB: "Uma excelente fonte de renda para qualquer império é um acordo comercial com um império amistoso. A maioria das raças está disposta a comerciar porque, para colher os benefícios do comércio, basta haver um tratado comercial e paz entre seus impérios. \n \n Tratados comerciais geram renda com base no tamanho e na atividade econômica dos impérios envolvidos. Quanto maiores e mais desenvolvidos forem os impérios, maior tende a ser o benefício. Manter relações diplomáticas estáveis e proteger suas rotas comerciais pode se tornar uma parte importante da sua estratégia econômica. "
CodexEconomyPlanetaryQualities:
 Id: 100062
 ENG: "Planetary Qualities"
 RUS: "Показатели планет"
 PTB: "Qualidades Planetárias"
CodexEconomyPlanetaryQualitiesShort:
 Id: 100063
 ENG: "What to look for in a planet"
 RUS: "Какие показатели планеты интересуют нас в первую очередь"
 PTB: "O que procurar em um planeta"
CodexEconomyPlanetaryQualitiesText:
 Id: 100064
 ENG: "The StarDrive universe is randomized at the beginning of the game. Some planets, like Gas Giants and highly active Volcanic worlds, are not habitable by terran species. However, a wide range of planets including barren, ice, desert, steppe, tundra, terran, swamp, and ocean planet types exist. \n \n Each habitable planet has a Fertility rating and a Richness rating. Fertility represents how much food a single colonist can produce per turn, before modifications applied by racial bonuses and buildings. So on a planet with a Fertility score of 1.0 and a population of 2.5, the maximum food that could be produced on that planet, before modifiers, is 2.5 food. But of course, this would only be the case if every single colonist on the planet were dedicated to farming instead of production or research. \n \n Mineral Richness likewise indicates the amount of production that can be created at a planet per turn per colonist. This value is also modifiable by racial bonuses and buildings. However, a planet's Mineral Richness score will gradually deplete over time as resources are extracted from the planet. For every 500 production created at a planet, the planet's mineral richness will deplete by .1 to a minimum of .1. \n \n Finally, each habitable planet has a maximum population rating that determines how many colonists can live there."
 RUS: "В StarDrive галактика генерируется случайным образом каждый раз при создании новой игры. Некоторые планеты, такие как газовые гиганты или миры с высокой вулканической активностью, непригодны для обитания, но существует множество других типов планет, такие как бесплодные, степь, пустыня, тундра, болота, океан, планеты земного типа. \n \n Каждая планета, пригодная для жизни, имеет показатель плодородия и богатства минералами. Показатель плодородия планеты определяет, сколько еды на этой планете сможет за один ход произвести один колонист до применения модификаторов различных строений и расовых бонусов. Так, на планете с показателем плодородия 1,0 и населением 2,5 максимальное кол-во еды, которое может быть произведено на этой планете (до применения модификаторов) составит 2,5 ед. еды (разумеется, при условии, что все колонисты на этой планете заняты в сельском хозяйстве, а не в промышленности или в науке). \n \n Аналогично, богатство минералами определяет количество производства, которое за один ход генерируется на этой планете одним колонистом. Это значение также может быть модифицировано расовыми бонусами и строениями. Однако богатство минералами на планете постоянно уменьшается со временем, потому что ее ресурсы расходуются и не восполняются. За каждые 500 ед. производства, сгенерированного на планете, ее индекс богатства минералами будет уменьшаться на 0,1 вплоть до минимума 0,1. \n \n И, наконец, у каждой обитаемой планеты есть свой показатель максимального населения, указывающий, какое максимально возможное количество населения эта планета способна вместить."
 PTB: "O universo de StarDrive é gerado aleatoriamente no início da partida. Alguns planetas, como Gigantes Gasosos e mundos Vulcânicos altamente ativos, não são habitáveis por espécies terrestres. Porém, uma ampla variedade de planetas, incluindo mundos áridos, gelados, desérticos, de estepe, oceânicos e terranos, pode ser colonizada. \n \n Ao avaliar um planeta, observe seu tamanho, fertilidade, riqueza mineral e tipo ambiental. Planetas grandes podem sustentar populações maiores. Alta fertilidade melhora a produção de comida. Riqueza mineral elevada melhora a produção industrial. O tipo ambiental determina se o planeta é adequado para sua raça e afeta o crescimento e a produtividade. "
CodexEconomyTheColonyScreen:
 Id: 100065
 ENG: "The Colony Screen"
 RUS: "Экран колонииn"
 PTB: "A Tela da Colônia"
CodexEconomyTheColonyScreenShort:
 Id: 100066
 ENG: "An overview of managing your colonies"
 RUS: "Несколько советов по управлению развитием колоний"
 PTB: "Uma visão geral do gerenciamento de colônias"
CodexEconomyTheColonyScreenText:
 Id: 100067
 ENG: "The colony screen allows you to access the build queues for your colony. You may also modify the import and export settings for your trade goods, designate a governor, modify your labor allocation, and review your planet's terrain. \n \n At the center of your colony screen is your colony terrain grid, which gives you an overview of the buildings at your colony, their output, and the troops available at your colony. To build a planetary improvement such as a mine or a space port, you must drag the desired building from the list of available buildings to an empty square on the colony's terrain grid. The item will be added to your queue.  You may notice that some of the terrain squares on your colony are marked as \"uninhabitable\". This is due to environmental factors such as no atmosphere, oceans, mountain ranges, and so on. Nothing can be built on an uninhabitable square except Biospheres. Once you possess the necessary technology, you may build a Biosphere to make the terrain habitable. Biospheres also grant a bonus of +.5 colonists to a colony's maximum population."
 RUS: "На экране колонии вы можете задать очереди строительства для каждой из ваших колоний. Здесь же вы можете изменить настройки импорта и экспорта товаров, назначить губернатора, перераспределить колонистов по роду деятельности и осмотреть территорию планеты. \n \n В центре экрана колонии находится сетка территории, на которой вы можете видеть построенные в колонии здания, их производительность, а также находящиеся в колонии войска. Чтобы построить в колонии планетарное улучшение, например, шахту или космопорт, вы должны перетащить соответствующее здание из списка доступных зданий на пустой квадрат сетки территории. Этот объект будет добавлен в очередь строительства. Возможно, вы обратите внимание, что некоторые квадраты на территории вашей колонии отмечены как непригодные для обитания. Это вызвано такими факторами окружающей среды, как отсутствие атмосферы, наличие горных массивов или океанов и т.п. В квадратах, непригодных для обитания, нельзя построить ничего, кроме биосфер. Когда у вас будет соответствующая технология, вы сможете размещать на таких участках биосферы, после чего эти квадраты можно будет застроить. Кроме того, биосферы дают бонус +0,5 к максимальному населению планеты."
 PTB: "A tela da colônia permite acessar as filas de construção da sua colônia. Você também pode modificar as configurações de importação e exportação de bens comerciais, designar um governador, ajustar a alocação de trabalho e revisar o terreno do planeta. \n \n Uma colônia precisa equilibrar comida, produção e pesquisa. Atribuir colonos a diferentes trabalhos muda a produção de cada recurso. Governadores podem automatizar parte desse processo, mas o controle manual permite otimizar colônias importantes para objetivos específicos. \n \n A tela da colônia também mostra informações sobre população, felicidade, construção, fertilidade, riqueza mineral e outros fatores que determinam o desempenho do planeta. Use essas informações para decidir quais edifícios construir e quais recursos importar ou exportar."
CodexEconomyAutomation:
 Id: 100068
 ENG: "Automation"
 RUS: "Автоматизация"
 PTB: "Automação"
CodexEconomyAutomationShort:
 Id: 100069
 ENG: "How to automate certain tasks"
 RUS: "Как автоматизировать определенные действия"
 PTB: "Como automatizar certas tarefas"
CodexEconomyAutomationText:
 Id: 100070
 ENG: "If you would rather have the AI control certain areas of your empire such as exploring and colonizing new planets, you can access the automation panel by pressing the \"AI\" button on the minimap. \n \n You can also automate planetary development by assigning a planetary governor. You may assign a planetary governor either in the Colony Screen, which is reached by double clicking a planet, or through the Empire Management Screen, which is accessible through the button along the top of the screen."
 RUS: "Если вы хотите, чтобы определенными аспектами развития вашей империи, например, разведкой и колонизацией, занимался ИИ, вы можете перейти на панель автоматизации, нажав на миникарте кнопку \"ИИ\". \n \n Также вы можете автоматизировать развитие уже колонизированных планет, назначив на нее губернатора. Назначить губернатора можно либо на экране колонии, вызвать который можно двойным щелчком по планете, или на экране управления империей, который вызывается соответствующей кнопкой в верхнем углу экрана."
 PTB: "Se preferir que a IA controle certas áreas do seu império, como explorar e colonizar novos planetas, você pode acessar o painel de automação pressionando o botão \"IA\" no minimapa. \n \n Também é possível automatizar o desenvolvimento planetário usando governadores. Governadores tentarão construir melhorias e alocar trabalho de acordo com o foco escolhido. A automação é útil em impérios grandes, onde administrar cada planeta manualmente pode se tornar demorado. Ainda assim, colônias críticas geralmente se beneficiam de supervisão direta do jogador."
CodexExpansion:
 Id: 100071
 ENG: "Expansion"
 RUS: "Экспансия"
 PTB: "Expansão"
CodexExpansionWarpTravel:
 Id: 100072
 ENG: "Warp Travel"
 RUS: "Путешествие в варпе"
 PTB: "Viagem em Dobra"
CodexExpansionWarpTravelShort:
 Id: 100073
 ENG: "Overview of FTL travel in StarDrive"
 RUS: "Обзор движения со сверхсветовыми скоростями в StarDrive"
 PTB: "Visão geral das viagens FTL em StarDrive"
CodexExpansionWarpTravelText:
 Id: 100074
 ENG: "All ships move at a maximum speed that is determined by their thrust to mass ratio. All ships may also engage their StarDrives to go to warp speed. A ship's maximum speed at warp is determined as its base speed times your empire's warp multiplier (which can be upgraded through the tech tree). \n \n When at warp, a ship's power is drained 3 times faster than normal. This means that most ships will rapidly lose power while warping. However, a ship that is warping within the influence of a subspace projector will not suffer this power penalty. The power penalty at warp can be decreased through certain technologies. \n \n Fuel Cells are important to warp travel because they provide the power storage capacity that is needed for long-range jumps. On smaller or specialized ships it is quite possible that they will generate enough power to warp indefinitely. On larger ships, however, or on ships will heavy power loads, fuel cells are critical to long range jumps. These too can be upgraded in the technology tree. \n \n Finally, warping within your owned territory does not drain ship power. You can extend your owned territory by colonizing new planets and also by building subspace projector nodes in deep space. Your speed at warp while inside your owned territory can be increased through the tech tree as well."
 RUS: "У всех кораблей есть свое значение максимальной скорости, определяемое отношением тяги к массе. Корабли также могут включать сверхсветовой режим двигателей для входа в варп. Максимальная скорость корабля в варпе – это произведение его базовой максимальной скорости на варп-множитель вашей империи (который может быть увеличен посредством открытия соответствующих технологий). \n \n При движении в варпе энергия корабля расходуется втрое быстрее обычного; это означает, что большинство кораблей при движении со сверхсветовыми скоростями будут очень быстро терять энергию. Однако корабли, путешествующие в зоне влияние субпространственного проектора, не будут получать этого штрафа к энергии. Также штраф на расход энергии в варпе можно уменьшить, исследовав определенные технологии. \n \n В путешествиях в варпе важную роль играют топливные элементы, поскольку с их помощью можно запасти энергию, необходимую для долгих переходов. Небольшие или специализированные корабли могут генерировать достаточно энергии, чтобы находиться в варпе постоянно, но в случае кораблей с большим энергопотреблением наличие топливных элементов является критичным условием для совершения долгих переходов. Топливные элементы также могут быть усовершенствованы при исследовании соответствующих технологий. \n \n И, наконец, энергия не расходуется при путешествии в варпе в пределах своей территории. Вы можете расширить свою территорию, колонизируя новые планеты и строя в глубоком космосе субпространственные проекторы. Ваша скорость при движении в варпе в пределах своей территории может также быть увеличена после исследования соответствующих технологийl."
 PTB: "Todas as naves se movem a uma velocidade máxima determinada pela proporção entre empuxo e massa. Todas as naves também podem acionar seus StarDrives para entrar em velocidade de dobra. A velocidade máxima de uma nave em dobra é determinada pela velocidade base multiplicada pelo modificador de dobra do seu império. \n \n Tecnologias melhores podem aumentar a velocidade de dobra, permitindo explorar, reforçar e colonizar mais rapidamente. Como a galáxia é grande, viagens FTL eficientes são essenciais para expansão, defesa e logística."
CodexExpansionScouting:
 Id: 100075
 ENG: "Scouting"
 RUS: "Разведка"
 PTB: "Exploração"
CodexExpansionScoutingShort:
 Id: 100076
 ENG: "The basics of scouting the galaxy"
 RUS: "Основы галактической разведки"
 PTB: "Noções básicas de exploração da galáxia"
CodexExpansionScoutingText:
 Id: 100077
 ENG: "Send any ship into a solar system to scout it, which will reveal the system's name as well as the number of planets inside the system. Order a ship close to a planet to scan the planet and reveal its properties. \n \n By far the easiest way to scout the galaxy is to simply order a ship to explore automatically. To do this, select your ship and his Q to bring up its command menu, then click orders -> Go exploring."
 RUS: "Для разведки солнечной системы туда достаточно отправить любой корабль. Вы узнаете название системы и количество планет в ней. Для получения более подробной информации о планете корабль должен будет просканировать ее. \n \n Самый простой способ осуществления разведки – просто отдать кораблю приказ осуществлять разведку автоматически. Чтобы сделать это, выберите корабль, нажмите клавишу Q для вызова командного меню и выберите опцию -> Отправиться исследовать."
 PTB: "Envie qualquer nave para um sistema solar para explorá-lo, revelando o nome do sistema e o número de planetas dentro dele. Ordene que uma nave se aproxime de um planeta para escaneá-lo e revelar suas propriedades. \n \n De longe, a forma mais fácil de explorar é construir naves exploradoras dedicadas e enviá-las para sistemas desconhecidos. A exploração inicial é importante porque revela planetas colonizáveis, ameaças, recursos e impérios alienígenas antes que seus rivais tomem a iniciativa."
CodexExpansionColonyShips:
 Id: 100078
 ENG: "Colony Ships"
 RUS: "Корабли-колонисты"
 PTB: "Naves-Colônia"
CodexExpansionColonyShipsShort:
 Id: 100079
 ENG: "How to colonize new planets"
 RUS: "Как колонизировать новые планеты"
 PTB: "Como colonizar novos planetas"
CodexExpansionColonyShipsText:
 Id: 100080
 ENG: "Any ship that has at least one Colony Module installed is a colony ship. Colony modules contain a small amount of food, production, and colonists in stasis. You can colonize a planet in one of two ways. \n \n First, you can build a colony ship at one of your shipyards and then simply right click the planet you wish to colonize when you have that ship selected. The ship will fly to its destination and dismantled into a new outpost. \n \n The second way you can colonize a new planet is to click on the desired colony, hit Q to bring up the options dialog, and then click \"Mark for Colonization\". Marking a planet for colonization will automatically dispatch a colony ship to this planet. If you do not have any colony ships, then one will be queued in an appropriate construction queue and will dispatch to the new planet when complete. \n \n Finally, you can colonize an uninhabited planet by selecting it and click the \"Colonize\" button in the selection dialog displayed in the lower left of your screen. This Marks the planet for colonization. If you have no available colony ships, one will be automatically queued at a shipyard to colonize the planet."
 RUS: "Любой корабль, на который установлен хотя бы один колониальный модуль, является кораблем-колонистом. Колониальный модуль содержит небольшое количество еды, продукции и колонистов, погруженных в анабиоз. Колонизировать планету можно одним из двух способов. \n \n Во-первых, вы можете построить корабль-колонист на одной из ваших верфей и затем выделить этот корабль и щелкнуть ПКМ по планете, которую вы хотите колонизировать. Корабль отправится к этой планете, и по его прибытии на планету преобразуется в аванпост. \n \n Второй способ колонизировать новую планету – щелкнуть по ней, нажать клавишу Q для вызова окна команд и выбрать опцию \"Отметить для колонизации\". Если планета отмечена для колонизации, к ней автоматически будет направлен корабль-колонист. Если у вас на данный момент таких кораблей нет, он будет поставлен в очередь строительства и по его завершении сам отправится к той планете. \n \n И, наконец, вы можете колонизировать необитаемую планету, выделив ее и нажав кнопку \"Колонизировать\" в диалоговом окне в левой нижней части экрана. Планета при этом будет отмечена для колонизации. Если у вас нет доступных кораблей-колонистов, он будет поставлен в очередь строительства на верфи."
 PTB: "Qualquer nave com pelo menos um Módulo de Colônia instalado é uma nave-colônia. Módulos de colônia contêm uma pequena quantidade de comida, produção e colonos em estase. Você pode colonizar um planeta de duas maneiras. \n \n Primeiro, pode construir uma nave-colônia, selecioná-la e clicar com o botão direito em um planeta habitável. A nave viajará até o planeta e fundará uma nova colônia. Segundo, você pode marcar um planeta para colonização; se houver uma nave-colônia disponível, ela será enviada, caso contrário uma nova será construída no melhor estaleiro disponível. \n \n Escolha seus primeiros mundos com cuidado. Um planeta com boa fertilidade, riqueza mineral e tamanho adequado pode acelerar muito o crescimento do seu império."
CodexExpansionPassengerTransport:
 Id: 100081
 ENG: "Passenger Transport"
 RUS: "Пассажирские транспорты"
 PTB: "Transporte de Passageiros"
CodexExpansionPassengerTransportShort:
 Id: 100082
 ENG: "The importance of passenger transport"
 RUS: "Роль пассажирских транспортов"
 PTB: "A importância do transporte de passageiros"
CodexExpansionPassengerTransportText:
 Id: 100083
 ENG: "Assigning some of your freighters to the role of passenger transport is critical to growing your empire. Colonies grow at a fixed percentage rate based on your racial bonuses or penalties. Larger colonies grow much more quickly that smaller colonies because the breeding base is substantially higher. By assigning freighters the \"Transport Colonists\" task, they will automatically bring new colonists from high population planets to low population planets. \n \n If you invest in certain technological improvements, such as cryogenics and larger freighters, you will expand your population that much faster. Finally, races with the \"Manifest Destiny\" trait carry twice as many colonists per ship. "
 RUS: "Использование части ваших транспортов для пассажирских перевозок является  критичным для развития вашей империи. Население колоний всегда прирастает на определенную процентную величину от текущего населения, которая зависит от соответствующих штрафов или бонусов вашей расы. Большие колонии и расти будут быстрее, поскольку на них уже больше населения для воспроизводства. При отдаче транспортам команды \"Перевезти колонистов\" они будут автоматически перевозить колонистов из миров с большим населением в миры, где населения не хватает. \n \n Разработав соответствующие технологии, такие как криогеника и транспорты большего размера, вы сможете еще быстрее наращивать население. Кроме того, расы, имеющие черту \"Ведомые предназначением\", могут перевозить на своих кораблях вдвое больше колонистов, чем обычно. "
 PTB: "Atribuir alguns de seus cargueiros à função de transporte de passageiros é essencial para o crescimento do seu império. Colônias crescem a uma taxa percentual fixa baseada nos bônus ou penalidades raciais. Colônias maiores crescem muito mais rápido que colônias pequenas, porque a mesma porcentagem aplicada a uma população maior produz mais novos colonos. \n \n Transportar colonos de mundos populosos para colônias novas ajuda esses novos mundos a crescerem rapidamente. Sem transporte de passageiros, uma colônia recém-fundada pode levar muito tempo para se tornar produtiva."
CodexExpansionDeepSpaceBuilding:
 Id: 100084
 ENG: "Deep Space Building"
 RUS: "Объекты в глубоком космосе"
 PTB: "Construção no Espaço Profundo"
CodexExpansionDeepSpaceBuildingShort:
 Id: 100085
 ENG: "How to build structures in space"
 RUS: "Как строить объекты в глубоком космосе"
 PTB: "Como construir estruturas no espaço"
CodexExpansionDeepSpaceBuildingText:
 Id: 100086
 ENG: "It is possible to deploy fixed space stations in deep space by using the deep space building window. To open this window, hit the B key or click \"Build\" in the minimap panel. This will open a small list of structures that you can construct in deep space.  Click an item in the list and then click anywhere on the map to designate the construction position. \n \n Deep space construction occurs at your colonies in the form of a construction ship. For each item you wish to build in deep space, a construction ship needs to be built at a shipyard. This process is automatic: a construction ship will automatically queue at the appropriate shipyard when you order a new deep space construction project. The construction ship will travel to the appropriate build position when it is complete and there it will deploy into the desired structure. "
 RUS: "В игре имеется возможность размещать станции в глубоком космосе при помощи соответствующего меню строительства. Чтобы вызвать его, нажмите клавишу B или выберите  опцию \"Строить\" на панели миникарты. Откроется небольшой список объектов, которые вы можете построить в глубоком космосе. Щелкните по нужному объекту в списке и далее щелкните в нужном месте на карте, чтобы указать место строительства. \n \n Строительство объектов в глубоком космосе осуществляется посредством специальных кораблей-строителей. Для каждого объекта в глубоком космосе требуется сперва построить корабль-строитель на верфи. Этот процесс является автоматическим: корабль-строитель будет сам поставлен в очередь на подходящей верфи, Как только вы отдадите приказ о строительстве объекта в глубоком космосе. По завершении строительства корабль сам отправится в нужную точку и по прибытии в нее преобразуется в заказанный объект. "
 PTB: "É possível implantar estações espaciais fixas no espaço profundo usando a janela de construção em espaço profundo. Para abrir essa janela, pressione a tecla B ou clique em \"Construir\" no painel do minimapa. Isso abrirá uma pequena lista de estruturas que você pode construir. \n \n Escolha uma estrutura e posicione-a no local desejado. Algumas estruturas podem fornecer defesa, apoio logístico ou bônus de movimento. Construções no espaço profundo permitem controlar regiões importantes da galáxia mesmo longe dos seus planetas."
CodexExpansionSubspaceProjectors:
 Id: 100087
 ENG: "Subspace Projectors"
 RUS: "Субпространственные проекторы"
 PTB: "Projetores Subespaciais"
CodexExpansionSubspaceProjectorsShort:
 Id: 100088
 ENG: "Gain movement bonuses with Subspace Projectors"
 RUS: "Бонусы к перемещению от субпространственных проекторов"
 PTB: "Ganhe bônus de movimento com Projetores Subespaciais"
CodexExpansionSubspaceProjectorsText:
 Id: 100089
 ENG: "Subspace Projectors are unique space stations that act very much like roads in space. Subspace projectors create a bubble of space wherein it is easier for a ship to enter subspace. The result is that a ship that is inside the influence radius of a friendly subspace projector will not suffer a power penalty when at warp. \n \n Subspace projectors can be upgraded through the tech tree to provide speed bonuses to friendly ships and speed penalties to enemy ships. "
 RUS: "Субпространственные проекторы – это уникальные космические станции, выполняющие роль космических магистралей. Они создают в пространстве особый пузырь, в котором кораблям легче входить в субпространство. Как следствие, любой корабль, находящийся в области влияния дружественного субпространственного проектора, не будет получать штрафов к расходу энергии, перемещаясь в варпе. \n \n Субпространственные проекторы могут быть улучшены при помощи соответствующих технологий, чтобы предоставлять дружественным кораблям бонусы к скорости и замедлять вражеские корабли. "
 PTB: "Projetores Subespaciais são estações espaciais únicas que funcionam de forma muito parecida com estradas no espaço. Projetores subespaciais criam uma bolha de espaço na qual é mais fácil para uma nave entrar no subespaço. O resultado é que uma nave dentro do raio de influência de um projetor pode se mover muito mais rapidamente. \n \n Uma rede bem posicionada de projetores subespaciais pode encurtar rotas comerciais, acelerar reforços militares e tornar seu império muito mais responsivo a ameaças distantes."
CodexWarfare:
 Id: 100090
 ENG: "Warfare"
 RUS: "Военное дело"
 PTB: "Guerra"
CodexWarfareCombatBasics:
 Id: 100091
 ENG: "Combat Basics"
 RUS: "Основы боя"
 PTB: "Noções Básicas de Combate"
CodexWarfareCombatBasicsShort:
 Id: 100092
 ENG: "General combat-related concepts"
 RUS: "Базовые концепции ведения боя"
 PTB: "Conceitos gerais relacionados a combate"
CodexWarfareCombatBasicsText:
 Id: 100093
 ENG: "A ship is destroyed when its internal hull is reduced to 30%. The internal hull is the collection of ship module slots with the \"I\" restriction. Therefore, it is possible to severely damage a ship by taking out its engines and weapons and armor, but the ship will not explode until you destroy the inner hull. \n \n Every ship is capable of six basic combat behaviors, such as the Artillery behaviors or the Attack Runs behaviors. You can set a combat behavior in several different ways. First, you can designate a default combat behavior for a ship in the Shipyard when designing a ship. Second, you can override a ship's default orders by selecting it and then clicking one of the six behavior buttons in the ship selection window. Finally, you can create a custom combat behavior for a ship in the fleet editor, which is accessible in the shipyard.  \n \n Ships will automatically attack any hostile ships unless given the evade order, in which case they will avoid combat. Otherwise, simply moving friendly forces near enemy forces will begin combat. You can give ships specific targets by selecting your ship and right clicking the enemy ship that you want to target. The ship will not choose a new target until either it or its target dies. "
 RUS: "Корабль уничтожается, когда запас прочности внутреннего корпуса падает ниже 30%. Внутренний корпус – это совокупность модулей корабля с меткой \"I\". Тем самым, можно нанести кораблю. значительный урон, выведя из строя его двигатели, оружие и броню, но корабль не взорвется, пока не будет уничтожен внутренний корпус. \n \n Каждому кораблю можно задать один из шести возможных алгоритмов поведения в бою, например, отвести кораблю роль артиллерийской поддержки или приказать ему осуществлять налеты и отходы. Задать алгоритм поведения корабля в бою можно несколькими способами. Во-первых, его можно указать на верфи при разработке дизайна корабля. Во-вторых, можно отменить поведение корабля по умолчанию и назначить ему новое при помощи кнопок поведения в окне выбора корабля. И, наконец, можно создать свой вариант поведения для корабля в редакторе флота, который доступен на верфи.  \n \n Корабли будут автоматически атаковать все вражеские корабли, если только им не отдан приказ уклоняться от боя – во всех остальных случаях бой начнется сразу, когда дружественный флот войдет в контакт с вражеским. Вы можете указать для своего корабля конкретные цели, выделив свой корабль и щелкнув ПКМ по вражескому кораблю, который должен быть атакован вашим кораблем. Ваш корабль переключится на эту цель и не сменит ее, пока не уничтожит ее или погибнет сам. "
 PTB: "Uma nave é destruída quando seu casco interno é reduzido a 30%. O casco interno é o conjunto de espaços de módulos da nave com a restrição \"I\". Portanto, é possível causar danos graves a uma nave destruindo seus motores e armas sem necessariamente destruir seu casco interno. \n \n Armas diferentes causam tipos diferentes de dano e têm comportamentos diferentes. Alguns sistemas são melhores contra escudos, outros contra blindagem ou módulos específicos. Posicionamento, alcance, arcos de disparo e composição da frota têm grande impacto no resultado das batalhas."
CodexWarfareGroundCombat:
 Id: 100094
 ENG: "Ground Combat"
 RUS: "Наземный бой"
 PTB: "Combate Terrestre"
CodexWarfareGroundCombatShort:
 Id: 100095
 ENG: "Ground Combat Concepts"
 RUS: "Концепции наземного боя"
 PTB: "Conceitos de combate terrestre"
CodexWarfareGroundCombatText:
 Id: 100096
 ENG: "Ground combat occurs whenever two or more opposing forces have ground troops on the same planet. Ground combat happens in real time and will be managed automatically by the AI. However, you can take direct control of ground combat as well. \n \n To view ground combat or to issue orders to ground troops, open the relevant planet's tactical view by selecting the planet and pressing the flag icon in the selection panel. You can see all of the ground troops and buildings here as they are arrayed on the colony's 7 x 5 tile grid.  Each ground troop and combat building has four main attributes: Their Class, Strength, Hard Attack, and Soft Attack. \n \n A troop's class indicates whether it is a hard or soft target. Fleshy infantry units are always soft targets, whereas buildings, tanks, and mechs are hard targets. Each unit has a strength which acts both as its hitpoints and how strong it is in combat, and then a unit has a \"Hard Attack\" which is used against hard targets and a \"Soft Attack\" which is used against soft targets. \n \n The calculations used in combat are simple. For each point of a unit's Strength, it rolls a 100 sided die. If the the result of the die roll is less than or equal to the unit's attack value for the given target type, then 1 point of damage is inflicted on the defender. For example, if a Space Marine with 10 Strength were attacking an Outpost, which is a hard target, the Space Marine would have 10 chances to do 1 point of damage to the Outpost. The die would roll 10 times and if the roll was less than or equal to the Space Marine's Hard Attack value (because a building is a hard target) then the Outpost will take 1 damage. \n \n Each unit has a move timer and an attack timer. Whenever a unit moves, it's move timer is reset to 10 seconds. Likewise with the attack timer. When the timer resets, an icon will appear next to the unit indicating that it can move or attack or both. \n \n A planetary invasion is successful when all defending troops and buildings are destroyed. It is possible to destroy troops and buildings from orbit with a planetary bombardment. To do this, select a bomb-equipped ship and order it to attack the planet using a right click. Alternatively you can order this attack using the Orbital Assets panel in a planet's Tactical View.  It is possible to completely destroy a colony and kill all of its inhabitants with a bombardment. A colony destroyed in this manner will need to be recolonized."
 RUS: "Наземный бой начинается когда у двух или более противоборствующих держав присутствуют наземные войска на одной планете. Он идет в реальном времени и управляется ИИ автоматически, однако вы можете взять управление наземным боем на себя. \n \n Чтобы наблюдать за наземным боем или отдать приказы наземным войскам, откройте тактический вид соответствующей планеты и щелкните по иконке флага на панели выбора. Вы увидите все наземные войска и военные объекты в соответствии с их расположением на сетке колонии, состоящей из массива ячеек 7 x 5. Каждый наземный отряд и военный объект имеет четыре основных атрибута: класс, сила, атака НЦ и атака ЗЦ. \n \n Класс отряда определяет, является ли он незащищенной (НЦ) или защищенной (ЗЦ) целью. Пехота – это НЦ, а строения, танки и боевые роботы – ЗЦ. Каждый отряд также обладает силой, указывающей, насколько он силен в бою, и показатели атак по НЦ и ЗЦ, используемые для расчета урона, наносимого этим отрядом по целям соответствующих типов. \n \n Расчет результатов боя осуществляется по простой схеме. Для каждого пункта силы отряда осуществляется бросок 100-гранной кости. Если результат броска меньше или равен показателю атаки по цели соответствующего типа, защитнику наносится 1 ед. урона. Например, морпех с силой 10 атакует аванпост, являющийся ЗЦ. У морпеха есть 10 шансов нанести аванпосту по 1 ед. урона. Кость будет брошена 10 раз, и за каждый бросок, результат которого был меньше или равен показателю атаки ЗЦ для морпеха (поскольку строение – это защищенная цель), аванпосту будет нанесена 1 ед. урона. \n \n У каждого отряда есть таймер движения и таймер атаки. Каждый раз когда отряд передвигается, его таймер движения устанавливается равным 10 сек. Аналогично работает таймер атаки. Когда таймер обнуляется, рядом с отрядом появляется иконка, указывающая, что теперь отряд может передвигаться или атаковать или и то и другое вместе. \n \n Вторжение на планету считается завершившимся успешно при полном уничтожении всех оборонительных сооружений и войск. Их можно также уничтожать, бомбя планету с орбиты. Чтобы сделать это, выберите корабль, несущий на борту бомбы, и прикажите ему бомбить планету, щелкнув по ней ПКМ. Также вы можете отдать приказ о бомбометании с панели орбитальных объектов на тактическом экране планеты. При бомбардировке возможно полное уничтожение колонии и всех ее жителей – в этом случае колонизировать эту планету придется заново."
 PTB: "Combate terrestre ocorre sempre que duas ou mais forças opostas têm tropas terrestres no mesmo planeta. O combate terrestre acontece em tempo real e será administrado automaticamente pela IA. Porém, você também pode assumir controle direto do combate terrestre. \n \n Tropas atacam unidades inimigas e estruturas planetárias. O resultado depende da quantidade e qualidade das tropas, dos bônus raciais, das defesas planetárias e de outros modificadores. Conquistar planetas inimigos exige levar tropas suficientes até o alvo e protegê-las durante a invasão."
CodexWarfareFighterBays:
 Id: 100097
 ENG: "Fighter Bays"
 RUS: "Истребительные отсеки"
 PTB: "Hangares de Caças"
CodexWarfareFighterBaysShort:
 Id: 100098
 ENG: "How to use fighter bays and carriers"
 RUS: "Как использовать истребительные отсеки и авианосцы"
 PTB: "Como usar hangares de caças e porta-aviões"
CodexWarfareFighterBaysText:
 Id: 100099
 ENG: "Hangars are special ship modules that allow you to launch fighters. In combat, Hangars operate by launching fighters which will escort the carrier. Fighters can be launched or recovered by clicking the fighter's mother ship, opening its orders tab, and clicking the launch or recover fighters button. \n \n To equip your ship with a hangar, place the hangar onto your ship hull in an appropriate position. Then, left click your hangar and select which one of your fighter designs you want to carry in your hangar. Your ship will carry any of your valid fighter designs.  If one of your fighters is destroyed, the Hangar will go on cooldown. When the cooldown expires, a new fighter will be ready for launch. \n \n An ideal use for fighter hangars is to produce a fighter that is poorly suited for warp travel but heavily armed. The carrier will be able to bring these fighters a greater distance than they would be able to fly on their own. Fighters also provide excellent cover for your capital vessels by providing more targets for enemies and to screen enemy fire before it hits your capital ships."
 RUS: "Ангары – это особые корабельные модули, позволяющие выпускать в бою истребители, сопровождающие в бою корабли-носители. Истребители можно выпустить в бой и вернуть назад, щелкнув по материнскому кораблю, отрыв его панель приказов и нажав кнопку запуска или отзыва истребителей. \n \n Чтобы оборудовать корабль ангаром, разместите его в подходящем месте корпуса вашего корабля. Затем щелкните по ангару и укажите, истребитель какого дизайна будет в нем базироваться. Ваш корабль может нести истребители любых подходящих дизайнов. Если истребитель будет уничтожен в бою, для ангара запустится таймер восстановления. Когда он истечет, в ангаре появится новый истребитель, готовый к запуску. \n \n Идеальный вариант дизайна истребителей – делать их плохо приспособленными для путешествий в варпе, но при этом тяжеловооруженными. Авианосец сможет транспортировать истребители на большее расстояние, чем они смогли бы пролететь сами. Кроме того, истребители идеально подходят для прикрытия крупных боевых кораблей, поскольку они отвлекают на себя вражеский огонь и способны снижать эффективность вражеского огня по вашим крупным кораблям."
 PTB: "Hangares são módulos especiais de nave que permitem lançar caças. Em combate, hangares funcionam lançando caças que escoltarão o porta-aviões. Caças podem ser lançados ou recolhidos clicando na nave-mãe, abrindo suas ordens e usando o comando apropriado. \n \n Caças são úteis para interceptar inimigos, aplicar pressão adicional e distrair defesas. Porta-aviões bem protegidos podem projetar força a longa distância, mas ficam vulneráveis se seus caças forem destruídos ou se o inimigo conseguir se aproximar."
CodexWarfarePointDefenseWeapons:
 Id: 100100
 ENG: "Point Defense Weapons"
 RUS: "Орудия точечной защиты"
 PTB: "Armas de Defesa de Ponto"
CodexWarfarePointDefenseWeaponsShort:
 Id: 100101
 ENG: "An overview of point defense"
 RUS: "Обзор орудий точечной защиты"
 PTB: "Uma visão geral da defesa de ponto"
CodexWarfarePointDefenseWeaponsText:
 Id: 100102
 ENG: "Some weapons are specifically labeled as \"PD\" or \"Point Defense\" weapons. These weapons systems have special targeting instructions that will have them focus fire on incoming enemy missiles. Missiles and torpedoes have hit points and can be intercepted and destroyed by point defense fire. Without effective point defense, a capital ship could quickly fall to attacks from missile and torpedo weapons."
 RUS: "Некоторые оружейные системы имеют пометку \"ТЗ\" или \"Точечная защита\". Эти системы вооружения имеют специальный алгоритм наведения, который главным образом специализируется на уничтожении вражеских ракет. Ракеты и торпеды имеют фиксированный запас прочности и могут быть перехвачены и уничтожены огнем систем точечной защиты. Без эффективной системы борьбы с ракетами и торпедами крупные корабли могут быть очень легко уничтожены ими."
 PTB: "Algumas armas são especificamente marcadas como \"PD\" ou armas de \"Defesa de Ponto\". Esses sistemas de armas têm instruções especiais de mira que os fazem concentrar fogo em mísseis inimigos em aproximação. Mísseis e torpedos têm pontos de vida e podem ser destruídos antes de atingir o alvo. \n \n A defesa de ponto é essencial contra inimigos que usam grande quantidade de mísseis ou torpedos. Sem cobertura adequada, até uma nave grande pode ser destruída por salvas de projéteis explosivos."
CodexWarfareOrdnance:
 Id: 100103
 ENG: "Ordnance"
 RUS: "Боеприпасы"
 PTB: "Munição"
CodexWarfareOrdnanceShort:
 Id: 100104
 ENG: "Ammunition and related concepts"
 RUS: "Боеприпасы и сопутствующие концепции"
 PTB: "Munição e conceitos relacionados"
CodexWarfareOrdnanceText:
 Id: 100105
 ENG: "Ordnance is a catch-all phrase that refers to the ammunition needed to fire various weapons such as missile launchers, torpedoes, and other non-energy based weapon systems. Most ordnance-based weapons have a small ordnance capacity that will allow them to fire a few shots. However, in any extended battle, it is critical for a ship firing ordnance-based weapons to carry ordnance in storage modules. \n \n If your ship runs out of ordnance, it can resupply in one of two ways. First, it can just visit a friendly planet with a shipyard and be refilled automatically. Second, it could navigate to the proxmity of a ship equipped with an ordnance supply module such as a shuttle bay or a transporter room. These ships will automatically resupply nearby friendly vessels running low on ordnance."
 RUS: "Боеприпасы – собирательный термин, описывающий все виды амуниции для различных видов оружия, таких как ракетные и торпедные установки и прочие оружейные системы, не являющиеся чисто энергетическими. Большинство таких систем имеют свой собственный ограниченный боекомплект, позволяющий сделать несколько выстрелов, однако для затяжных сражений на борту корабля необходимо иметь запас боеприпасов, для чего предусмотрены специальные отсеки. \n \n Если на вашем корабле закончатся боеприпасы, пополнить их можно двумя способами. Во-первых, корабль может посетить дружественную планету, где есть верфь, и в этом случае боекомплект будет восстановлен автоматически. Во-вторых, существуют корабли, оснащенные системой раздачи боеприпасов – они автоматически пополняют боекомплект находящихся поблизости кораблей, если у них заканчиваются боеприпасы."
 PTB: "Munição é um termo geral que se refere aos projéteis necessários para disparar várias armas, como lançadores de mísseis, torpedos e outros sistemas que não são baseados em energia. A maioria das armas baseadas em munição possui uma pequena capacidade interna que se esgota conforme dispara. \n \n Naves podem precisar de reabastecimento para continuar lutando por longos períodos. Levar capacidade de munição suficiente e manter linhas de suprimento pode ser tão importante quanto ter armas poderosas."
CodexWarfareShipDesign:
 Id: 100106
 ENG: "Ship Design"
 RUS: "Дизайн кораблей"
 PTB: "Projeto de Naves"
CodexWarfareShipDesignShort:
 Id: 100107
 ENG: "Basic Ship Design Concepts"
 RUS: "Основные концепции проектирования кораблей"
 PTB: "Conceitos básicos de projeto de naves"
CodexWarfareShipDesignText:
 Id: 100108
 ENG: "Ships are designed by placing ship modules into ship module slots on a Hull. Both new hulls and new ship modules can be unlocked through research and exploration. Each ship module slot has a restriction associated with it: I, O, IO, or E. Likewise, each ship module has a restriction of I, IO, O, or E. You can only place a ship module into a slot that has the same restriction as the module. So a module with an \"I\" restriction can go into an \"I\" slot or an \"IO\" slot because they both share an I restriction. \n \n \"I\" slots indicate internal ship hull and are the most important to keeping your ship alive. Your ship will explode when the internal hull reaches 30% health -- that is, if an enemy manages to destroy 70% of your internal hull, then your ship will die. \"O\" slots are slots on the exterior of the ship and are useful as weapon mounts and armor mounts.  \"IO\" slots are multipurpose slots that are just under the exterior hull and are general purpose. \"E\" slots are for your engines. \n \n Every ship requires a command module such as a bridge or a cockpit. These modules provide basic sensor functionality and field-repair functionality. Better command modules provide superior efficiency. \n \n It is also important to manage your ship's power levels. Every module in your ship must be within range of a power generator or else it will be unpowered and ineffective. However, power generators (also called power plants) are volatile and will explode if destroyed, possibly causing severe damage to your ship. Depending on your design choices, it may make more sense to use power conduits to carry power from your well defended power generators to the necessary systems somewhere across the ship. \n \n Another concept to keep in mind is that each module has a power cost associated with it. It will drain power simply by being installed. Having a net positive power flow to power consumption ratio is critical. While at warp, power consumption is increased even further. A negative power consumption at warp will rapidly drain a ship's power stores and limit its range. It is up to you to find a good balance and to create ships to fit the roles that you want them to play. \n \n Every weapon in StarDrive has a \"Field of Fire\" and a \"Facing.\"  Some weapons have a fixed facing, meaning that they can only be faced along the spine of the ship, facing forward. Weapons like this include heavy beam weapons, rail guns, and larger missile weapons. Other weapons are mounted on turrets and can have their facings set manually. A weapon can only fire in the direction that it is facing and inside it's field of fire. To change a turret's facing, just click it and drag the arc that appears to the desired facing. You can see all of your ship's weapon arcs by pressing the Tab key. \n \n Finally, if you ever make a mistake, you can press CTRL+Z to undo a module placement."
 RUS: "Проектирование корабля – это размещение его модулей в корпусе. Новые типы модулей и корпусов становятся доступны по мере их открытия. Каждая модульная ячейка корабля имеет тип ограничения, которые обозначаются как I, O, IO или E. Аналогично, эти же типы ограничений имеются и у самих модулей. В определенных модульных ячейках можно размещать только те модули, которые имеют тот же тип ограничения. Так, модуль с индексом \"I\" можно разместить в ячейке с индексом \"I\" или \"IO\", поскольку оба они имеют одинаковый индекс I. \n \n Ячейки и модули типа\"I\" относятся ко внутреннему корпусу корабля и они наиболее важны для его выживаемости. Когда уровень прочности внутреннего корпуса упадет ниже 30%, корабль взорвется, то есть, если противник сумеет нанести внутреннему корпусу 70% урона от его прочности, корабль будет уничтожен. Ячейки типа \"O\" являются внешними и служат для размещения брони и оружейных модулей. Ячейки типа \"IO\" являются многоцелевыми и располагаются сразу за внешней обшивкой. Ячейки типа \"E\" предназначены для двигателей. \n \n Каждому кораблю требуется командный модуль, такой как мостик или кокпит. Они предоставляют базовые возможности радара и ремонта в полевых условиях. Более совершенные модули обладают расширенной функциональностью. \n \n Также очень важно правильно организовать энергоснабжение корабля. Все модули корабля должны быть подключены к корабельному генератору, иначе они будут \"обесточены\" и не смогут работать. При этом необходимо иметь в виду, что генераторы (или силовые установки) при уничтожении обычно взрываются, нанося кораблю очень серьезный ущерб. В зависимости от конкретного дизайна зачастую имеет смысл максимально хорошо защищать генератор и распределять энергию по корабельным модулям с помощью системы проводников. \n \n Также следует иметь в виду, что у каждого модуля есть показатель энергопотребления. Будучи установленным на корабль, модуль будет постоянно потреблять энергию. Очень важно, чтобы корабль вырабатывал больше энергии, чем потребляют его системы. При перемещении в варпе энергопотребление корабля возрастает еще больше. При дефиците энергии эффективная дальность действия корабля будет ограничена. Вам придется находить компромиссные решения и проектировать корабли, максимально приспособленные для выполнения определенных задач. \n \n Все оружие в StarDrive имеет свой сектор обстрела и направление. Некоторые оружейные установки могут быть смонтированы только сверху и стрелять только вперед – это, например, мощное лучевое оружие, рельсотроны и крупные ракетные установки. Другие оружейные установки монтируются на поворотных платформах, что позволяет вручную задать им сектор обстрела. Оружие может вести огонь только в своем секторе. Чтобы изменить направление обстрела турели, щелкните по ней и перетащите дугу, обозначающую сектор обстрела. Сектора обстрела всех оружейных модулей корабля можно вывести нажатием клавиши Tab. \n \n И, наконец, если вы сделаете ошибку при проектировке корабля, нажмите CTRL+Z для отмены установки модуля."
 PTB: "Naves são projetadas colocando módulos de nave em espaços de módulos de um Casco. Novos cascos e novos módulos de nave podem ser desbloqueados por pesquisa e exploração. Cada espaço de módulo possui uma restrição associada: I, O, IO ou E. Espaços I são internos, O são externos, IO aceitam ambos e E são reservados para motores. \n \n Um bom projeto equilibra energia, massa, custo, velocidade, defesa e poder de fogo. Armas precisam de energia ou munição; escudos precisam de recarga; motores aumentam mobilidade; blindagem e estruturas melhoram sobrevivência. Projetos especializados podem superar naves genéricas quando usados no papel correto."
CodexWarfareShipExperience:
 Id: 100109
 ENG: "Ship Experience"
 RUS: "Опыт корабля"
 PTB: "Experiência da Nave"
CodexWarfareShipExperienceShort:
 Id: 100110
 ENG: "The effects of experience"
 RUS: "Влияние опыта"
 PTB: "Os efeitos da experiência"
CodexWarfareShipExperienceText:
 Id: 100111
 ENG: "Ships gain experience by defeating enemies in combat. The larger the enemy, the more experience a ship will gain upon killing it. Ships can gain a maximum of five experience levels. Experience levels are indicated in the ship's selection window with one star icon per level. \n \n For each experience level, a ship gains a 5% bonus to all damage done from weapons, a 5% bonus to ship turning speed, and a 5% bonus to ship repair rate."
 RUS: "Корабли набирают опыт, побеждая в сражении противников. Чем крупнее был противник, тем больше опыта за победу над ним получит корабль. Корабль может набрать вплоть до пяти уровней опыта максимум. Уровни обозначаются в окне выбора корабля звездочками. \n \n За каждый уровень опыта корабль получает 5% бонус к урону, скорости поворота и скорости ремонта."
 PTB: "Naves ganham experiência ao derrotar inimigos em combate. Quanto maior o inimigo, mais experiência a nave ganhará ao destruí-lo. Naves podem alcançar no máximo cinco níveis de experiência. Os níveis de experiência são indicados na janela de seleção da nave. \n \n Naves experientes recebem bônus que melhoram seu desempenho em combate. Preservar unidades veteranas pode ser uma vantagem estratégica importante, especialmente em guerras longas."
CodexWarfareCapturingShips:
 Id: 100112
 ENG: "Capturing Ships"
 RUS: "Захват кораблей"
 PTB: "Captura de Naves"
CodexWarfareCapturingShipsShort:
 Id: 100113
 ENG: "Boarding Actions and Ship Defense"
 RUS: "Абордаж и оборона корабля"
 PTB: "Ações de abordagem e defesa de naves"
CodexWarfareCapturingShipsText:
 Id: 100114
 ENG: "It is possible to capture enemy ships in StarDrive using ground troops. To do so, you must launch a ground troop in its shuttle. Every ground troop has its own shuttle and you do not need to build this shuttle. You can launch ground troops directly from the Colony Overview screen by right clicking the icon on a planet tile, from the Ground Combat Screen by clicking the \"Launch\" button when you have a troop selected, and finally you can launch troop shuttles from any ship equipped with a Troop Assault Bay. \n \n Every ship in StarDrive has a base \"Boarding Defense\" statistic that is derived from the size of the ship. The bigger the ship, the harder it is to capture. Command modules like a Cockpit, Bridge, and Combat Information Center will add to your base defense. To further improve your ship's defense against boarding actions, you may build a Marine Barracks module. Each Barracks module comes with at least 1 basic ground troop. Each of these ground troops will add their own strength to the ship's boarding defense. Note that you can only add or remove Marines from a ship if that ship has a Troop Assault Bay module. Otherwise, the Marines are considered part of the regular crew of that ship and cannot leave it. \n \n To launch a boarding action from a ship that is equipped with an assault bay, you must open the Advanced Orders tab on the selected assault carrier by clicking the small arrow on the right side of the selection panel. Then, click the Troop icon to launch all of your shuttles. Select those shuttles and right click the ship you wish to capture. The shuttles will move into position and begin their assault. \n \n Assault mechanics work very similarly to ground combat mechanics except that Defenders have a distinct advantage because they act first in combat. For each point of base defense, the defender has a 35% chance of causing 1 point of damage to boarding troops. Then, all defending troops also roll their regular attacks against boarders. If any boarders are left alive, then they begin their attack. The process repeats rapidly until either the boarders are repelled or the ship is captured. \n \n Some weapons, like the Thalaron blaster, will kill enemy troops and are useful for softening up a ship before boarding. All of a ship's base defense can be repaired by visiting a planet with a shipyard. "
 RUS: "В StarDrive существует возможность захвата вражеских кораблей с использованием наземных войск. Чтобы сделать это, вы должны отправить наземный отряд на абордаж в штурмовом шаттле. У каждого наземного отряда есть свой собственный шаттл, и строить их вам не нужно. Вы можете отправлять наземные отряды непосредственно с экрана обзора колонии, щелкнув ПКМ по иконке на клетке планеты; с экрана наземного боя при помощи кнопки \"Запуск\", если у вас выделен отряд, и, наконец, вы можете запускать шаттлы с любого корабля, оборудованного отсеком штурмовых шаттлов. \n \n Каждый корабль в StarDrive имеет базовый показатель \"Защиты от абордажа\", зависящий от размера корабля. Чем больше корабль, тем труднее его захватить. Командные модули, такие как мостик, кокпит и КИЦ, увеличивают базовую защиту. Чтобы дополнительно улучшить защиту корабля от абордажа, вы можете оснастить его казармами морпехов. Каждая казарма вмещает минимум 1 наземный отряд, каждый из которых добавляет свою силу к общей защите корабля. Обратите внимание, что вы можете перемещать морпехов с корабля и на него только в том случае, если корабль оснащен отсеком штурмовых шаттлов – в противном случае морпехи считаются частью экипажа корабля и не могут покидать его. \n \n Чтобы запустить абордажную команду с корабля, оборудованного отсеком штурмовых шаттлов, откройте вкладку дополнительных приказов для выбранного корабля, щелкнув по маленькой стрелке в правой части панели выбора. Затем щелкните по иконке отряда, чтобы запустить все шаттлы. Выделите эти шаттлы и щелчком ПКМ укажите, Какой корабль нужно захватить. Шаттлы направятся к цели, и начнется попытка абордажа. \n \n Механика расчета результата абордажа очень сходна с обычным наземным боем с тем исключением, что обороняющиеся находятся в значительно более выгодном положении, чем атакующие, так как действуют первыми. За каждый пункт базовой защиты обороняющийся имеет 35% шанс нанести 1 ед. урона абордажной группе. После этого все обороняющиеся войска выбрасывают кости для своих обычных атак против атакующих. После этого, если остались выжившие абордажники, они начинают атаку. Процесс повторяется, пока атака не будет отбита или корабль не будет захвачен. \n \n Некоторые виды оружия, например, таларонский бластер, уничтожают команду вражеского корабля, поэтому их полезно использовать перед попыткой абордажа. Базовая защита корабля может быть полностью восстановлена при посещении планеты, где есть верфь. "
 PTB: "É possível capturar naves inimigas em StarDrive usando tropas terrestres. Para fazer isso, você deve lançar uma tropa terrestre em sua nave auxiliar. Toda tropa terrestre possui sua própria nave auxiliar e você não precisa construí-la. Você pode lançar tropas terrestres a partir de qualquer nave equipada com uma Baía de Assalto de Tropas. \n \n Algumas naves possuem defesa de abordagem natural. Observe que você só pode adicionar ou remover Fuzileiros de uma nave se ela tiver um módulo de Baía de Assalto de Tropas. Caso contrário, os Fuzileiros são considerados parte da tripulação regular da nave e não podem deixá-la. \n \n Para iniciar uma ação de abordagem a partir de uma nave equipada com uma baía de assalto, abra a aba de Ordens Avançadas no transportador de assalto selecionado clicando na pequena seta no lado direito do painel de seleção. Em seguida, clique no ícone de Tropa para lançar todas as suas naves auxiliares. Selecione essas naves auxiliares e clique com o botão direito na nave que deseja capturar. Elas se moverão para a posição e iniciarão o assalto. \n \n A mecânica de assalto funciona de forma muito parecida com a mecânica de combate terrestre, exceto que os defensores têm uma vantagem distinta porque agem primeiro no combate. Para cada ponto de defesa base, o defensor tem 35% de chance de causar 1 ponto de dano às tropas invasoras. Depois, todas as tropas defensoras também realizam seus ataques normais contra os invasores. Se ainda houver invasores vivos, eles iniciam seu ataque. O processo se repete rapidamente até que os invasores sejam repelidos ou a nave seja capturada. \n \n Algumas armas, como o blaster Thalaron, matam tropas inimigas e são úteis para enfraquecer uma nave antes da abordagem. Toda a defesa base de uma nave pode ser reparada visitando um planeta com estaleiro. "
CodexDiplomacy:
 Id: 100115
 ENG: "Diplomacy"
 RUS: "Дипломатия"
 PTB: "Diplomacia"
CodexDiplomacyDiplomacyOverview:
 Id: 100116
 ENG: "Diplomacy Overview"
 RUS: "Обзор дипломатии"
 PTB: "Visão Geral da Diplomacia"
CodexDiplomacyDiplomacyOverviewShort:
 Id: 100117
 ENG: "Introduction to diplomacy"
 RUS: "Введение в дипломатию"
 PTB: "Introdução à diplomacia"
CodexDiplomacyDiplomacyOverviewText:
 Id: 100118
 ENG: "During your travels in the StarDrive universe, you will undoubtedly encounter another spacefaring civilization. When this happens, the aliens will greet you on the Diplomacy Screen. \n \n The Diplomacy Screen allows you to engage the aliens in a number of different ways. First, you can declare war on them whenever you wish to initiate hostilities. This will inform both the alien race as well as your own Navy that all alien vessels should be engaged on sight. But if blowing them up is not your top priority, you might be better off selecting the \"Discuss\" or \"Negotiate\" options. These options allow you to find out about the aliens' personality and priorities and to trade with the aliens, respectively. \n \n Each alien race tracks how much it trusts you, how angry it is with you, and how fearful it is of your military might. Aliens that trust you will be more likely to make fair deals with you, whereas aliens that are angry with you may be less willing to negotiate. "
 RUS: "Путешествуя по Вселенной StarDrive, вы рано или поздно неизбежно столкнетесь с другой цивилизацией покорителей космоса. Когда это случится, инопланетяне поприветствуют вас на экране дипломатии. \n \n Экран дипломатии позволяет общаться с другими расами. Во-первых, вы можете объявить войну, если захотите перейти к открытому конфликту. Это поставит в известность ту расу и ваш флот, что отныне вы находитесь в состоянии войны, и корабли вражеской стороны отныне будут немедленно атакованы. Однако если вы не хотите воевать с ними, вы можете воспользоваться опциями \"Обсудить\" или \"Переговоры\". Эти опции позволят вам больше узнать об инопланетной расе и ее приоритетах развития, а также заключить с ними торговые соглашения. \n \n Для каждой расы существуют показатели ее отношения к вам – насколько она вам доверяет, насколько она вами недовольна и насколько она страшится вашей военной мощи. Инопланетяне, доверяющие вам, скорее заключат с вами сделки, чем расы, которые сердиты на вас. "
 PTB: "Durante suas viagens pelo universo de StarDrive, você sem dúvida encontrará outra civilização espacial. Quando isso acontecer, os alienígenas o cumprimentarão na Tela de Diplomacia. \n \n A Tela de Diplomacia permite interagir com os alienígenas de várias formas. Primeiro, você pode declarar guerra a eles sempre que quiser iniciar hostilidades. Isso informará tanto a raça alienígena quanto sua própria Marinha de que todos os navios alienígenas devem ser atacados assim que forem vistos. Mas, se explodi-los não for sua prioridade principal, talvez seja melhor escolher as opções \"Discutir\" ou \"Negociar\". Essas opções permitem descobrir a personalidade e as prioridades dos alienígenas e negociar com eles, respectivamente. \n \n Cada raça alienígena acompanha quanto confia em você, quão irritada está com você e quanto teme seu poder militar. Alienígenas que confiam em você terão mais chances de fazer acordos justos, enquanto alienígenas irritados podem estar menos dispostos a negociar. "
CodexDiplomacyEspionage:
 Id: 100119
 ENG: "Espionage"
 RUS: "Шпионаж"
 PTB: "Espionagem"
CodexDiplomacyEspionageShort:
 Id: 100120
 ENG: "Overview of using Agents"
 RUS: "Использование агентов"
 PTB: "Visão geral do uso de Agentes"
CodexDiplomacyEspionageText:
 Id: 100121
 ENG: "Espionage is a valuable tool for gaining intelligence about your opponents, disrupting their activities, and gaining power. To spy on an alien race, you must train Agents. Agents can be trained in the Diplomacy screen at a cost of 250 credits per agent. Note that Agents begin at Level 1, meaning that they are fresh recruits with no special talents. Agents gain levels by successfully completing missions and can achieve a maximum of 10 levels. \n \n Agents with no assigned mission will automatically engage in counter-espionage, reducing the effectiveness of enemy Agent activities within your empire. To assign an Agent to a Mission, select the Agent in the Agent list, select the Empire you wish to send the Agent against, and then choose the appropriate mission from the missions list. Every mission has an associated credit cost and a number of turns until completion. Advanced spying technologies can reduce these costs while increasing your chances of success on the mission. Success or failure will be calculated at the end of the indicated number of turns. \n \n See the Espionage Calculations and Agent Missions entries for a detailed breakdown of costs, effects, and risks associated with each Agent mission. "
 RUS: "Шпионаж – мощный инструмент, позволяющий осуществлять разведку в стане противника, срывать его планы и укреплять свое влияние. Чтобы шпионить за другой расой, вы должны обучить агентов. Агентов можно обучать на экране дипломатии по цене в 250 кредитов за каждого агента. Все агенты начинают с 1-го уровня, что означает, что они пока еще зеленые новички, не обладающие никакими выдающимися талантами. Агенты получают уровни, успешно выполняя задания, и могут достигнуть максимум 10-го уровня. \n \n Агенты, не выполняющие конкретных заданий, автоматически становятся задействованы в контрразведке, подавляя деятельность вражеских агентов в вашей империи. Чтобы дать агенту задание, выберите агента в списке, далее выберите империю, против которой он будет вести свою деятельность, и, наконец, выберите задание из списка заданий. Каждое задание имеет определенную стоимость и количество ходов, требуемое для его выполнения. Усовершенствованные шпионские технологии могут снижать эти расходы, одновременно повышая шансы агента на успех. Успех или провал миссии агента определяется в конце указанного количества ходов. \n \n В соответствующих разделах приведена подробная информация о расходах, результатах и рисках, связанных со всеми заданиями для агентов. "
 PTB: "Espionagem é uma ferramenta valiosa para obter informações sobre seus oponentes, interromper suas atividades e ganhar poder. Para espionar uma raça alienígena, você deve treinar Agentes. Agentes podem ser treinados na tela de Diplomacia ao custo de 250 créditos por agente. Observe que Agentes começam no Nível 1, ou seja, são recrutas novos sem talentos especiais. Agentes ganham níveis ao concluir missões com sucesso e podem alcançar no máximo 10 níveis. \n \n Agentes sem missão atribuída atuarão automaticamente em contraespionagem, reduzindo a eficácia das atividades de Agentes inimigos dentro do seu império. Para atribuir uma Missão a um Agente, selecione o Agente na lista de Agentes, escolha o Império contra o qual deseja enviá-lo e então escolha a missão apropriada na lista de missões. Toda missão tem um custo em créditos associado e um número de turnos até a conclusão. Tecnologias avançadas de espionagem podem reduzir esses custos e aumentar suas chances de sucesso na missão. Sucesso ou fracasso será calculado ao final do número indicado de turnos. \n \n Consulte as entradas Cálculos de Espionagem e Missões de Agentes para uma explicação detalhada de custos, efeitos e riscos associados a cada missão de Agente. "
CodexDiplomacyEspionageCalculations:
 Id: 100122
 ENG: "Espionage Calculations"
 RUS: "Расчеты при шпионаже"
 PTB: "Cálculos de Espionagem"
CodexDiplomacyEspionageCalculationsShort:
 Id: 100123
 ENG: "Details on Success and Failure"
 RUS: "Расчет успеха или провала"
 PTB: "Detalhes sobre sucesso e fracasso"
CodexDiplomacyEspionageCalculationsText:
 Id: 100124
 ENG: "Calculating an Agent's success or failure while on a mission is started with a random decimal precision dice roll between 0 and 100. A roll greater than 97.5 will result in automatic success of the mission regardless of the number and quality of defenders. A roll of 2.5 or lower is a critical failure and generally will result in the death of your Agent in addition to political consequences. Otherwise, the dice roll is thereafter modified by the attacking Agent's level, gaining a bonus of the Agent's level plus the 1d5 times the Agent's level. With the best possible rolling, a level 10 Agent could receive a bonus of 60 to his initial dice roll, not accounting for bonuses applied by technological advances or artifacts that affect espionage. \n \n The Attacker's roll is then reduced by the best Defensive roll produced by any Defenders. For each Defender, the roll is reduced by the Defender's level plus 1d3 times the Defender's level. A level 10 Defender could therefore reduce an attacker's roll by as much as 40. However, only the highest Defender roll is applied. \n \n Finally, the modified dice roll is then tested against the difficulty of the chosen mission. Some missions, like training, have no defenders and are generally easy to succeed at. Other missions, like Steal Technology, are very difficult and will require a trained agent to be successful. "
 RUS: "Расчет успеха или провала агента, выполняющего задание, начинается с генерации случайной процентной величины с точностью до десятых долей в интервале от 0 до 100. Выпадение числа больше 97,5 означает автоматический успех выполнения задания вне зависимости от количества и эффективности агентов контрразведки. Выпадение числа меньше 2,5 автоматически означает провал, как правило, сопряженный с гибелью агента и неприятными политическими последствиями. В остальных случаях бросок модифицируется уровнем агента, который получит бонус, равный уровню агента + 1d5 уровней агента. При идеальном раскладе агент 10-го уровня может получить бонус к начальному броску, равный 60, без учета бонусов технологических достижений и артефактов, влияющих на шпионаж. \n \n Затем бросок агента снижается на величину лучшего броска за защитников. За каждого защитника бросок атакующего снижается на уровень защитника плюс 1d3 уровня защитника. Таким образом, агент контрразведки 10-го уровня может снизить величину броска для атакующего агента вплоть до 40, но в любом случае в расчет берется только максимальный бросок из всех обороняющихся. \n \n Наконец, модифицированный бросок сравнивается со сложностью выбранного задания. Некоторые задания, такие как обучение, не предполагают наличия обороняющихся агентов и в целом обычно выполняются успешно. Другие задания, такие как кража технологий, намного сложнее, и на них лучше всего отправлять только самых лучших агентов. "
 PTB: "O cálculo do sucesso ou fracasso de um Agente em missão começa com uma rolagem aleatória de precisão decimal entre 0 e 100. Uma rolagem maior que 97,5 resultará em sucesso automático da missão, independentemente do número e da qualidade dos defensores. Uma rolagem de 2,5 ou menos é uma falha crítica e geralmente resultará na morte do seu Agente, além de consequências políticas. Caso contrário, a rolagem é então modificada pelo nível do Agente atacante, recebendo um bônus igual ao nível do Agente mais 1d5 vezes o nível do Agente. Com a melhor rolagem possível, um Agente de nível 10 poderia receber um bônus de 60 à rolagem inicial, sem contar bônus aplicados por avanços tecnológicos ou artefatos que afetem espionagem. \n \n A rolagem do Atacante é então reduzida pela melhor rolagem Defensiva produzida por qualquer Defensor. Para cada Defensor, a rolagem é reduzida pelo nível do Defensor mais 1d3 vezes o nível do Defensor. Um Defensor de nível 10 poderia, portanto, reduzir a rolagem do atacante em até 40. Porém, apenas a maior rolagem de Defensor é aplicada. \n \n Por fim, a rolagem modificada é testada contra a dificuldade da missão escolhida. Algumas missões, como treinamento, não têm defensores e geralmente são fáceis de concluir com sucesso. Outras missões, como Roubar Tecnologia, são muito difíceis e exigirão um agente treinado para serem bem-sucedidas. "
CodexDiplomacyAgentMissions:
 Id: 100125
 ENG: "Agent Missions"
 RUS: "Задания агентов"
 PTB: "Missões de Agentes"
CodexDiplomacyAgentMissionsShort:
 Id: 100126
 ENG: "Missions costs and Difficulty Checks"
 RUS: "Цена заданий и проверки сложности"
 PTB: "Custos das missões e testes de dificuldade"
CodexDiplomacyAgentMissionsText:
 Id: 100127
 ENG: "The following data applies to espionage missions that may be undertaken by your Agents. In every case, a success will result in a gain of +1 level for your Agent. Failures will damage your relations with the target Empire but your Agent will live. Critical Failures will result in your Agent's death. \n\n\nAgent Training takes 25 turns and costs 50 credits. The goal of Agent training is to increase the level of your agents without risking them on more difficult missions. Critical success is achieved with a modified role of 95 or greater and results in a gain of +2 levels for the Agent. Success is achived with a roll or 25 or greater. Rolling less than 25 will result in failed training. Rolling less than 10 will result in a training accident that kills your Agent. \n\n\nInfiltration takes 30 turns and costs 75 credits. The goal of infiltration is to place an Agent on a random enemy colony so that you can monitor their activities. If successful, the Agent's status will change to \"Undercover\" and you will have sensor data for the infiltrated colony plus access to their colony screen. Success is achieved with a roll of 50 or better. Rolling less than 50 will result in a failed infiltration and political consequences. Rolling less than 25 will result in your Agent being captured and killed. Once an Agent has successfully infiltrated a colony, he will remain on that colony until he is killed by an enemy with the Assassinate mission, or until you reassign the Agent to a new mission. \n\n      \nSabotage takes 30 turns and 75 credits. Successful sabotage will cripple the production of a random enemy colony for a number of turns dependent on the level of your agent. A roll of 80 or better is a critical success, which will result in the colony being crippled for a number of turns equal to 5 +  5 times the Agent's level. A roll of 50 or better will cripple the colony for 5 + 3 times the Agent's level turns, but you will be detected. Rolling less than 50 is a failure; less than 15 is a critical failure. If multiple Agents sabotage the same colony then the effects are cumulative. \n\n      \nAssassination takes 50 turns and requires 75 credits. Successful Assassination will remove a random enemy Agent from the targeted empire. A roll of 85 or better is a critical success. A roll of 70 or better is a success, but you will be detected. A roll of 40 or better is a failure, but your Assassin will escape unharmed. Rolling less than 40 will result in your Agent being killed. Assassination is therefore a mission for higher-level agents. \n\n\nSteal Technology takes 50 turns and requires 250 credits. If there are no technologies to steal at the end of 50 turns, then you will be refunded 125 credits. A roll of 85 or better is a critical success, whereas a roll of 75 or better is a success that results in detection. A roll of 20 or better results in a failure but your Agent will escape unharmed. Rolling less than 20 will result in the death of your Agent. \n\n\nIncite Rebellion takes 100 turns and 250 credits. If this mission is a success then rebel troops will spawn on a random enemy planet and attack the infrastructure there. Critical Success 85+ / Success 70+ / Fail 40+ / Critical Fail 0-40 \n\n\nRobbery takes 30 turns and 50 credits. If successful, your agent will steal 1-50 credits times the Agent's level from target empire. The Agent cannot steal more money than the target empire has. Critical Success 85+ / Success 70+ / Fail 20+ / Critical Fail 0-20\n\n      "
 RUS: "Нижеприведенные данные относятся к заданиям, которые вы можете поручить вашим агентам. В любом из этих случаев при успешном выполнении задания агент получит +1 уровень. При неудаче ваши отношения с другой империей испортятся, но агент останется в игре. При критическом провале агент погибнет. \n\n\nОбучение агента занимает 25 ходов и стоит 50 кредитов. Цель обучения – повысить уровень агента, не рискуя им, отправляя его на опасное задание. При модифицированном броске 95 и выше агент получит сразу +2 уровня вследствие критического успеха. Обычный успех достигается при модифицированном броске 25 или выше. Бросок в интервале от 10 до 25 означает неудачу. Бросок меньше 10 означает несчастный случай при обучении, и агент погибнет. \n\n\nВнедрение идет 30 ходов и стоит 75 кредитов. Смысл этого задания заключается во внедрении агента во вражескую колонию, чтобы вы могли наблюдать за всем, что в ней происходит. При успешном внедрении агент уйдет в подполье, и вам будут предоставлены все данные сканеров для этой колонии, плюс у вас будет доступ к экрану этой колонии. Успех достигается при броске 50 или выше. Бросок от 25 до 49 означает провал внедрения и негативные политические последствия. При броске менее 25 ваш агент будет схвачен и убит. После того как агент успешно внедрился в колонию, он будет оставаться там в подполье, пока не будет убит вражеским агентом, выполняющим задание по ликвидации, или пока вы не отправите его на новое задание. \n\n      \nДиверсия идет 30 ходов и стоит 75 кредитов. При успешно осуществленной диверсии производство в случайно выбранной вражеской колонии будет остановлено на количество ходов, зависящее от уровня вашего агента. Бросок 80 или выше автоматически подразумевает критический успех, и производство в колонии будет остановлено на кол-во ходов, равное 5 + 5*уровень агента. Бросок 50 или выше остановит производство на кол-во ходов, равное 5 + 3*уровень агента, но при этом вас засекут. Бросок меньше 50 означает неудачу; меньше 15 – критический провал. Если диверсию в колонии осуществляли несколько агентов, эффекты от их подрывной деятельности суммируются. \n\n      \nЛиквидация идет 50 ходов и стоит 75 кредитов. При успешной ликвидации в выбранной империи будет уничтожен случайно выбранный вражеский агент. Бросок 85 или выше автоматически подразумевает критический успех. Бросок 70 или выше означает успех, но вас засекут. Бросок 40 или выше является неудачей, но ваш агент уцелеет. При броске меньше 40 ваш агент будет убит. Ликвидацию лучше поручать агентам высоких уровней. \n\n\nКража технологии идет 50 ходов и стоит 250 кредитов. Если по истечении этих 50 ходов у врага не окажется технологии, которую вы могли бы украсть, вы получите компенсацию в 125 кредитов. Бросок 85 или выше автоматически подразумевает критический успех. Бросок 20 или выше является неудачей, но ваш агент уцелеет. При броске меньше 20 ваш агент будет убит. \n\n\nПодстрекательство к мятежу идет 100 ходов и стоит 250 кредитов. Если миссия завершится успешно, на случайно выбранной вражеской планете появятся враждебные отряды повстанцев, которые начнут атаковать планетарную инфраструктуру. Критический успех 85+ / Успех 70+ / Неудача 40+ / Провал 0-40 \n\n\nГрабеж идет 30 ходов и стоит 50 кредитов. При успехе агент украдет у выбранной империи в вашу пользу 1-50 кредитов за каждый свой уровень. Агент не может украсть больше денег, чем есть в казне у выбранной империи. Критический успех 85+ / Успех 70+ / Неудача 20+ / Провал 0-20\n\n\n      "
 PTB: "Os dados a seguir se aplicam às missões de espionagem que podem ser realizadas por seus Agentes. Em todos os casos, um sucesso resultará em ganho de +1 nível para seu Agente. Falhas prejudicarão suas relações com o Império-alvo, mas seu Agente sobreviverá. Falhas críticas resultarão na morte do seu Agente. \n\n\nTreinamento de Agente leva 25 turnos e custa 50 créditos. O objetivo do treinamento de Agente é aumentar o nível dos seus agentes sem arriscá-los em missões mais difíceis. Sucesso crítico é alcançado com uma rolagem modificada de 95 ou mais e resulta em ganho de +2 níveis para o Agente. Sucesso é alcançado com uma rolagem de 25 ou mais. Rolar menos de 25 resultará em falha no treinamento. Rolar menos de 10 resultará em um acidente de treinamento que mata seu Agente. \n\n\nInfiltração leva 30 turnos e custa 75 créditos. O objetivo da infiltração é colocar um Agente em uma colônia inimiga aleatória para que você possa monitorar suas atividades. Se for bem-sucedida, o status do Agente mudará para \"Infiltrado\" e você terá dados de sensores da colônia infiltrada, além de acesso à tela dessa colônia. Sucesso é alcançado com uma rolagem de 50 ou melhor. Rolar menos de 50 resultará em falha na infiltração e consequências políticas. Rolar menos de 25 resultará na captura e morte do seu Agente. Depois que um Agente se infiltrar com sucesso em uma colônia, ele permanecerá nessa colônia até ser morto por um inimigo com a missão Assassinato ou até que você o reatribua a uma nova missão. \n\n      \nSabotagem leva 30 turnos e 75 créditos. Uma sabotagem bem-sucedida prejudicará a produção de uma colônia inimiga aleatória por um número de turnos dependente do nível do seu agente. Uma rolagem de 80 ou melhor é um sucesso crítico, que fará a colônia ficar prejudicada por um número de turnos igual a 5 + 5 vezes o nível do Agente. Uma rolagem de 50 ou melhor prejudicará a colônia por 5 + 3 vezes o nível do Agente, mas você será detectado. Rolar menos de 50 é uma falha; menos de 15 é uma falha crítica. Se vários Agentes sabotarem a mesma colônia, os efeitos serão cumulativos. \n\n      \nAssassinato leva 50 turnos e exige 75 créditos. Um Assassinato bem-sucedido removerá um Agente inimigo aleatório do império-alvo. Uma rolagem de 85 ou melhor é um sucesso crítico. Uma rolagem de 70 ou melhor é um sucesso, mas você será detectado. Uma rolagem de 40 ou melhor é uma falha, mas seu Assassino escapará ileso. Rolar menos de 40 resultará na morte do seu Agente. Portanto, Assassinato é uma missão para agentes de nível mais alto. \n\n\nRoubar Tecnologia leva 50 turnos e exige 250 créditos. Se não houver tecnologias para roubar ao final dos 50 turnos, você receberá reembolso de 125 créditos. Uma rolagem de 85 ou melhor é um sucesso crítico, enquanto uma rolagem de 75 ou melhor é um sucesso que resulta em detecção. Uma rolagem de 20 ou melhor resulta em falha, mas seu Agente escapará ileso. Rolar menos de 20 resultará na morte do seu Agente. \n\n\nIncitar Rebelião leva 100 turnos e 250 créditos. Se esta missão for um sucesso, tropas rebeldes surgirão em um planeta inimigo aleatório e atacarão a infraestrutura local. Sucesso Crítico 85+ / Sucesso 70+ / Falha 40+ / Falha Crítica 0-40 \n\n\nRoubo leva 30 turnos e 50 créditos. Se for bem-sucedido, seu agente roubará de 1 a 50 créditos vezes o nível do Agente do império-alvo. O Agente não pode roubar mais dinheiro do que o império-alvo possui. Sucesso Crítico 85+ / Sucesso 70+ / Falha 20+ / Falha Crítica 0-20\n\n      "
