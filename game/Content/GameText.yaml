ThisCrystallineStructureSyncsWith:
 Id: 4095
 ENG: "This crystalline structure syncs with and amplifies the brain waves of biological organisms. Simply put, everything that gets near to it becomes smarter. +0.5 research per turn to the owner of this planet"
 RUS: "Эта кристаллическая структура синхронизируется и усиливает мозговые волны биологических организмов. Проще говоря, все, что к нему приближается, становится умнее. +0.5 исследование за ход владельцу этой планеты."
 SPA: "Esta estructura cristalina se sincroniza y amplifica las ondas cerebrales de los organimos biológicos. de forma simple, todo lo que se le acerce se vuelve mas inteligente. +0.5 de investigación al dueño de este planeta."
 UKR: "Ця кристалічна структура синхронізується з мозковими хвилями біологічних організмів і підсилює їх. Простіше кажучи, все, що опиняється поруч з нею, стає розумнішим. +0.5 дослідження за хід власнику цієї планети"
 PTB: "Esta estrutura cristalina sincroniza e amplifica as ondas cerebrais de organismos biológicos. Em termos simples, tudo que se aproxima dela fica mais inteligente. +0,5 de pesquisa por turno para o dono deste planeta"
ResearchPerTurn3:
 Id: 4096
 ENG: "+0.5 research per turn"
 RUS: "+0.5 исследование за ход"
 SPA: "+0.5 de investigación por turno"
 UKR: "+0.5 дослідження за хід"
 PTB: "+0,5 de pesquisa por turno"
CommoditiesAreSpecialResourcesThat:
 Id: 4097
 ENG: "Commodities are special resources that are limited in number and provide unique bonuses to colonies that possess them. Commodities are harvested automatically at colonies where they occur naturally. They can then be moved throughout your empire using freighters. You may specify whether you wish to import or export any commodities you have access to in this panel."
 RUS: "Товары - это особые ресурсы, количество которых ограничено и дает уникальные бонусы колониям, которые ими владеют. Товары собираются автоматически в колониях, где они производятся в естественных условиях. Затем их можно перемещать по вашей империи на грузовых судах. Вы можете указать, хотите ли вы импортировать или экспортировать какие-либо товары, к которым у вас есть доступ.На этой панели."
 SPA: "las \"comodidades\" son un recurso especial, limitados en numero y proveen bonificaciones unicas a las colonias que las poseen. las \"comodidades\" son cosechadas de forma automatica en los planetas donde ocurren de forma natural. pueden ser movidas a travez de tu imperio usando cargueros. puedes escoger si importar o exportar cualquier \"comododidad\" a la que tienes acceso en este panel."
 UKR: "Товари - це особливі ресурси, які обмежені в кількості і дають унікальні бонуси колоніям, які ними володіють. Сировинні ресурси автоматично збираються в колоніях, де вони зустрічаються в природі. Потім їх можна переміщати по всій вашій імперії за допомогою вантажних кораблів. На цій панелі ви можете вказати, чи хочете ви імпортувати або експортувати будь-які товари, до яких у вас є доступ."
 PTB: "Mercadorias são recursos especiais, limitados em número, que fornecem bônus únicos às colônias que as possuem. As mercadorias são coletadas automaticamente nas colônias onde ocorrem naturalmente. Depois, podem ser movidas por todo o seu império usando cargueiros. Neste painel, você pode especificar se deseja importar ou exportar qualquer mercadoria a que tenha acesso."
