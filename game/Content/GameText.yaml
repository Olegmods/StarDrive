AreBothBeautifulAndTerrifying:
 Id: 1318
 ENG: " are both beautiful and terrifying, with an enigmatic sort of lethal majesty that serves them well in contests of diplomacy or strength. "
 RUS: " и красивы, и ужасающи; они создают вокруг себя атмосферу грозного величия, что играет им на руку в дипломатических переговорах. "
 SPA: " son a la vez hermosos y aterradores, con una especie de majestuosidad enigmática y letal que aprovechan bien en pugnas diplomáticas o bélicas. "
 UKR: " одночасно прекрасні і жахливі, із загадковою смертоносною величчю, яка добре служить їм у змаганнях дипломатії чи сили."
 PTB: " são ao mesmo tempo belos e aterrorizantes, com uma espécie de majestade letal e enigmática que lhes serve bem em disputas de diplomacia ou força. "
AppearBothLethalAndGrotesque:
 Id: 1319
 ENG: " appear both lethal and grotesque, as they tend to project a sense of instinctive, terrifying revulsion upon species who are unfortunate enough to meet them in diplomacy or combat. "
 RUS: " выглядят одновременно грозно и отвратительно. У особей, имевших несчастье повстречаться с ними на переговорах или в сражении, они вызывают инстинктивный страх и отвращение. "
 SPA: " su aspecto es tan letal como grotesco, ya que tienden a proyectar una sensación de repulsión instintiva y terrorífica sobre especies que tienen la desgracia de lidiar con ellos en la batalla o en la diplomacia. "
 UKR: " виглядають одночасно смертоносними і гротескними, оскільки вони, як правило, проектують почуття інстинктивної, жахливої відрази на види, яким не пощастило зустрітися з ними в дипломатії або в бою."
 PTB: " parecem ao mesmo tempo letais e grotescos, pois tendem a projetar uma sensação instintiva e aterrorizante de repulsa nas espécies infelizes o bastante para encontrá-los em diplomacia ou combate. "
AppearSomewhatBestialWithObvious:
 Id: 1320
 ENG: " appear somewhat bestial, with obvious signs of their great strength, speed, and lethality apparent in their physique. "
 RUS: " выглядят немного по-звериному; по их облику однозначно можно сказать, что они сильны, ловки и смертоносны. "
 SPA: " parecen algo brutales y tienen indicios físicos manifiestos de gran fuerza, velocidad y capacidad mortífera. "
 UKR: " виглядають дещо звірячими, з очевидними ознаками їхньої величезної сили, швидкості та смертоносності, що проявляються в їхній статурі."
 PTB: " parecem um tanto bestiais, com sinais óbvios de sua grande força, velocidade e letalidade aparentes em seu físico. "
AreCreaturesOfFragileBeauty:
 Id: 1321
 ENG: " are creatures of fragile beauty, with a delicate and ephemeral stature that many species find majestic and alluring. "
 RUS: " являются красивыми и хрупкими созданиями, что является привлекательным в глазах представителей многих других рас. "
 SPA: " son criaturas de una belleza frágil, de imagen delicada y efímera que muchas especies encuentran augusta y seductora. "
 UKR: " це створіння тендітної краси, з витонченою і ефемерною статурою, яку багато видів вважають величною і привабливою."
 PTB: " são criaturas de beleza frágil, com uma estatura delicada e efêmera que muitas espécies consideram majestosa e atraente. "
AppearGnarledAndWeakWith:
 Id: 1322
 ENG: " appear gnarled and weak, with a countenance both hideous and scrawny. "
 RUS: " выглядят скрюченными и слабыми; их вид никак нельзя назвать привлекательным. "
 SPA: " parecen retorcidos y débiles, con un semblante igual escuálido y abominable a partes iguales. "
 UKR: " виглядають кострубатими і слабкими, з огидним і кістлявим обличчям."
 PTB: " parecem retorcidos e fracos, com uma aparência ao mesmo tempo horrenda e mirrada. "
SeemToHaveEvolvedWithout:
 Id: 1323
 ENG: " seem to have evolved without much need for speed or strength and as a result are somewhat frail compared to peer species. "
 RUS: " смогли эволюционировать, не развивая в себе ни физическую силу, ни ловкость, поэтому на фоне других особей они выглядят хрупко. "
 SPA: " aparentemente han evolucionado sin mucha necesidad de velocidad o fuerza y, en consecuencia, son algo frágiles en comparación con especies semejantes. "
 UKR: " схоже, еволюціонували без особливої потреби у швидкості чи силі, і тому є дещо кволими порівняно з іншими видами."
 PTB: " parecem ter evoluído sem muita necessidade de velocidade ou força e, como resultado, são um tanto frágeis em comparação com espécies equivalentes. "
PossessANonthreateningCountenanceThat:
 Id: 1324
 ENG: " possess a non-threatening countenance that projects neither an overabundance of strength or weakness. However, they are exceedingly charismatic and naturally draw others towards them. "
 RUS: " обладают обычной внешностью, которая не предполагает какой-то особенной силы или слабости. Тем не менее, они очень обаятельны, и другие особи инстинктивно тянутся к ним. "
 SPA: " poseen un semblante poco amenazador que no refleja exceso de puntos fuertes o débiles. Sin embargo, por naturaleza sobresalen por su carisma y saben ganarse a los demás. "
 UKR: " мають не загрозливий вигляд, який не демонструє ані надмірної сили, ані слабкості. Однак вони надзвичайно харизматичні і природно притягують до себе інших."
 PTB: " possuem uma aparência não ameaçadora que não projeta excesso de força nem fraqueza. Contudo, são extremamente carismáticos e naturalmente atraem os outros para perto deles. "
PossessANonthreateningCountenanceThat2:
 Id: 1325
 ENG: " possess a non-threatening countenance that projects neither an overabundance of strength or weakness. However, they are offensively mannered with many odiferous bodily functions that tend to drive others away from them. "
 RUS: " обладают обычной внешностью, которая не предполагает какой-то особенной силы или слабости. Тем не менее, они обладают неприятными манерами и отталкивающими функциями организма, поэтому другие стараются сторониться их. "
 SPA: " poseen un semblante poco amenazador que no refleja exceso de puntos fuertes o débiles. Sin embargo, son de modales bruscos, con muchas funciones corporales malolientes que tienden a repeler a los demás. "
 UKR: " мають не загрозливий вигляд, який не виказує ані надмірної сили, ані слабкості. Однак, вони мають агресивну манеру поведінки з багатьма пахучими тілесними функціями, які, як правило, відштовхують від них інших."
 PTB: " possuem uma aparência não ameaçadora que não projeta excesso de força nem fraqueza. Contudo, têm modos ofensivos e muitas funções corporais odoríferas que tendem a afastar os outros. "
HaveNoParticularStrengthsOr:
 Id: 1326
