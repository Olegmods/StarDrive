 UKR: "Цей корабель заблоковано і він не може увійти у варп. Дивіться червоний символ стану нижче для більш детальної інформації. Ви можете вимкнути ці текстові та кругові сповіщення на екрані автоматизації. Ви також можете увімкнути відображення гравітаційного колодязя за допомогою відповідної кнопки поруч з міні-мапою."
