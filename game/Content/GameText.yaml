 RUS: "Оружие, наносящее меньше урона, чем это значение, просто будет отражено этой броней из-за ее толщины. Это не влияет на лучи из-за их туннельной способности. Отклонение имеет эффективность 10% против урона ЭМИ."
 SPA: "Las armas que hacen menos daño (o daño EMP) que este valor seran deflectadas por este blindaje debido a su grosor. los haces no son afectador por esto debido a su habilidad de tunelear."
 UKR: "Зброя, яка завдає менше шкоди, ніж це значення, буде просто відбиватися від цієї броні через її товщину. На промені це не впливає, оскільки вони здатні тунелювати. Відхилення має 10% ефективності проти шкоди від ЕМІ."
 PTB: "Armas que causam menos dano que este valor serão simplesmente desviadas por esta Blindagem devido à sua espessura. Feixes não são afetados por isso devido à sua capacidade de tunelamento. A deflexão tem 10% de eficiência contra Dano EMP."
WeaponsWhichDoLessDamage2:
