 RUS: "Имперские офицеры позволяют осуществлять прямое налогообложение населения, дополнительно давая 0,25 кредита с колониста каждый ход. Этот базовый доход не модифицируется налоговыми ставками и зданиями, влияющими ан налоговые сборы. "
 SPA: "Las oficinas imperiales permiten recaudar impuestos directamente de los ciudadanos, obteniendo ingresos a una tasa de 0,25 créditos por colono y por turno. Estos ingresos básicos no se ven modificados por tasas impositivas ni edificios que afecten a los ingresos fiscales. "
 UKR: "Імперські офіси дозволяють пряме оподаткування громадян, надаючи дохід у розмірі 0.25 кредиту на колоніста за хід. Цей базовий дохід не змінюється податковими ставками або будівлями, які змінюють податкові доходи."
 PTB: "Escritórios Imperiais permitem a tributação direta dos cidadãos, concedendo renda à taxa de 0,25 crédito por colono por turno. Esta renda base não é modificada por taxas de imposto nem por edifícios que modificam a renda de impostos. "
ThisShieldProvidesHpWorth:
 Id: 1049
 ENG: "This shield provides 10,000 hp worth of protection in a 120 meter radius. It has a high power cost.  "
 RUS: "Этот щит имеет ресурс поглощения в 10000 ОП в радиусе 120 м. Он имеет высокое энергопотребление."
 SPA: "Este escudo proporciona una protección de 10 000 puntos de vida en un radio de 120 metros. Su consumo de energía es alto.  "
 UKR: "Цей щит забезпечує захист потужністю 10 000 ОЖ. в радіусі 120 метрів. Він має високу вартість енергії.  "
 PTB: "Este escudo fornece 10.000 PV de proteção em um raio de 120 metros. Tem um alto custo de energia.  "
ThisParticularShieldModelProvides:
 Id: 1051
 ENG: "This particular shield model provides 3000 hp worth of defense within a 98 meter protective radius. "
 RUS: "Этот щит имеет ресурс поглощения в 3000 ОП в радиусе 98 метров."
 SPA: "Este modelo de escudo en concreto proporciona una defensa de 3000 puntos de vida en un radio de 98 metros. "
 UKR: "Ця модель щита забезпечує захист у 3000 ОЖ в радіусі 98 метрів."
 PTB: "Este modelo específico de escudo fornece 3000 PV de defesa dentro de um raio protetor de 98 metros. "
ThisSmallShieldIsCapable:
 Id: 949
 ENG: "This small shield is capable of absorbing up to 500 damage in a radius of 50. Its quick recharge rate makes it ideal for small fighter craft. "
 RUS: "Этот маленький щит имеет ресурс поглощения в 500 ОП в радиусе 50 метров. Быстрая скорость перезарядки делает его идеальным выбором для защиты небольших истребителей. "
 SPA: "Este pequeño escudo absorbe hasta 500 puntos de daño en un radio de 50 metros. Su rapidez de recarga hace que sea ideal para pequeños cazas. "
 UKR: "Цей невеликий щит здатен поглинати до 500 одиниць ураження в радіусі 50 метрів. Швидка швидкість перезарядки робить його ідеальним для малих винищувачів."
 PTB: "Este pequeno escudo é capaz de absorver até 500 de dano em um raio de 50. Sua rápida taxa de recarga o torna ideal para pequenas naves de caça."
BB_Tech_Terraforming_Desc:
 Id: 684
 ENG: "Terraforming planets is a slow process but it can produce excellent results. Any planet with a fertility score lower than 1 can benefit from the effects of a terraformer. Terraforming will never increase a planet's natural fertility beyond 1"
 UKR: "Тераформування планет - це повільний процес, але він може дати чудові результати. Будь-яка планета з показником родючості нижче 1 може отримати вигоду від тераформування. Тераформування ніколи не збільшить природну родючість планети вище 1"
 PTB: "Terraformar planetas é um processo lento, mas pode produzir excelentes resultados. Qualquer planeta com fertilidade inferior a 1 pode se beneficiar dos efeitos de um terraformador. A terraformação nunca aumentará a fertilidade natural de um planeta acima de 1."
CloningCentersIncreaseThePopulation:
 Id: 413
 ENG: "Cloning Centers increase the population growth of a planet."
 RUS: "Центры клонирования увеличивают прирост населения планеты на фиксированную величину в 0,02 за ход.  "
 SPA: "Los centros de clonación aumentan el crecimiento demográfico de un planeta a un ritmo fijo de 0,02 por turno.  "
 UKR: "Центри клонування збільшують приріст населення планети."
 PTB: "Centros de Clonagem aumentam o crescimento populacional de um planeta."
XenoFarmsAreLargeComplexes:
 Id: 471
 ENG: "Xeno Farms are large complexes dedicated to the successful integration of our farming and husbandry techniques with alien soils and nutrients.  The production of this building scales with the number of farmers assigned on this planet. Provides +1 food per turn per assigned colonist. "
 RUS: "Ксенофермы - это крупные комплексы, направленные на адаптацию наших сельскохозяйственных и животноводческих технологий под инопланетные почвы и питательные вещества. Производительность этого строения зависит от количества фермеров на планете. Дает +1 еды в ход за каждого занятого колониста. "
 SPA: "Las xenogranjas son grandes complejos dedicados a la integración de nuestras técnicas agrícolas y ganaderas con suelos y nutrientes alienígenas.  La producción de este edificio se corresponde al número de granjeros asignados en este planeta. Proporciona +0,5 de alimentos por turno y por colono asignado. "
 UKR: "Ксеноферми - це великі комплекси, призначені для успішної інтеграції наших технологій землеробства та тваринництва з чужими ґрунтами та поживними речовинами.  Продуктивність цієї будівлі залежить від кількості фермерів на планеті. Дає +1 їжу за хід за кожного призначеного колоніста."
 PTB: "Fazendas Xeno são grandes complexos dedicados à integração bem-sucedida das nossas técnicas de agricultura e criação com solos e nutrientes alienígenas. A produção deste edifício escala com o número de agricultores designados neste planeta. Fornece +1 de comida por turno por colono designado. "
BB_Tech_CanopyShields_Desc:
 Id: 527
 ENG: "This is a monstrous shield with the a high resistance and a massive protection radius, making it ideal for capital ships or specialized shield ships.  The power costs are enormous."
 RUS: "Этот колоссальный щит с огромным ресурсом и радиусом защиты имеет смысл устанавливать только на флагманские корабли и специализированные корабли-щиты. Его энергопотребление просто невероятно."
 SPA: "Se trata de un escudo monstruoso de gran resistencia y con un enorme radio de protección, por lo que es ideal para naves capitanas y naves escudo especializadas.  Su coste energético es tremendo."
 UKR: "Це жахливий щит з високим опором і величезним радіусом захисту, що робить його ідеальним для капітальних кораблів або спеціалізованих щитових кораблів.  Витрати енергії величезні."
 PTB: "Este é um escudo monstruoso, com alta resistência e um raio de proteção enorme, tornando-o ideal para naves capitais ou naves especializadas em escudos. Os custos de energia são enormes."
ThisShieldProvidesHpOf:
 Id: 917
 ENG: "This shield provides 25,000 hp of protection in a radius of 400. It has extreme power costs. "
 RUS: "Этот щит имеет ресурс поглощения в 25000 ОП в радиусе 400 м. Он имеет колоссальное энергопотребление."
 SPA: "Este escudo ofrece una protección de 25 000 puntos de vida en un radio de 400; su consumo energético es elevadísimo. "
 UKR: "Цей щит забезпечує 25 000 ОЖ захисту в радіусі 400 метрів. Він має надзвичайну вартість енергії."
 PTB: "Este escudo fornece 25.000 HP de proteção em um raio de 400. Possui custos de energia extremos."
DeepCoreMinesAreExtremely:
 Id: 419
 ENG: "Deep Core Mines are extremely effective at rapidly extracting minerals from deep within a planet's core, but are environmentally disastrous. Adds flat rate production equal to 5 times a planet's mineral richness but permanently decreases a planet's fertility by 0.6."
 RUS: "Сверхглубокие шахты очень эффективны для быстрого извлечения минералов и руд из прилегающих к ядру слове планетарной коры, но при этом они оказывают колоссальный негативный эффект на экосистему планеты. Добавляет фиксированный бонус производства в количестве 4х богатства планеты минералами и перманентно снижает ее индекс плодородия на 0.6."
 SPA: "Las minas de núcleo profundo son sumamente eficaces a la hora de extraer minerales de las profundidades de un planeta, pero son devastadoras para el medio ambiente. Añade una producción a un ritmo constante igual a cuatro veces la riqueza mineral del planeta, pero reduce permanentemente su fertilidad en 0.6."
 UKR: "Глибинні шахти надзвичайно ефективні для швидкого видобутку корисних копалин з глибин ядра планети, але є екологічно катастрофічними. Збільшує видобуток корисних копалин у 5 разів, але назавжди знижує родючість планети на 0,6."
 PTB: "Minas de Núcleo Profundo são extremamente eficazes para extrair rapidamente minerais das profundezas do núcleo de um planeta, mas são ambientalmente desastrosas. Adiciona produção fixa igual a 5 vezes a riqueza mineral do planeta, mas reduz permanentemente a fertilidade do planeta em 0,6."
ThisModuleContainsAllOf:
 Id: 925
 ENG: "This module contains all of the equipment, food, and colonists necessary to start a new colony on a distant world, including a small number of colonists as well as 2 food and 2 production to jump start their efforts. Colonizing a planet will consume the ship used to colonize, but if it carries troops, they will land on the planet. Cargo modules will add to the number of colonists the colony ship can load."
 RUS: "Этот модуль содержит все необходимое оборудование, запасы продовольствия и самих колонистов для основания новой колонии в далеком мире, предоставляя некоторое количество поселенцев, 2 еды и 2 ед. производства для начального развития колонии.Колонизация планеты поглотит корабль, использовавшийся для колонизации, но если на нем есть войска, они высадятся на планете. Грузовые модули увеличивают количество колонистов, которые может загрузить колониальный корабль."
 SPA: "Este módulo contiene todo el equipo, alimentos  y colonos necesarios para fundar una nueva colonia en un mundo remoto, incluido un pequeño número de colonos además de 2 de alimentos y 2 de producción para facilitar sus esfuerzos iniciales. \n \nAl colonizar el planeta, se consumirá la nave colonizadora. "
 UKR: "Цей модуль містить все обладнання, їжу та колоністів, необхідних для заснування нової колонії на далекій планеті, включаючи невелику кількість колоністів, а також 2 харчові та 2 виробничі ресурси для старту їхньої діяльності. Колонізація планети витрачає корабель, який використовується для колонізації, але якщо він перевозить війська, то вони висаджуються на планету. Вантажні модулі збільшують кількість колоністів, яких може взяти на борт колоніальний корабель."
 PTB: "Este módulo contém todos os equipamentos, alimentos e colonistas necessários para iniciar uma nova colônia em um mundo distante, incluindo um pequeno número de colonistas, além de 2 de alimento e 2 de produção para impulsionar seus primeiros esforços. Colonizar um planeta consumirá a nave usada na colonização, mas, se ela carregar tropas, elas desembarcarão no planeta. Módulos de carga aumentarão o número de colonistas que a nave-colônia pode carregar."
IfTheBridgeIsThe:
 Id: 987
 ENG: "If the bridge is the brain of a starship then Main Engineering is its beating heart. This module generates a large subspace field capable of allowing capital ships to reach Warp Speeds. It also generates a substantial amount of power. However, if the main reactor is destroyed then a massive explosion will claim all but the hardiest of ships."
 RUS: "Если мостик - это мозг космического корабля, то инженерный отсек - его бьющееся сердце. Этот модуль содержит интегрированные энергетические системы, систему контроля урона, а также предоставляет бонус к скорости корабля в варпе. Однако при уничтожении главного реактора взрыв чудовищной силы почти наверняка уничтожит корабль целиком."
 SPA: "Si el puente es el cerebro de una nave estelar, la ingeniería principal es su corazón. Este módulo cuenta con avanzados sistemas de energía integrados, control de daños y una mejora de la propulsión de la nave a velocidad estelar supraluminal. Sin embargo, si el reactor principal es destruido, la tremenda explosión que se producirá acabará con todo menos con las naves más resistentes."
 UKR: "Якщо місток - це мозок зорельота, то головна інженерна - це його серце, що б'ється. Цей модуль генерує велике підпросторове поле, здатне дозволити капітальним кораблям досягти варп-швидкості. Він також генерує значну кількість енергії. Однак, якщо головний реактор буде зруйновано, потужний вибух знищить усі кораблі, окрім найміцніших."
 PTB: "Se a ponte é o cérebro de uma nave estelar, então a Engenharia Principal é seu coração pulsante. Este módulo gera um grande campo subespacial capaz de permitir que naves capitais alcancem velocidades de dobra. Ele também gera uma quantidade substancial de energia. Porém, se o reator principal for destruído, uma explosão massiva destruirá quase todas as naves, exceto as mais resistentes."
HarnessesAMatterantimatterReactionTo:
 Id: 907
 ENG: "Harnesses a matter/anti-matter reaction to create large amounts of power. Explodes when destroyed. "
 RUS: "Использует управляемую реакцию материи и антиматерии для выработки больших количеств энергии. При уничтожении взрывается. "
 SPA: "Aprovecha la reacción materia/antimateria para crear grandes cantidades de energía. Explota al ser destruido. "
 UKR: "Використовує реакцію матерії/антиматерії для створення великої кількості енергії. Вибухає при знищенні."
 PTB: "Aproveita uma reação de matéria/antimatéria para criar grandes quantidades de energia. Explode quando destruído."
ShipWillAvoidEngagingIn:
 Id: 205
 ENG: "Ship will avoid engaging in combat. Good for scouts or non-combat ships"
 RUS: "Корабли будут избегать боя. Хорошая опция для разведчиков и небоевых кораблей"
 SPA: "La nave evitará entrar en combate. Es bueno para naves exploradoras y que no estén diseñadas para combatir"
 UKR: "Корабель уникатиме вступу в бій. Добре підходить для розвідників або небойових кораблів"
 PTB: "A nave evitará entrar em combate. Bom para batedores ou naves não combatentes"
BB_Tech_FuelCell2_FuelCellBonus_Bonus:
 Id: 575
 ENG: "Gain an empire-wide 30% bonus to the amount of power that is stored in fuel cells"
 RUS: "Дает по всей империи 30% бонус к энергии, запасаемой топливными блоками"
 SPA: "Añade una bonificación del 30% a la cantidad de energía almacenada en celdas de combustible"
 UKR: "Отримайте 30% бонус до кількості енергії, що зберігається в паливних елементах по всій імперії"
 PTB: "Concede um bônus de 30% em todo o império à quantidade de energia armazenada em células de combustível."
ThisHeavyLaserBeamHas:
 Id: 977
 ENG: "This heavy laser beam has pinpoint accuracy over large distances although its power to damage ratio is somewhat inefficient."
 RUS: "Этот мощный лазерный луч сохраняет прицельную точность при наводке на большие расстояния, но его КПД невысок."
 SPA: "Este rayo láser pesado tiene una gran precisión a largas distancias, aunque su relación energía-daño no es muy buena."
 UKR: "Цей важкий лазерний промінь має високу точність на великих відстанях, хоча його співвідношення потужності до шкоди є дещо неефективним."
 PTB: "Este feixe laser pesado tem precisão pontual em grandes distâncias, embora sua relação entre energia e dano seja um pouco ineficiente."
ShipsEquippedWithASubspace:
 Id: 1063
 ENG: "Ships equipped with a subspace scanning module have a substantially increased sensor range. Only a ship's best sensor bonus will apply."
 RUS: "Корабли, оснащенные модулем сканирования субпространства, имеют значительно расширенный радиус обнаружения целей. Всегда используется только самый мощный сенсор."
 SPA: "Las naves equipadas con un módulo de escaneado subespacial tienen un alcance sensorial considerablemente mayor. Solo se aplicará la bonificación del mejor sensor."
 UKR: "Кораблі, оснащені модулем підпросторового сканування, мають значно збільшений радіус дії сенсорів. Застосовується лише бонус до найкращого сенсора корабля."
 PTB: "Naves equipadas com um módulo de varredura subespacial têm alcance de sensores substancialmente aumentado. Apenas o melhor bônus de sensor da nave será aplicado."
TheDialcorpInhibitorPreventsEnemy:
 Id: 1085
 ENG: "The DialCorp Inhibitor 2.0 prevents enemy ships from engaging their FTL drives in a moderate radius. It requires incredible amounts of power to operate. Multiple inhibitors do not stack. "
 RUS: "Это устройство генерирует поле, которое не дает вражеским кораблям активировать варп-двигатели в определенном радиусе. Для работы требуется огромное количество энергии. Эффекты от нескольких варп-ингибиторов, установленных на одном корабле суммируются."
 SPA: "Este dispositivo emite un campo que impide a las naves enemigas activar la velocidad supraluminal en un radio moderado. Para funcionar, necesita cantidades ingentes de energía. Si una nave cuenta con varios inhibidores, sus efectos se acumularán. "
 UKR: "DialCorp Inhibitor 2.0 запобігає активації надзвукових двигунів ворожих кораблів у помірному радіусі. Для його роботи потрібна неймовірна кількість енергії. Кілька інгібіторів не сумуються."
 PTB: "O Inibidor DialCorp 2.0 impede que naves inimigas acionem seus motores FTL em um raio moderado. Ele exige quantidades incríveis de energia para operar. Vários inibidores não se acumulam. "
ThisSmallOrdnancePodFor:
 Id: 1009
 ENG: "This small ordnance pod for equipping fighters and other small craft with the ordnance needed to engage in a sustained battle"
 RUS: "Этот небольшой отсек с боеприпасами предназначен для снабжения боеприпасами истребителей и других маленьких кораблей в затяжных боях"
 SPA: "Esta pequeña cápsula de munición para cazas y otros aparatos pequeños proporciona la munición necesaria para mantener combates prolongados"
 UKR: "Невеликий боєкомплект для оснащення винищувачів та інших малих суден боєприпасами, необхідними для ведення тривалого бою"
 PTB: "Este pequeno compartimento de munição serve para equipar caças e outras naves pequenas com a munição necessária para sustentar uma batalha prolongada."
AlthoughUselessAgainstShieldedTargets:
 Id: 1065
 ENG: "Although almost useless against shielded targets, this weapon will strip a starship's boarding defenses by killing troops and crew, having an approximately 3 point of defense stripped per second. The effect on Mechanical Boarding Defense is only 10%"
 PTB: "Embora seja quase inútil contra alvos com escudos, esta arma removerá as defesas de abordagem de uma nave estelar ao matar tropas e tripulação, removendo aproximadamente 3 pontos de defesa por segundo. O efeito sobre Defesa de Abordagem Mecânica é de apenas 10%."
ABombBaySpeciallyEquipped:
 Id: 929
 ENG: "A bomb bay specially equipped to deliver prion-based death spore ordnance to planetary surfaces. This weapon is ineffective against hard targets but very effective against ground troops and planetary population. The Target planet will suffer temporary reduction to its Fertility level. Constant bombing might permanently reduce fertility and even change the plant climate forever."
 RUS: "Бомбовой отсек, сконструированный специально для прионных биологических бомб. Это оружие бесполезно против защищенных целей, но очень эффективно уничтожает наземные войска и население планеты."
 SPA: "Compartimento de bombas especialmente equipado para bombardear superficies planetarias con esporas letales basadas en priones. Esta arma no hace nada a los objetivos fuertes, pero es muy eficaz contra tropas terrestres y la población."
 UKR: "Бомбовий відсік, спеціально обладнаний для доставки боєприпасів зі смертельними спорами на основі пріонів на поверхню планети. Ця зброя неефективна проти твердих цілей, але дуже ефективна проти наземних військ і населення планети. Планета-мішень зазнає тимчасового зниження рівня народжуваності. Постійні бомбардування можуть назавжди знизити родючість і навіть назавжди змінити рослинний клімат."
 PTB: "Uma baía de bombas especialmente equipada para lançar munição de esporos da morte baseados em príons sobre superfícies planetárias. Esta arma é ineficaz contra alvos duros, mas muito eficaz contra tropas terrestres e população planetária. O planeta-alvo sofrerá uma redução temporária em seu nível de fertilidade. Bombardeios constantes podem reduzir permanentemente a fertilidade e até mudar o clima do planeta para sempre."
ABasicCargoHoldWith:
 Id: 909
 ENG: "A basic cargo hold with rudimentary life support capabilities.  This particular hold can store 2 unit of either food or production, or a small number of colonists.  "
 RUS: "Обычный грузовой отсек с минимальными возможностями жизнеобеспечения. Этот отсек вмещает 2 единицу еды, производства или небольшое количество колонистов.  "
 SPA: "Bodega básica con funciones rudimentarias de soporte vital.  Esta bodega en concreto puede almacenar 2 unidad de comida o de producción, o un pequeño número de colonos.  "
 UKR: "Базовий вантажний відсік з елементарними можливостями життєзабезпечення.  У цьому трюмі можна зберігати 2 одиниці їжі або виробництва, або невелику кількість колоністів.  "
 PTB: "Um porão de carga básico com recursos rudimentares de suporte à vida. Este porão específico pode armazenar 2 unidades de alimento ou produção, ou um pequeno número de colonistas."
ScatterFlakTurret:
 Id: 954
 ENG: "Scatter Flak Turret"
 RUS: "Тяжелая кинетическая турель"
 SPA: "Torreta antiaérea de dispersión"
 UKR: "Розсіювальна зенітна турель"
 PTB: "Torreta Flak de Dispersão"
FlakTurretsAreMountedOn:
 Id: 953
 ENG: "Kinetic Turrets are mounted on swivel platforms for a 90 degree field of fire. They fire explosive shells in rapid sucession with a moderate damaging radius, but the projectiles are somewhat slow and ill-suited for tracking swift targets. Furthermore, this weapon requires ordnance to fire."
 RUS: "Зенитные турели монтируются на поворотной платформе и имеют 90-градусный сектор обстрела. Ведут огонь разрывными снарядами со средним радиусом поражения, но их скорость полета недостаточно высока, поэтому они не очень хорошо подходят для стрельбы по быстродвижущимся целям. Кроме того, для стрельбы требуются боеприпасы."
 SPA: "Las torretas antiaéreas van montadas sobre plataformas giratorias para cubrir un campo de fuego de 90 grados. Disparan proyectiles explosivos con un radio de daño moderado, pero los proyectiles son algo lentos y no son adecuados para rastrear blancos rápidos. Además, esta arma necesita munición para disparar."
 UKR: "Кінетичні турелі встановлені на поворотних платформах для забезпечення 90-градусного поля обстрілу. Вони вистрілюють вибуховими снарядами з помірним радіусом ураження, але снаряди дещо повільні і погано пристосовані для відстеження швидких цілей. Крім того, ця зброя потребує боєприпасів для стрільби."
 PTB: "Torretas cinéticas são montadas em plataformas giratórias para um campo de tiro de 90 graus. Elas disparam projéteis explosivos em rápida sucessão, com raio de dano moderado, mas os projéteis são um pouco lentos e inadequados para rastrear alvos velozes. Além disso, esta arma requer munição para disparar."
ScatterFlakTurretsFireStandard:
 Id: 955
 ENG: "Scatter flak turrets fire standard flak munitions in a 3-round spread. The salvo is more effective against swift targets and also provides greater potential damage per salvo on larger ships. "
 RUS: "Скорострельная тяжелая кинетическая турель ведет огонь стандартными боеприпасами, залпами по 3 снаряда за раз. Залповый огонь более эффективен против быстродвижущихся целей и наносит больше урона крупным кораблям. "
 SPA: "Estas torretas disparan munición antiaérea estándar en ráfagas de 3 proyectiles. La descarga es más eficaz contra blancos rápidos y también causa mayor daño potencial por descarga contra naves grandes. "
 UKR: "Зенітні вежі розсіяного вогню стріляють стандартними зенітними боєприпасами з інтервалом у 3 постріли. Залп більш ефективний проти швидких цілей, а також забезпечує більшу потенційну шкоду за один залп по великих кораблях."
 PTB: "Torretas flak de dispersão disparam munições flak padrão em uma dispersão de 3 tiros. A salva é mais eficaz contra alvos velozes e também oferece maior dano potencial por salva contra naves maiores."
BirthCrystal:
 Id: 800
 ENG: "Birth Crystal"
 RUS: "Кристалл рождения"
 SPA: "Cristal de génesis"
 UKR: "Кристал народження"
 PTB: "Cristal do Nascimento"
ThisMysteriousCrystallineShardEmits:
 Id: 801
 ENG: "This mysterious crystalline shard emits an enigmatic radiation that induces good health and long life. \n\n+50% population growth"
 RUS: "Этот таинственный осколок кристалла излучает странные волны, которые способствуют укреплению здоровья и долголетию. \n\n+50% к приросту населения"
 SPA: "Este misterioso fragmento de cristal emite una radiación enigmática que induce buena salud y prolonga la vida. \n\n+50% al crecimiento demográfico"
 UKR: "Цей таємничий кристалічний уламок випромінює загадкове випромінювання, яке дарує міцне здоров'я і довге життя. \n\n50% зростання населення"
 PTB: "Este misterioso fragmento cristalino emite uma radiação enigmática que induz boa saúde e vida longa. \n\n+50% de crescimento populacional"
PolaronCodex:
 Id: 802
 ENG: "Polaron Codex"
 RUS: "Поляроновый кодекс"
 SPA: "Códice de polarones"
 UKR: "Кодекс Полярона"
 PTB: "Códice Polaron"
ThisIsAnExtremelyAdvanced:
 Id: 803
 ENG: "This is an extremely advanced quantum targeting computer that specifically is tuned to analyze and bypass shifting energy shield frequencies. \n\nProvides a 10% chance that your weapons (all types!) will penetrate enemy shields"
 RUS: "Это исключительно технологически сложный квантовый компьютер наведения, который позволяет проанализировать частоты вражеских щитов, чтобы пробивать их. \n\nДает 10% вероятность того, что ваши пушки будут пробивать вражеские щиты"
 SPA: "Se trata de una avanzadísima computadora cuántica preparada expresamente para analizar y eludir frecuencias cambiantes de escudos de energía. \n\nAumenta en un 10% las probabilidades de que los cañones atraviesen los escudos enemigos"
 UKR: "Це надзвичайно просунутий квантовий комп'ютер прицілювання, який спеціально налаштований на аналіз і обхід частот енергетичних щитів, що зміщуються. \n\nЗабезпечує 10% ймовірність того, що ваша зброя (всіх типів!) пройде крізь ворожі щити"
 PTB: "Este é um computador quântico de mira extremamente avançado, ajustado especificamente para analisar e contornar frequências variáveis de escudos de energia. \n\nFornece 10% de chance de suas armas, de todos os tipos, penetrarem escudos inimigos."
LembaSeeds:
 Id: 804
 ENG: "Lemba Seeds"
 RUS: "Семена Лемба"
 SPA: "Semillas Lemba"
 UKR: "Насіння лемби"
 PTB: "Sementes de Lemba"
ThisIsACollectionOf:
 Id: 805
 ENG: "This is a collection of seeds that have clearly undergone extensive and advanced genetic manipulation. In fact, these seeds don't even seem to be programmed with DNA at all, but instead with some sort of alternative gene sequencing that is beyond anything we have ever seen. \n\nProvides a +0.1 Fertility bonus to any planet that you own or colonize"
 RUS: "Эти семена явно были получены с помощью долгих и продуманных генетических манипуляций. Они даже не имеют традиционной ДНК - генное кодирование в них осуществляется каким-то принципиально иным способом, пока что недоступным пониманию. \n\nДает +0,1 бонус плодородия на любой вашей или колонизированной вами планете"
 SPA: "Esta es una colección de semillas que han sido sometidas a una extensa y avanzada manipulación genética. De hecho, estas semillas ni siquiera parecen estar programadas con ADN, sino con alguna especie de secuencia genética alternativa que desconocíamos por completo. \n\nProporciona una bonificación de +0,1 de fertilidad a cualquier planeta que poseas o colonices"
 UKR: "Це колекція насіння, яке, очевидно, зазнало значних і передових генетичних маніпуляцій. Насправді, це насіння, схоже, навіть не запрограмоване ДНК, а натомість має якусь альтернативну послідовність генів, яка виходить за межі всього, що ми коли-небудь бачили. \n\nНадає бонус до народжуваності +0,1 до будь-якої планети, якою ви володієте або колонізуєте"
 PTB: "Esta é uma coleção de sementes que claramente passaram por extensa e avançada manipulação genética. Na verdade, essas sementes nem sequer parecem ser programadas com DNA, mas sim com algum tipo de sequenciamento genético alternativo além de tudo que já vimos. \n\nFornece um bônus de +0,1 de fertilidade a qualquer planeta que você possua ou colonize."
NanocollectiveController:
 Id: 806
 ENG: "Nano-Collective Controller"
 RUS: "Контроллер нано-роя"
 SPA: "Controlador nanocolectivo"
 UKR: "Нано-колективний контролер"
 PTB: "Controlador Nano-Coletivo"
ThisIsControlDeviceLinked:
 Id: 807
 ENG: "This is control device linked to a semi-sentient swarm of subspace-dwelling nanocreatures. Whoever possesses the control device controls the swarm. \n\nProvides a +10% empire-wide production bonus  "
 RUS: "Это устройство осуществляет управление полуразумным роем наноорганизмов, обитающих в субпространстве. Кто владеет этим устройством, управляет всем роем. \n\nДает +10% бонус к производству по всей империи  "
 SPA: "Se trata de un dispositivo de control vinculado a un enjambre semiconsciente de nanocriaturas moradoras del espacio. Quien posea el dispositivo de control dominará el enjambre. \n\nAumenta en +10% la producción de todo el imperio "
 UKR: "Це контрольний пристрій, пов'язаний з роєм напівчутливих наноістот, що мешкають у підпросторі. Той, хто володіє пристроєм, контролює рій. \n\nНадає +10% до виробництва по всій імперії"
 PTB: "Este é um dispositivo de controle ligado a um enxame semissenciente de nanocriaturas que vivem no subespaço. Quem possuir o dispositivo de controle controla o enxame. \n\nFornece um bônus de produção de +10% em todo o império."
RageCrystal:
 Id: 808
 ENG: "Rage Crystal"
 RUS: "Кристалл ярости"
 SPA: "Cristal de furia"
 UKR: "Кристал Люті"
 PTB: "Cristal da Fúria"
ThisShardOfCrystalEmits:
 Id: 809
 ENG: "This shard of crystal emits a form of radiation that causes incredible muscular growth. Any ground troops exposed to it become stronger. \n\nProvides +10% Combat Strength to all of your ground troops"
 RUS: "Этот таинственный осколок кристалла излучает странные волны, которые способствуют исключительно быстрому росту мышечной массы. Все войска, подвергшиеся воздействию его излучения, становятся сильнее. \n\nДает +10% к боевой мощи всех ваших наземных войск"
 SPA: "Este fragmento de cristal emite una forma de radiación que propicia un desarrollo muscular inaudito. Las tropas terrestres expuestas a él tendrán mucha más fuerza. \n\nAumenta en +10% la fuerza de combate de todas las tropas terrestres"
 UKR: "Цей уламок кришталю випромінює таку форму випромінювання, яка викликає неймовірний ріст м'язів. Будь-які наземні війська, що зазнали його впливу, стають сильнішими. \n\nНадає +10% бойової сили всім вашим наземним військам"
 PTB: "Este fragmento de cristal emite uma forma de radiação que causa crescimento muscular incrível. Qualquer tropa terrestre exposta a ele se torna mais forte. \n\nFornece +10% de Força de Combate a todas as suas tropas terrestres."
AscensionCrystal:
 Id: 810
 ENG: "Ascension Crystal"
 RUS: "Кристалл вознесения"
 SPA: "Cristal de ascensión"
 UKR: "Кристал Вознесіння Господнього"
 PTB: "Cristal da Ascensão"
ThisParticularShardOfCrystal:
 Id: 811
 ENG: "This particular shard of crystal entrances all who gaze upon it with a flood of pure, true knowledge. The experience is so intense, however, that our mortal minds can only understand a tiny fraction of what is shown to us. \n\nProvides a +10% empire-wide research bonus"
 RUS: "Этот таинственный осколок кристалла суть само знание в чистейшей его форме. Увы, наши смертные умы в состоянии постичь лишь малую толику заключенной в нем вселенской мудрости. \n\nДает +10% бонус к науке по всей империи  "
 SPA: "Este fragmento de cristal llena a todo el que lo contempla con una oleada de conocimiento puro y verdadero. Sin embargo, la experiencia es tan intensa que nuestras mentes mortales solo pueden llegar a comprender una minúscula fracción de lo que se nos muestra. \n\nAumenta en +10% la investigación de todo el imperio "
 UKR: "Саме цей кришталевий уламок обдаровує всіх, хто дивиться на нього, потоком чистого, істинного знання. Однак цей досвід настільки інтенсивний, що наш смертний розум може зрозуміти лише крихітну частку того, що нам показано. \n\nДає +10% до досліджень по всій імперії"
 PTB: "Este fragmento específico de cristal fascina todos que o contemplam com uma torrente de conhecimento puro e verdadeiro. A experiência é tão intensa, porém, que nossas mentes mortais só conseguem compreender uma fração minúscula do que nos é mostrado. \n\nFornece um bônus de pesquisa de +10% em todo o império."
EcstasyCrystal:
 Id: 812
 ENG: "Ecstasy Crystal"
 RUS: "Кристалл экстаза"
 SPA: "Cristal de éxtasis"
 UKR: "Кристал екстазі"
 PTB: "Cristal do Êxtase"
ThisShardOfCrystalInduces:
 Id: 813
 ENG: "This shard of crystal induces in its viewer an intense feeling of emotional and physical joy. The profits that could be made off of controlling access to this crystal are enourmous. \n\nProvides +10 credits per turn to its controller"
 RUS: "Этот осколок кристалла вызывает у каждого, кто пытается заглянуть в него, чувство духовного и физического экстаза. Выгоды, которые можно получить от его использования, будут поистине огромны. \n\nПредоставляет владельцу +10 кредитов каждый ход"
 SPA: "Este fragmento de cristal invade de alegría física y emocional a quien lo mira. Las ventajas de controlar el acceso a este cristal podrían ser enormes. \n\nProporciona +10 créditos por turno a quien lo controle"
 UKR: "Цей уламок кришталю викликає у глядача інтенсивне відчуття емоційної та фізичної радості. Прибуток, який можна отримати, контролюючи доступ до цього кристала, величезний. \n\nНадає +10 кредитів за хід своєму контролеру"
 PTB: "Este fragmento de cristal induz em quem o observa uma intensa sensação de alegria emocional e física. Os lucros que poderiam ser obtidos ao controlar o acesso a este cristal são enormes. \n\nFornece +10 créditos por turno ao seu controlador."
LatinumSceptre:
 Id: 814
 ENG: "Latinum Sceptre"
 RUS: "Латинский скипетр"
 SPA: "Cetro Latinum"
 UKR: "Латинський скіпетр (Latinum Sceptre)"
 PTB: "Cetro de Latinum"
ThisScepterIsCrownedWith:
 Id: 815
 ENG: "This scepter is crowned with a brilliant crystal that induces a feeling of trust and well-being in all who view it. \n\nProvides a +10% bonus to your diplomatic efforts"
 RUS: "Этот скипетр украшен сверкающим кристаллом, который вызывает в каждом, кто заглянет в него, чувство спокойствия и уверенности. \n\nДает +10% бонус к дипломатии"
 SPA: "Este cetro está coronado con un cristal brillante que transmite una gran sensación de confianza y bienestar a quien lo mira. \n\nAumenta en +10% los esfuerzos diplomáticos"
 UKR: "Цей скіпетр увінчаний блискучим кристалом, який викликає почуття довіри і благополуччя у всіх, хто дивиться на нього. \n\nНадає бонус +10% до ваших дипломатичних зусиль"
 PTB: "Este cetro é coroado por um cristal brilhante que induz uma sensação de confiança e bem-estar em todos que o veem. \n\nFornece um bônus de +10% aos seus esforços diplomáticos."
PalanquinCrystal:
 Id: 816
 ENG: "Palanquin Crystal"
 RUS: "Кристалл видений"
 SPA: "Cristal de palanquín"
 UKR: "Кришталевий паланкин"
 PTB: "Cristal Palanquim"
ThisCrystalAppearsPerfectlySpherical:
 Id: 817
 ENG: "This crystal appears perfectly spherical upon first glance. However, upon closer inspection it is revealed to be infinitely-faceted at all levels of magnification. But even more astonishing is that these facets reflect images of distant places -- possibly of all places everywhere. We can only begin to utilize this device for practical purposes. \n\nProvides a +25% bonus to the sensor range of its possessor"
 RUS: "С первого взгляда этот кристалл кажется идеальной сферой. Однако при внимательном рассмотрении оказывается, что это не шар, а камень исключительно сложной огранки. Еще более удивительно то, что каждая из мириадов этих граней отражает образы каких-то далеких миров. Возможно, в нем отражается вообще вся Вселенная. Пока что мы только начинаем думать о том, как можно использовать это в практических целях. \n\nДает владельцу +25% бонус к радиусу обнаружения сенсоров"
 SPA: "A simple vista, este cristal parece perfectamente esférico. Sin embargo, al examinarlo más de cerca se observa que tiene infinitas facetas a todos los niveles de aumento. Aun así, lo más sorprendente es que estas facetas reflejan imágenes de distintos lugares, posiblemente de todos los lugares que existen. No nos queda otra que empezar a utilizar este dispositivo con fines prácticos. \n\nAumenta un +25% el alcance sensorial de quien lo posee"
 UKR: "На перший погляд цей кристал здається ідеально сферичним. Однак при ближчому розгляді виявляється, що він нескінченно гранований на всіх рівнях збільшення. Але ще більш дивовижним є те, що ці грані відображають зображення далеких місць - можливо, всіх місць у всьому світі. Ми тільки починаємо використовувати цей пристрій для практичних цілей. \n\nНадає бонус +25% до радіусу дії сенсора свого власника"
 PTB: "À primeira vista, este cristal parece perfeitamente esférico. Porém, ao examiná-lo mais de perto, revela-se infinitamente facetado em todos os níveis de ampliação. Ainda mais impressionante é que essas facetas refletem imagens de lugares distantes, possivelmente de todos os lugares existentes. Só começamos a utilizar este dispositivo para fins práticos. \n\nFornece um bônus de +25% ao alcance dos sensores de seu possuidor."
QuantaniumLathe:
 Id: 818
 ENG: "Quantanium Lathe"
 RUS: "Квантовый прокатный станок"
 SPA: "Torno de cuantanio"
 UKR: "Квантовий токарний верстат"
 PTB: "Torno de Quantanium"
ThisIncredibleMachineIsClearly:
 Id: 819
 ENG: "This incredible machine is clearly meant to process sheets of armor by manipulating it on some quantum scale. While the technology of this machine is far beyond our understanding, we are able to use it to strengthen our own armor. \n\nProvides a +10% bonus to the hitpoints of its possessor's ships"
 RUS: "Эта удивительная машина явно предназначена для обработки листов брони на квантовом уровне. Технология, лежащая в ее основе, лежит далеко за пределами нашего понимания, но мы все равно сумели приспособить ее для укрепления нашей брони. \n\nДает +10% к ОП всех кораблей, принадлежащих владельцу"
 SPA: "Esta increíble máquina está claramente pensada para procesar planchas de blindaje manipulándolas a escala cuántica. Aunque la tecnología de esta máquina escapa a nuestra comprensión, podemos utilizarla para reforzar nuestros blindajes. \n\nAumenta en un +10% los puntos de vida de las naves de quien lo posee"
 UKR: "Ця неймовірна машина явно призначена для обробки листів броні, маніпулюючи ними на якомусь квантовому рівні. Хоча технологія цієї машини знаходиться далеко за межами нашого розуміння, ми можемо використовувати її для зміцнення власної броні. \n\nНадає бонус +10% до хітпоінтів кораблів свого власника"
 PTB: "Esta máquina incrível claramente foi feita para processar chapas de blindagem manipulando-as em alguma escala quântica. Embora a tecnologia desta máquina esteja muito além da nossa compreensão, conseguimos usá-la para fortalecer nossa própria blindagem. \n\nFornece um bônus de +10% aos pontos de vida das naves de seu possuidor."
SpiceOfTheSleeper:
 Id: 820
 ENG: "Spice of the Sleeper"
 RUS: "Пряность Спящего"
 SPA: "Especia de los Durmientes"
 UKR: "Прянощі сплячого"
 PTB: "Especiaria do Adormecido"
JustATasteOfThis:
 Id: 821
 ENG: "Just a taste of this very valuable spice will awaken the sleeping mind. The effect, however, is short-lived. \n\nProvides a +10% bonus to empire-wide research and a +10% bonus to the combat strength of ground troops"
 RUS: "Вкус этой исключительно ценной пряности способен пробудить любой спящий разум, хотя эффект довольно кратковременный. \n\nПредоставляет +10% бонус к науке по всей империи и +10% к боевой мощи всех ваших наземных войск"
 SPA: "Basta con probar esta valiosa especia para despertar la mente durmiente. El efecto, sin embargo, dura poco. \n\nAumenta en un +10% la investigación de todo el imperio y en un +10% la fortaleza de combate de las tropas terrestres"
 UKR: "Один лише смак цієї дуже цінної спеції пробудить сплячий розум. Ефект, втім, нетривалий. \n\nДає бонус +10% до досліджень по всій імперії і бонус +10% до бойової сили наземних військ"
 PTB: "Apenas uma prova desta especiaria muito valiosa despertará a mente adormecida. O efeito, porém, é de curta duração. \n\nFornece um bônus de +10% à pesquisa em todo o império e um bônus de +10% à força de combate das tropas terrestres."
