 Id: 2254
 ENG: "Fighters and missiles can pose a serious threat to a ship unprepared to defend against their attacks. This research path explores various ways to mitigate those threats."
 RUS: "Истребители и ракеты могут представлять очень серьезную угрозу для корабля, не подготовленного ко встрече с ними. Эта ветка технологий исследует различные способы борьбы с ними."
 SPA: "Los cazas y misiles pueden constituir una seria amenaza para una nave que no esté preparada para defenderse de sus ataques. Esta ruta de investigación explora diversas formas de contrarrestar esas amenazas."
 UKR: "Винищувачі і ракети можуть становити серйозну загрозу для корабля, непідготовленого до захисту від їх атак. Цей напрямок дослідження вивчає різні способи пом'якшення цих загроз."
 PTB: "Caças e mísseis podem representar uma séria ameaça para uma nave despreparada para se defender contra esses ataques. Este caminho de pesquisa explora várias formas de mitigar essas ameaças."
