 SPA: "Este terreno no es habitable si no se construye antes una biosfera para proteger a los colonos. Otra opción es investigar y utilizar técnicas de terraformación que mejoren la habitabilidad de este planeta"
 UKR: "Ця земля не придатна для життя без попередньої побудови біосфери, яка захистить ваших колоністів. З іншого боку, дослідження та застосування методів тераформування покращить придатність цієї планети"
 PTB: "Esta terra não é habitável sem antes construir uma biosfera aqui para proteger seus colonos. Como alternativa, pesquisar e empregar técnicas de terraformação melhorará a habitabilidade deste planeta"
