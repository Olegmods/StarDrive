 Id: 248
 ENG: "Click to rush production from this colony's storage.\n \nA single click will apply 10 production from storage to current production.\n \nCTRL-Click to add as much production currently available.\n \nShift-Click will try to rush this item until completed while draining your Treasury.\nThe amount of production rushed will be also deducted from your Empire's Treasury.\n \nConstruction cannot be rushed if there are ground invaders on your colony or your empire has less then 1000 credits plus the charge amount of the rush."
 RUS: "Щелкните здесь, чтобы ускорить производство за счет резервов колонии.\n \nОдиночный щелчок перемещает 10 ед. производства со склада на строительство текущего объекта.\n \nCTRL+ЛКМ перемещает все запасенное производство.\n \nShift+Мышь чтобы попытаться ускорить этот предмет, пока он не будет завершен,или не опустеет казна.\nКоличество произведенной продукции также будет вычтено из казны вашей Империи.\n \nСтроительство нельзя форсировать, если в вашей колонии есть наземные захватчики или у вашей империи меньше 1000 кредитов плюс сумма заряда спешки."
 SPA: "Haz clic para acelerar la producción de las reservas de esta colonia. Acelerar la producción cuesta créditos que equivalen a la cantidad de producción acelerada. Dicho coste puede reducirse o eliminarse con diversos medios tecnológicos. \n \n Si haces clic una vez, destinarás 10 de producción de las reservas a lo que se esté produciendo. Pulsa Ctrl+clic para añadir cuanta producción haya disponible. \n \nLa construcción no se puede acelerar si hay invasores terrestres en su colonia o si su imperio tiene menos de 1000 créditos más el monto del cargo de la carrera."
 UKR: "Натисніть, щоб прискорити виробництво зі сховища цієї колонії.\n \nОдин клік додасть 10 одиниць продукції зі сховища до поточного виробництва.\n \nCTRL-клацніть, щоб додати стільки продукції, скільки доступно в даний момент.\n \nShift-клацніть, щоб спробувати прискорити цей елемент до завершення, виснажуючи при цьому вашу скарбницю.\n \nКількість продукції, яку буде прискорено, також буде вирахувано зі скарбниці вашої імперії.\n \nБудівництво не може бути прискорено, якщо у вашій колонії є наземні загарбники або ваша імперія має менше 1000 кредитів плюс вартість прискореного будівництва."
 PTB: "Clique para acelerar a produção usando o armazenamento desta colônia.\n \nUm único clique aplicará 10 de produção do armazenamento à produção atual.\n \nCTRL-clique para adicionar o máximo de produção disponível no momento.\n \nShift-clique tentará acelerar este item até sua conclusão, drenando seu Tesouro.\nA quantidade de produção acelerada também será deduzida do Tesouro do seu Império.\n \nA construção não pode ser acelerada se houver invasores terrestres na sua colônia ou se seu império tiver menos de 1000 créditos mais o valor cobrado pela aceleração."
