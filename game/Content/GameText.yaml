ForAShipToBe:
 Id: 5000
 ENG: "For a ship to be warp capable, it must have a Warp Core installed. Warp Cores provide a Warpable Mass Capacity. If a ship's mass is less than or equal to a ship's Warpable Mass, then it can achieve faster than light travel."
 RUS: "Чтобы корабль мог совершить варп-прыжок, на нем должно быть установлено Варп-ядро. Ядра деформации обеспечивают деформируемую массу. Если масса корабля меньше или равна деформируемой массе корабля, то он может двигаться быстрее света."
 SPA: "Para que una nave sea capaz del viaje supraluminal debe tener un nucleo de desformación instalado. Los nucleos de desformación proveen de masa desformable. Si la masa de una nave es igual o menor que la de su capacidad de desformación de masa podra viajar a velocidad supraluminal."
 UKR: "Для того, щоб корабель міг викривлятися, на ньому повинно бути встановлене викривлювальне ядро. Варп-ядра забезпечують здатність до викривлення маси. Якщо маса корабля менша або дорівнює його здатності до викривлення, то він може подорожувати швидше за світло."
 PTB: "Para uma nave ser capaz de viajar em dobra, ela deve ter um Núcleo de Dobra instalado. Núcleos de Dobra fornecem uma Capacidade de Massa Dobravel. Se a massa da nave for menor ou igual à Massa Dobravel da nave, então ela pode alcançar viagem mais rápida que a luz."
SmallWarpCore:
 Id: 5001
 ENG: "Small Warp Core"
 RUS: "Малое варп-ядро"
 SPA: "Nucleos de desformacion pequeños"
 UKR: "Мале варп-ядро"
 PTB: "Núcleo de Dobra Pequeno"
ThisWarpCoreIsSmall:
 Id: 5002
 ENG: "This warp core is small and inefficient but is capable of driving a ship farther and faster than any conventional propulsion system"
 RUS: "Это варп-ядро мало и неэффективно, но способно вести корабль дальше и быстрее, чем любая обычная силовая установка."
 SPA: "Este nucleo de desformacion es pequeño e ineficiente pero, puede llevar a la nave a velocidades mas altas y mas lejos que los metodos de propulsión convencionales. "
 UKR: "Це варп-ядро невелике і неефективне, але здатне рухати корабель далі і швидше, ніж будь-який звичайний двигун"
 PTB: "Este núcleo de dobra é pequeno e ineficiente, mas é capaz de impulsionar uma nave para mais longe e mais rápido do que qualquer sistema de propulsão convencional"
