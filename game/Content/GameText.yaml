RushAllConstructionTip:
 Id: 1825
 ENG: "Signals Continuous Construction rush of all items in your empire, including existing and future items.\n \nWARNING: This will quickly spend your treasury and may cause high tax rates if Auto Tax is enabled."
 RUS: "Строительства всех предметов в вашей империи,можно ускорить,включая существующие и те которые в очереди .\n \nПРЕДУПРЕЖДЕНИЕ:это быстро потратит вашу казну и может привести к высоким налоговым ставкам, если включен автоматический налог."
 UKR: "Сигналізує про безперервне будівництво всіх об'єктів у вашій імперії, включаючи існуючі та майбутні об'єкти.\n \nПОПЕРЕДЖЕННЯ: Це швидко витратить вашу скарбницю і може призвести до високих податкових ставок, якщо увімкнено автоподаток."
 PTB: "Sinaliza a aceleração contínua da construção de todos os itens do seu império, incluindo itens existentes e futuros.\n \nAVISO: Isso gastará rapidamente seu tesouro e pode causar altas taxas de imposto se Impostos Automáticos estiverem ativados."
BuildAllShipsNowPrioritize:
 Id: 1826
 ENG: "build all ships now, prioritize them to be first in queue and apply continuous rush.\n \nWARNING: This might drain your Treasury in an alarming rate."
 RUS: "Постройте все корабли сейчас, расставьте приоритеты, чтобы они были первыми в очереди, и применяйте ускоренное производство.\n \nПРЕДУПРЕЖДЕНИЕ: Это может истощить вашу казну с угрожающей скоростью."
 UKR: "побудуйте всі кораблі зараз, розставте їх за пріоритетом, щоб вони були першими в черзі, і застосуйте безперервний поспіх.\n \nПОПЕРЕДЖЕННЯ: Це може виснажити вашу скарбницю з загрозливою швидкістю."
 PTB: "construir todas as naves agora, priorizá-las para ficarem no início da fila e aplicar aceleração contínua.\n \nAVISO: Isso pode drenar seu Tesouro em uma velocidade alarmante."
YouCanUseShiftClick:
