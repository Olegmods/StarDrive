 RUS: "Указывает на чистую утечку энергии из резервов корабля (с учетом перезарядки энергии), когда все энергетическое оружие корабля вместе с лучами на полной мощности постоянно стреляет по целям в зависимости от мощности оружия в секунду при стрельбе."
 UKR: "Це вказує на те, що існує чистий відтік енергії з резервів корабля (з урахуванням перезарядки), коли вся енергетична зброя корабля, разом з променями на повній потужності, постійно веде вогонь по цілях, виходячи з потужності зброї в секунду при стрільбі."
 PTB: "Isto indica que há um consumo líquido de energia das reservas da nave, após considerar a recarga de energia, quando todas as armas de energia da nave, junto com feixes em potência total, estão disparando persistentemente contra alvos, com base na energia por segundo das armas ao disparar"
