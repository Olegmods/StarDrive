BB_Tech_VerticalFarming_Desc:
 Id: 2294
 ENG: "This technology is a logical extension of our forays into aeroponics and xenobiology. We can now create incredibly nutrient rich food extremely efficiently in these agricultural arcologies."
 RUS: "Эта технология - логическое продолжение наших исследований в сфере аэропоники и ксенобиологии. На этих суперсовременных фермах можно выращивать огромное количество продуктов, богатых питательными веществами."
 SPA: "Esta tecnología es una extensión lógica de nuestras incursiones en aeroponia y xenobiología. Ahora podemos crear con suma eficiencia alimentos de gran riqueza nutritiva en estas arcologías agrícolas."
 UKR: "Ця технологія є логічним продовженням наших досліджень в аеропоніці та ксенобіології. Тепер ми можемо створювати неймовірно багату поживними речовинами їжу надзвичайно ефективно в цих сільськогосподарських аркологіях."
 PTB: "Esta tecnologia é uma extensão lógica das nossas incursões em aeroponia e xenobiologia. Agora podemos criar alimento incrivelmente rico em nutrientes com extrema eficiência nessas arcologias agrícolas."
