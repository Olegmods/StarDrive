WeaponsRangeOverlayVisualisesShips:
 Id: 6183
 ENG: "Weapons Range Overlay: visualizes ships' maximum weapon range. When a ship is selected, you will see green circles with Yellow, Orange and Red borders (shortest, average and maximum weapon range, correspondingly). The blue circle is the Sensor Range of the ship. Enemy Circles will be Red."
 RUS: "Дистанция оружия Overlay: визуализирует максимальную дальность стрельбы кораблей. Когда корабль выбран, вы увидите зеленые кружки с желтой, оранжевой и красной границами (соответственно наименьшая, средняя и максимальная дальность вооружения). Синий круг - это дальность действия датчика корабля. Круги врага будут красными."
 SPA: "Vizualización de rango de las armas: Enseña el alcanze máximo de las armas de las naves."
 UKR: "Накладення дальності дії зброї: візуалізує максимальну дальність дії зброї кораблів. Коли корабель вибрано, ви побачите зелені кола з жовтою, помаранчевою та червоною межами (найкоротша, середня та максимальна дальність дії зброї відповідно). Синє коло - це дальність дії сенсора корабля. Кола ворогів будуть червоними."
 PTB: "Sobreposição de Alcance das Armas: visualiza o alcance máximo das armas das naves. Quando uma nave está selecionada, você verá círculos verdes com bordas Amarela, Laranja e Vermelha (menor, médio e máximo alcance das armas, respectivamente). O círculo azul é o Alcance dos Sensores da nave. Círculos inimigos serão Vermelhos."
