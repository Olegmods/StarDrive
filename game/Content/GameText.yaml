BB_Tech_PolaronCannons_Desc:
 Id: 639
 ENG: "Phased polaron cannons encapsulate their payloads in a phased energy shell rather than an ionized magnetic shell that at moment of impact creates a violent shockwave in subspace ripping everything around it on a molecular level. "
 UKR: "Фазовані поляронні гармати інкапсулюють свої боєприпаси у фазовану енергетичну оболонку, а не в іонізовану магнітну оболонку, яка в момент удару створює потужну ударну хвилю в підпросторі, що розриває все навколо на молекулярному рівні."
 PTB: "Canhões de polaron faseados encapsulam suas cargas em um invólucro de energia faseada, em vez de uma cápsula magnética ionizada, que no momento do impacto cria uma violenta onda de choque no subespaço, rasgando tudo ao redor em nível molecular."
Tech_Advanced_Powercells_Name:
 Id: 17689
 ENG: "Advanced Power Cells"
 RUS: "Продвинутые энерго-ячейки"
 UKR: "Удосконалені силові елементи"
 PTB: "Células de Energia Avançadas"
Tech_Advanced_Powercells_Desc:
 Id: 17690
 ENG: "Advancements into new types battery technology allow us to manufacture higher capacity Power Cells."
 RUS: "Достижения в области технологий батарей нового типа, позволяют нам производить элементы питания большей емкости."
 UKR: "Досягнення в галузі нових типів акумуляторів дозволяють нам виробляти батареї більшої ємності."
 PTB: "Avanços em novos tipos de tecnologia de baterias nos permitem fabricar Células de Energia de maior capacidade."
SmallAdvancedPowerCell:
 Id: 17691
 ENG: "Small Advanced Power Cell"
 RUS: "Малая прод. энерго-ячейка"
 UKR: "Невеликий вдосконалений елемент живлення"
 PTB: "Célula de Energia Avançada Pequena"
ThisSmallPowerCellCan:
 Id: 17692
 ENG: "This Small Power Cell can store 50% more power than the basic one and has better, lighter armor than the Small Power Cell."
 RUS: "Эта энерго-ячейка хранит на 50% больше энергии,чем базовая.Имеет легкое бронирование."
 UKR: "Цей малий елемент живлення може зберігати на 50% більше енергії, ніж базовий, і має кращу, легшу броню, ніж малий елемент живлення."
 PTB: "Esta Célula de Energia Pequena consegue armazenar 50% mais energia que a básica e possui blindagem melhor e mais leve que a Célula de Energia Pequena."
MediumAdvancedPowerCell:
 Id: 17693
 ENG: "Medium Advanced Power Cell"
 RUS: "Средняя прод. энерго-ячейка"
