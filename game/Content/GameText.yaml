AnOutpostBuildingIsThe:
 Id: 447
 ENG: "An Outpost building is the humble first step in a civilization's efforts to colonize a new world.  Outposts provide for a base level of agricultural, industrial, and scientific capacity.  When built on a barren planet, it is critical for an outpost to be supplemented with an aeroponic farm. Outposts are also capable of rudimentary self-defense in case of invasion."
 RUS: "Аванпост - это первый шаг цивилизации на пути к колонизации нового мира. Аванпосты предоставляют самый базовый уровень развития сельского хозяйства, промышленности и науки. В мирах, где нельзя выращивать еду, для поддержания жизнедеятельности колонистов также необходимо построить аэропонную ферму. Аванпосты также обладают базовыми возможностями самообороны на случай вторжения."
 SPA: "Este edificio es el primer y humilde paso de una civilización en su empeño por colonizar un nuevo mundo.  Los puestos avanzados permiten disfrutar de una capacidad agrícola, industrial y científica de nivel básico.  Si se construye en un planeta árido, es fundamental complementarlo con una plantación aeropónica. Los puestos avanzados son capaces de defenderse rudimentariamente en caso de invasión."
 UKR: "Побудова аванпосту - це скромний перший крок у спробах цивілізації колонізувати новий світ.  Форпости забезпечують базовий рівень сільськогосподарського, промислового та наукового потенціалу.  Якщо форпост будується на безплідній планеті, дуже важливо, щоб він був доповнений аеропонною фермою. Аванпости також здатні до елементарної самооборони в разі вторгнення."
 PTB: "Um edifício de Posto Avançado é o humilde primeiro passo nos esforços de uma civilização para colonizar um novo mundo. Postos Avançados fornecem um nível básico de capacidade agrícola, industrial e científica. Quando construído em um planeta estéril, é crucial que um posto avançado seja complementado por uma fazenda aeropônica. Postos Avançados também são capazes de autodefesa rudimentar em caso de invasão."
