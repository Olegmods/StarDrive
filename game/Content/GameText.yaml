 ENG: "The more complex the module is, the more it is harder to repair it. A complexity of 2, for instance, means that it will take twice the amount of time to repair the module. Complexity of 0.5 means it will be twice as fast to repair"
 RUS: "Чем сложнее модуль, тем сложнее его отремонтировать. Например, сложность 2 означает, что на ремонт модуля потребуется в два раза больше времени. Сложность 0,5 означает, что ремонт будет в два раза быстрее"
 UKR: "Чим складніший модуль, тим складніше його відремонтувати. Наприклад, складність 2 означає, що на ремонт модуля знадобиться вдвічі більше часу. Складність 0,5 означає, що полагодити його можна буде вдвічі швидше"
 PTB: "Quanto mais complexo o módulo, mais difícil é repará-lo. Uma complexidade de 2, por exemplo, significa que levará o dobro do tempo para reparar o módulo. Complexidade de 0,5 significa que será duas vezes mais rápido reparar"
