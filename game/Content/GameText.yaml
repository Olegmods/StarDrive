TheShipTakesLongTime:
 Id: 1463
 ENG: "The ship takes long time to fully recharge its batteries. This can make it ineffective during a continuous battle."
 RUS: "Кораблю требуется много времени, чтобы полностью зарядить свои энергетические батареи. Это может сделать его неэффективным во время непрерывного боя."
 UKR: "Кораблю потрібно багато часу, щоб повністю перезарядити акумулятори. Це може зробити його неефективним під час безперервного бою."
 PTB: "A nave leva muito tempo para recarregar totalmente suas baterias. Isso pode torná-la ineficaz durante uma batalha contínua."
AddReactorsWhichWillIncrease:
 Id: 1464
