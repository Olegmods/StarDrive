SendThisAgentOnA:
 Id: 2185
 ENG: "Send this Agent on a mission to assassinate an enemy Agent from targeted Empire. The Agent will be on assignment for the indicated number of turns. If successful, an enemy Agent will be killed and removed from play."
 RUS: "Отправить этого агента на задание по устранению вражеского агента выбранной империи. Агент будет выполнять задание в течение указанного количества ходов. Если задание будет выполнено успешно, вражеский агент будет ликвидирован и выйдет из игры."
 SPA: "Envía a este agente a una misión para asesinar a un agente enemigo de otro imperio. El agente tratará de cumplir la misión durante el número indicado de turnos. Si tiene éxito, el agente enemigo morirá y desaparecerá del juego."
 UKR: "Відправте цього Агента на місію з метою вбивства ворожого Агента з цільової Імперії. Агент буде на завданні протягом вказаної кількості ходів. У разі успіху ворожий агент буде вбитий і вийде з гри."
