MakingAnObjectWithMass:
 Id: 5010
 ENG: "Making an object with mass travel faster than the speed of light is not possible in real space. A warp drive achieves FTL travel by encasing a ship's mass in a subspace bubble, effectively removing it from real space while the drive is engaged. "
 RUS: "Заставить объект с массой двигаться быстрее скорости света невозможно в реальном космосе. Варп-двигатель обеспечивает сверхсветовое перемещение, заключая массу корабля в подпространственный пузырь, эффективно удаляя его из реального космоса, пока двигатель включен. "
 SPA: "Hacer que un objeto con masa viaje a velocidades supraluminales (mas rapido que la luz) es imposible en el espacio real. Un motor a curvatura reviste a la masa de la nave en una burbuja subespacial, desvinculandola del espacio real mientras el motor este funcionando. "
 UKR: "Змусити об'єкт з масою рухатися швидше за швидкість світла неможливо в реальному просторі. Привід викривлення досягає надсвітлової швидкості, поміщаючи масу корабля в підпросторову бульбашку, ефективно видаляючи його з реального простору, поки привід задіяний."
 PTB: "Fazer um objeto com massa viajar mais rápido que a velocidade da luz não é possível no espaço real. Um motor de dobra realiza viagem MRL ao envolver a massa da nave em uma bolha de subespaço, removendo-a efetivamente do espaço real enquanto o motor está ativo. "
