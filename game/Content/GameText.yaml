 Id: 2187
 ENG: "Send this Agent on a mission to incite rebellion on one of target Empire's planets. The Agent will be on assignment for the indicated number of turns. If successful, hostile rebel troops will spawn on one of the enemy's planets. "
 RUS: "Отправить этого агента на задание по подстрекательству населения одной из планет выбранной империи к мятежу. Агент будет выполнять задание в течение указанного количества ходов. Если задание будет выполнено успешно, на одной из вражеских планет появятся враждебные войска повстанцев."
 SPA: "Asigna a este agente la misión de incitar una rebelión en uno de los planetas del imperio rival. El agente tratará de cumplir la misión durante el número indicado de turnos. Si tiene éxito, aparecerán tropas rebeldes hostiles en uno de los planetas enemigos. "
 UKR: "Відправте цього агента на місію з підбурювання повстання на одній з планет Імперії. Агент буде на завданні протягом вказаної кількості ходів. У разі успіху на одній з ворожих планет з'являться ворожі повстанські війська."
 PTB: "Envie este Agente em uma missão para incitar rebelião em um dos planetas do Império-alvo. O Agente ficará em missão pelo número indicado de turnos. Se tiver sucesso, tropas rebeldes hostis surgirão em um dos planetas do inimigo."
