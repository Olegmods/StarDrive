YourForcesEnterTheMysterious3:
 Id: 1817
 ENG: "Your forces enter the mysterious tomb and find evidence of a long dead civilization. Deep within the tomb's halls they discover a mysterious artifact encased in some sort of energy shield. They disable the shield and take the artifact. \n \n Upon returning to the planet's surface, they find themselves surrounded by the skeletons of the long dead, seemingly animated by the same energy field that had encased the artifact!"
 RUS: "Ваши отряды проникли в таинственную гробницу и обнаружили в ней следы присутствия давно вымершей цивилизации. В самой ее глубине они обнаружили таинственный артефакт, защищенный силовым полем. Солдаты смогли отключить его и забрать артефакт с собой. \n \n Выбравшись на поверхность планеты, они обнаружили, что их окружает орда скелетов, которых, судя по всему, подняла из мертвых мистическая сила артефакта!"
 SPA: "Tus fuerzas acceden a la tumba misteriosa y hallan pruebas de una civilización que desapareció hace mucho tiempo. En las profundidades de la tumba hay un misterioso artefacto encerrado en una especie de escudo de energía. Desactivan el escudo y cogen el artefacto. \n \n Al regresar a la superficie del planeta, se ven rodeados por los esqueletos de los muertos, aparentemente reanimados por el mismo campo de energía que retenía el artefacto."
 UKR: "Ваші війська проникають у таємничу гробницю і знаходять докази існування давно загиблої цивілізації. Глибоко в залах гробниці вони знаходять таємничий артефакт, укладений в якийсь енергетичний щит. Вони відключають щит і забирають артефакт. \n \n Повернувшись на поверхню планети, вони виявляють, що їх оточують скелети давно померлих, які, схоже, оживлені тим самим енергетичним полем, що й артефакт!"
 PTB: "Suas forças entram na tumba misteriosa e encontram evidências de uma civilização há muito extinta. Nas profundezas dos salões da tumba, descobrem um artefato misterioso envolto em algum tipo de escudo de energia. Elas desativam o escudo e levam o artefato. \n \n Ao retornar à superfície do planeta, encontram-se cercadas pelos esqueletos dos mortos há muito tempo, aparentemente animados pelo mesmo campo de energia que havia envolvido o artefato!"
ThisWeaponHasMirvMeaning:
 Id: 1818
 ENG: "This weapon has MIRV, meaning it will eject several warheads close to the target, mostly to ensure some of the warheads avoid interception. Damage and any modifiers you will see is per war head."
 RUS: "Это оружие с MIRV, это значит, что оно выбрасывает несколько зарядов на подлете к цели, в основном для того, чтобы избежать перехвата боеголовок. Урон и любые модификаторы, которые вы увидите, рассчитываются на каждую боеголовку."
 UKR: "Ця зброя має MIRV, що означає, що вона викидає кілька боєголовок близько до цілі, в основному для того, щоб деякі боєголовки уникнули перехоплення. Пошкодження та будь-які модифікатори, які ви побачите, вказані для кожної боєголовки."
 PTB: "Esta arma possui MIRV, o que significa que ela ejetará várias ogivas perto do alvo, principalmente para garantir que algumas delas evitem a interceptação. O dano e quaisquer modificadores que você verá são por ogiva."
