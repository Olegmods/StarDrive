ItIsAnExtremelyFertile:
 Id: 1730
 ENG: "It is an extremely fertile world with a wide range of habitates and climates. From orbit you can see majestic mountains soaring above the clouds. Turquoise oceans glimmer in the sunlight, and scans reveal that the planet's many forests are teeiming with life.  This planet is a rare gem. "
 RUS: "Это необычайно плодородный мир с большим разнообразием климатов и биоценозов. С орбиты видны упирающиеся в облака горы; бирюзовые океаны переливаются в лучах солнца; сканирование показало, что в пышных лесах планеты буквально кипит жизнь. Эта планета - настоящая жемчужина."
 SPA: "Se trata de un mundo sumamente fértil con una amplia variedad de hábitats y climas. Desde la órbita se pueden ver sus majestuosas montañas, que se elevan por encima de las nubes. Los océanos de color turquesa brillan bajo la luz solar y el escáner revela que sus numerosos bosques rebosan de vida.  Este planeta es una joya poco común. "
 UKR: "Це надзвичайно родючий світ з широким спектром середовищ існування та клімату. З орбіти можна побачити величні гори, що здіймаються над хмарами. Бірюзові океани мерехтять у сонячному світлі, а сканування показує, що численні ліси планети кишать життям.  Ця планета - рідкісна перлина."
 PTB: "É um mundo extremamente fértil, com uma ampla variedade de habitats e climas. Da órbita, é possível ver montanhas majestosas elevando-se acima das nuvens. Oceanos turquesa brilham à luz do sol, e as varreduras revelam que as muitas florestas do planeta fervilham de vida.  Este planeta é uma joia rara. "
ItIsAnExtremelyFertile2:
 Id: 1731
 ENG: "It is an extremely fertile world. Its oceans and forests teem with life, its soil is rich with nutrients, and the climate is perfectly suited to agriculture. "
 RUS: "Это очень плодородный мир. В океанах и лесах кипит жизнь; почва богата питательными веществами, а климат идеально подходит для развития земледелия. "
 SPA: "Es un mundo sumamente fértil. Sus océanos y bosques rebosan de vida, su suelo es rico en nutrientes y el clima es perfecto para la agricultura. "
 UKR: "Це надзвичайно родючий світ. Його океани та ліси кишать життям, ґрунти багаті на поживні речовини, а клімат ідеально підходить для сільського господарства."
 PTB: "É um mundo extremamente fértil. Seus oceanos e florestas transbordam de vida, seu solo é rico em nutrientes e o clima é perfeitamente adequado à agricultura. "
TheCombinationOfExtremeHeat:
 Id: 1732
 ENG: "The combination of extreme heat and extreme humidity have turned this planet into a sauna world. Scans reveal a dizzying amount of life on this planet and a colony could thrive here if the colonists could adapt to the heat and the mud. "
 RUS: "Сочетание высокой температуры и высокой влажности превратили этот мир в самую настоящую сауну. Сканирование выявило огромное разнообразие форм жизни на этой планете, так что колония здесь также сможет процветать, если колонисты привыкнут жить в этой парилке."
 SPA: "La combinación de un calor y una humedad extremas han vuelto este planeta en un mundo sauna. El escáner revela una cantidad asombrosa de vida y podría florecer una colonia si sus habitantes se adaptaran al calor y al barro. "
 UKR: "Поєднання екстремальної спеки та надзвичайної вологості перетворило цю планету на світ саун. Сканування показує запаморочливу кількість життя на цій планеті, і тут могла б процвітати колонія, якби колоністи змогли пристосуватися до спеки та бруду."
 PTB: "A combinação de calor extremo e umidade extrema transformou este planeta em um mundo-sauna. As varreduras revelam uma quantidade vertiginosa de vida neste planeta, e uma colônia poderia prosperar aqui se os colonos conseguissem se adaptar ao calor e à lama. "
WhileThisIsUnquestionablyA:
 Id: 1733
 ENG: "While this is unquestionably a fertile and vibrant planet, it is just a little too cool to be called a garden world. Scans show that the oceans are cold and rough but filled with life and the landmasses are suitable for agriculture. Life could be good here. "
 RUS: "Эта планета, безусловно, плодородна, но все же климат на ней слишком холодный, так что райским садом ее не назвать. Океаны холодны и неприветливы, но его обитатели многочисленны и разнообразны, а земля вполне подходит для возделывания. Вполне можно жить. "
 SPA: "Aunque es un planeta indudablemente fértil y lleno de vida, hace demasiado frío para considerarse un jardín planetario. El escáner muestra que los océanos son fríos y encrespados, pero están plagados de vida, y las masas de tierra son aptas para la agricultura. La vida podría estar bien aquí. "
 UKR: "Хоча це, безсумнівно, родюча і яскрава планета, вона трохи занадто прохолодна, щоб називатися світом для садівництва. Сканування показує, що океани холодні і бурхливі, але наповнені життям, а суша придатна для сільського господарства. Життя тут може бути гарним."
 PTB: "Embora este seja, sem dúvida, um planeta fértil e vibrante, ele é um pouco frio demais para ser chamado de mundo-jardim. As varreduras mostram que os oceanos são frios e agitados, mas cheios de vida, e que as massas de terra são adequadas à agricultura. A vida poderia ser boa aqui. "
MountainsDesertsTundrasForestsOceans:
 Id: 1734
 ENG: "Mountains, deserts, tundras, forests, oceans, and many other environments drift past your viewports.  Life has found many different ways to survive and thrive on this planet and there is no question that it would make an extraordinary home for colonists. "
 RUS: "Мимо ваших иллюминаторов последовательно проплывают горы, пустыни, тундра, леса, океаны... Жизнь на этой планете очень разнообразна, и нет никаких сомнений в том, что она станет прекрасным новым домом для колонистов, которые прибудут на нее."
 SPA: "Se pueden observar montañas, desiertos, tundras, bosques y muchos otros entornos.  La vida ha encontrado numerosas formas de abrirse paso y prosperar en este planeta; no cabe duda de que sería un hogar extraordinario para los colonos. "
 UKR: "Гори, пустелі, тундри, ліси, океани та багато інших середовищ пропливають повз ваш оглядовий екран.  Життя знайшло багато різних способів вижити і процвітати на цій планеті, і немає сумнівів, що вона стала б чудовим домом для колоністів."
 PTB: "Montanhas, desertos, tundras, florestas, oceanos e muitos outros ambientes passam diante de seus visores.  A vida encontrou muitas formas diferentes de sobreviver e prosperar neste planeta, e não há dúvida de que ele seria um lar extraordinário para colonos. "
ItHasAmpleNaturalResources:
 Id: 1735
 ENG: "It has ample natural resources and can easily sustain a large population. Its soil is adequate for agricultural purposes and the climate allows a suitable growing season. "
