 UKR: "Масштабування буде зосереджено на вибраному об'єкті."
 PTB: "O zoom será centralizado no objeto selecionado."
ThisIsABonusTo:
 Id: 7083
 ENG: "This is a bonus to the number targets that can be tracked by this ship's fire control. As a bonus, it is cumulative and stacks on top of the command module's maximum targets."
 RUS: "Это бонус к количеству целей, которые могут быть отслежены системой управления огнем этого корабля. В качестве бонуса он накапливается и складывается поверх максимальных целей командного модуля."
 SPA: "Este es el bonus a los numeros de objetivos que pueden ser rastreador por el control de tiro de la nava. Como bonues, es acumulativo y se acumula en los objetivos máximos del módulo de comando."
 UKR: "Це бонус до кількості цілей, які може відстежувати система управління вогнем цього корабля. Цей бонус є кумулятивним і додається до максимальної кількості цілей командного модуля."
 PTB: "Este é um bônus ao número de alvos que podem ser rastreados pelo controle de fogo desta nave. Como bônus, é cumulativo e se soma ao máximo de alvos do módulo de comando."
TT_ShipOffense:
 Id: 7084
 ENG: "Estimated offensive strength of the ship or module. This is based on the size of the ship and strength of defense and strength of weapons. The defensive score of the ship is not shown but it is calculated and restricted to be never more than the offensive value. Metal slugs with a few small weapons wont rate that high. "
 RUS: "Расчетная наступательная сила корабля или модуля. Это зависит от размера корабля, силы защиты и вооружения. Показатель защиты корабля не отображается, но рассчитывается и ограничивается, чтобы он никогда не превышал показатель атаки."
 SPA: "Fuerza ofensiva estimada del módulo o de la nave. Esto esta basado en el tamaño de la nave y la fuerza ofensiva o defensiva de sus armas. La puntación de la nave no esta mostrada pero es calculada y restringida para que no sea jamás mas alta que la puntuación ofensiva. Carrachos con unas pocas armas no puntuaran tan alto."
 UKR: "Орієнтовна наступальна сила корабля або модуля. Вона базується на розмірі корабля, міцності захисту та потужності зброї. Оборонна оцінка корабля не показується, але вона розраховується і не може бути більшою за наступальну. Металеві кулі з кількома невеликими гарматами не матимуть такої високої оцінки."
 PTB: "Força ofensiva estimada da nave ou módulo. Isso se baseia no tamanho da nave, na força da defesa e na força das armas. A pontuação defensiva da nave não é mostrada, mas é calculada e limitada para nunca ser maior que o valor ofensivo. Casulos metálicos com algumas armas pequenas não terão uma avaliação tão alta."
ShipWillRotateSoThat2:
 Id: 7085
 ENG: "Short Range: \n\nShip will rotate so that forward-firing weapons are facing its target. \nIf in a fleet, it will attempt to maintain formation. If not, ship will maneuver to within minimum weapons range. \nIf a carrier the ship will use the Max actual weapons range."
 RUS: "Короткая дистанция: \n\nКорабль будет вращаться так, чтобы оружие, стреляющее вперед, было обращено к цели. \nЕсли корабль во флоте, он будет пытаться поддерживать строй. В противном случае корабль будет маневрировать в пределах минимальной дальности вооружения.\nЕсли это Носитель, то корабль будет использовать максимальную дальность стрельбы."
 SPA: "La nave rotara para que sus armas frontales apunten a su objetivo. Si esta en una flota, tratará de mantener la formación. Si no, la nave maniobrará para mantenerse al alcance máximo de sus armas."
 UKR: "Близька дистанція: \n\nКорабель повернеться так, щоб зброя, що стріляє вперед, була спрямована на ціль. \nЯкщо він знаходиться у складі флоту, він намагатиметься зберегти стрій. Якщо це не вдасться, корабель маневруватиме в межах мінімальної дальності стрільби. \nЯкщо це авіаносець, то корабель використовуватиме максимальну дальність стрільби."
 PTB: "Curto Alcance: \n\nA nave girará para que as armas de disparo frontal fiquem voltadas para o alvo. \nSe estiver em uma frota, ela tentará manter a formação. Caso contrário, a nave manobrará até ficar dentro do alcance mínimo das armas. \nSe for um porta-naves, a nave usará o alcance máximo real das armas."
ThisValueRepresentsTheComplexity:
 Id: 7086
 ENG: "This value represents the complexity of this command module's fire control systems. It represents the number of targets on sensors that can be tracked and potentially engaged simultaneously. It does not stack with more command modules."
 RUS: "Это значение представляет сложность систем управления огнем этого командного модуля. Он представляет собой количество целей на датчиках, которые можно отслеживать и потенциально поражать одновременно. Он не сочетается с большим количеством командных модулей."
 SPA: "Este valor representa la complejidad de los sistemas de control de tiro de esta unidad de comando. Representa la cantidad de objetivos que puede mantener en sus sensores y potencialmente envolverse con ellos simultaneamente. No se acumula con mas módulos de comando."
 UKR: "Це значення відображає складність систем управління вогнем цього командного модуля. Це кількість цілей на сенсорах, які можна відстежувати та потенційно уражати одночасно. Воно не підсумовується з іншими командними модулями."
 PTB: "Este valor representa a complexidade dos sistemas de controle de fogo deste módulo de comando. Ele representa o número de alvos nos sensores que podem ser rastreados e potencialmente engajados simultaneamente. Ele não se acumula com mais módulos de comando."
TT_FcsPower:
 Id: 7087
 ENG: "Total number of ships the scanners can track and total number incoming seeking weapons the scanners can track. Weapons can fire at any item in tracked ships or tracked seekers as is possible. Scanners attempt to track the best targets for the ship. if you plan on being surrounded this number should be high."
 RUS: "Общее количество кораблей и общее количество самонаводящихся снарядов,которое сканеры могут отследить. Оружие может стрелять по любому объекту на отслеживаемых кораблях или по отслеживаемых самонаводящихся снарядах, насколько это возможно. Сканеры пытаются отследить лучшие цели корабля. если вы планируете попасть в окружение, это число должно быть высоким"
 SPA: "Este es el numero de objetivos los cuales los sistemas de tiro de esta nave pueden rastrear al mismo tiempo. Valores altos permitiran una mayor autonomia de las armas, mientras que un numero bajo puede significar que las defensas tiendan a ser sobrecargadas."
 UKR: "Загальна кількість кораблів, які можуть відстежувати сканери, і загальна кількість зброї, яка може відстежувати сканери. Зброя може стріляти по будь-якому об'єкту на відстежуваних кораблях або відстежуваних шукачах, наскільки це можливо. Сканери намагаються відстежувати найкращі цілі для корабля. якщо ви плануєте потрапити в оточення, це число повинно бути високим."
 PTB: "Número total de naves que os scanners podem rastrear e número total de armas guiadas recebidas que os scanners podem rastrear. As armas podem disparar contra qualquer item em naves rastreadas ou projéteis guiados rastreados, quando possível. Os scanners tentam rastrear os melhores alvos para a nave. Se você planeja ser cercado, esse número deve ser alto."
ThisIsTheTotalNumber2:
 Id: 7088
 ENG: "This is the total number of targets this ship's fire control systems can track at a time. This ship can only track a single target, so is incapable of firing at other targets, including incoming projectiles, simultaneously."
 RUS: "Это общее количество целей, которые система управления огнем этого корабля может отслеживать одновременно. Этот корабль может отслеживать только одну цель, поэтому он не может стрелять по другим целям, в том числе по входящим снарядам, одновременно."
 SPA: "Este es el numero de objetivos los cuales los sistemas de tiro de esta nave pueden rastrear al mismo tiempo. Esta nave solo puede rastrear a un solo objetivo, asi que es incapaz de disparar sus armas a otros objetivos, incluido misiles, de forma simultanea."
 UKR: "Це загальна кількість цілей, які можуть одночасно відстежувати системи управління вогнем цього корабля. Цей корабель може відстежувати лише одну ціль, тому він не може одночасно вести вогонь по інших цілях, в тому числі по снарядах, що наближаються."
 PTB: "Este é o número total de alvos que os sistemas de controle de fogo desta nave podem rastrear por vez. Esta nave só pode rastrear um único alvo, portanto é incapaz de disparar contra outros alvos, incluindo projéteis recebidos, simultaneamente."
TT_Ecm3:
 Id: 7089
 ENG: "This is the total electronic countermeasure (ECM) value for this ship. It represents the baseline % chance to jam an incoming missile with no ECM resistance."
 RUS: "Это общее значение электронного противодействия (ECM) для этого корабля. Он представляет собой базовый процент вероятности подавить приближающуюся ракету без сопротивления ECM."
 SPA: "Estas son el total de contramedidas electronicas (ECM) de esta nave. Representa la linea base (%) para interferir un misil entrante sin resistencia ECM."
 UKR: "Це загальне значення електронної протидії (ECM) для цього корабля. Це базовий % шанс заглушити ракету, що наближається, без опору ЕКЗ."
 PTB: "Este é o valor total de contramedidas eletrônicas (ECM) desta nave. Ele representa a % base de chance de interferir em um míssil recebido sem resistência a ECM."
TT_SensorRange3:
 Id: 7090
 ENG: "This is the maximum sensor range of this vessel: essentially how far this vessel can detect spaceborne objects. A basic local scan is available through command modules; to scan further dedicated sensor modules are required."
 RUS: "Это максимальная дальность действия датчика этого судна: по сути, насколько далеко это судно может обнаруживать космические объекты. Базовое локальное сканирование доступно через командные модули; для сканирования требуются дополнительные специализированные сенсорные модули."
 SPA: "Este es el rango máximo del sensor de esta nave: esencialmente es que tan lejos la nave puede detectar objetos. Un escaner local basico esta disponible en los módulos de comando;para ver mas lejos se requerirán módulos especializados."
 UKR: "Це максимальна дальність дії датчиків цього судна: по суті, це відстань, на якій судно може виявити космічні об'єкти. Базове локальне сканування доступне за допомогою командних модулів; для подальшого сканування потрібні спеціальні сенсорні модулі."
 PTB: "Este é o alcance máximo dos sensores desta nave: essencialmente, até onde esta nave consegue detectar objetos espaciais. Uma varredura local básica está disponível por meio de módulos de comando; para varrer mais longe, são necessários módulos de sensores dedicados."
TT_RepairRate:
 Id: 7091
 ENG: "This is this ship's self-repair rate per tick - it can self repair this many hitpoints of a module per tick when outside of combat. Better command and engineering modules improve this."
 RUS: "Это скорость самовосстановления этого корабля за тик - он может самостноятельно отремонтировать такое количество единиц здоровья модуля за тик вне боя. Улучшенные командные и инженерные модули улучшают ремонт."
 SPA: "Este es el ratio de autoreparacion por tick - se puede reparar esta cantidad de puntos de vida por tick cuando este fuera de combate. Mejores módulos de comando y de ingienería puden mejorar esto.."
 UKR: "Це швидкість саморемонту цього корабля за тик - він може відновити стільки хітпоінтів модуля за тик, коли перебуває поза боєм. Кращі командні та інженерні модулі покращують цей показник."
 PTB: "Esta é a taxa de autorreparo desta nave por ciclo; ela pode autorreparar esta quantidade de pontos de vida de um módulo por ciclo quando estiver fora de combate. Módulos melhores de comando e engenharia melhoram isso."
EncCorsairs000_Msg0:
 ENG: "Dearest SING friends,\n\nWe are delighted to see your empire's progress. Isn't this exciting, to colonize new worlds and struggle with unknown environment? However, all these little freighters, moving from planet to planet like loyal bees are so exposed out there in deep space.\n\nSo we have a proposal for you. You will pay us MONEY credits right now. If you do, then we can promise a certain level of 'protection' to SING ships. If you don't, well, then we just can't make any promises.\n\nRegards,\n    Captain Martok, Independent Trader and Gentleman"
 UKR: "Дорогі друзі Співає,\n\nМи раді бачити прогрес вашої імперії. Хіба це не захоплююче, колонізувати нові світи і боротися з невідомим оточенням? Однак, всі ці маленькі вантажні кораблі, що переміщаються з планети на планету, як вірні бджоли, так незахищені там, у глибокому космосі.\n\nТому у нас є пропозиція для вас. Ви заплатите нам ГРОШІ прямо зараз. Якщо ви це зробите, то ми можемо пообіцяти певний рівень 'захисту' кораблям Співає. Якщо ні, то ми просто не можемо нічого обіцяти.\n\nЗ повагою\n     капітан Марток, незалежний торговець і джентльмен."
 PTB: "Queridos amigos SING,\n\nEstamos felizes em ver o progresso do seu império. Não é empolgante colonizar novos mundos e enfrentar ambientes desconhecidos? Porém, todos esses pequenos cargueiros, viajando de planeta em planeta como abelhas leais, ficam tão expostos lá no espaço profundo.\n\nEntão temos uma proposta para vocês. Vocês nos pagarão CRÉDITOS agora. Se fizerem isso, podemos prometer certo nível de 'proteção' às naves SING. Se não fizerem, bem, então simplesmente não podemos prometer nada.\n\nAtenciosamente,\n    Capitão Martok, Comerciante Independente e Cavalheiro"
EncCorsairs000_Msg0_R1_AgreeToPay:
 ENG: "Agree to pay this upstanding gentleman."
 UKR: "Погодьтеся заплатити цьому добропорядному джентльмену."
 PTB: "Concordar em pagar a este respeitável cavalheiro."
EncCorsairs000_Msg0_R2_RefuseToPay:
 ENG: "Refuse to pay this scoundrel!"
 UKR: "Відмовтеся платити цьому негіднику!"
 PTB: "Recusar-se a pagar a este canalha!"
EncCorsairs000_Msg1:
 ENG: "Wonderful news! We'll let you know when we're done drinking our way through your money. Until then, sleep safe!\n\nRegards,\nCM"
 UKR: "Чудові новини! Ми дамо вам знати, коли закінчимо пропивати ваші гроші. А до того часу - міцних снів!\n\n З повагою,\n КМ"
 PTB: "Ótimas notícias! Avisaremos quando terminarmos de beber todo o seu dinheiro. Até lá, durmam tranquilos!\n\nAtenciosamente,\nCM"
EncCorsairs000_Msg2:
 ENG: "Now that is disappointing, isn't it? And here I was thinking that we were going to be fast friends. It will be fun to rip open your freighters.\n\n(Comm Officer's Note - If we ever want to pay them, we can select their ship and press Q to contact them.)"
 UKR: "Це розчарування, чи не так? А я-то думав, що ми швидко потоваришуємо. Буде весело розірвати ваші вантажні кораблі.\n\n(Примітка командира - Якщо ми захочемо заплатити їм, ми можемо вибрати їхній корабель і натиснути Q, щоб зв'язатися з ними)."
 PTB: "Ora, isso é decepcionante, não é? E eu aqui pensando que seríamos grandes amigos. Vai ser divertido rasgar seus cargueiros.\n\n(Nota do Oficial de Comunicações - Se algum dia quisermos pagá-los, podemos selecionar a nave deles e pressionar Q para contatá-los.)"
EncCorsairs000_Msg3:
 ENG: "What, is this some sort of SING humor? You don't have the credits! Unfortunately for you, this is not my problem. We're gonna collect our money through your freighters!\n\n(Comm Officer's Note - If we ever want to pay them, we can select their ship and press Q to contact them.)"
 UKR: "Це що, якийсь СПІВАЄ гумор? Ти не маєш грошей! На жаль для вас, це не моя проблема. Ми заберемо наші гроші через ваші вантажні кораблі! \n\n(Примітка командира - Якщо ми коли-небудь захочемо заплатити їм, ми можемо вибрати їхній корабель і натиснути Q, щоб зв'язатися з ними)."
 PTB: "O quê, isso é algum tipo de humor SING? Vocês não têm os créditos! Infelizmente para vocês, isso não é problema meu. Vamos cobrar nosso dinheiro através dos seus cargueiros!\n\n(Nota do Oficial de Comunicações - Se algum dia quisermos pagá-los, podemos selecionar a nave deles e pressionar Q para contatá-los.)"
ExpEvent_BuiltRDA_Name:
 ENG: "A Mysterious Signal"
 UKR: "Загадковий сигнал"
 PTB: "Um Sinal Misterioso"
ExpEvent_BuiltRDA_Outcome1_Title:
 ENG: "You have built the Remnant Detection Array"
 UKR: "Ви створили масив виявлення Древніх"
 PTB: "Você construiu a Matriz de Detecção dos Remanescentes"
ExpEvent_BuiltRDA_Outcome1_Descr:
 ENG: "Your quest to discover the secrets of The Remnant continues. It appears that your scientists' theories are correct: upon activating the Remnant Detection Array, they immediately identified an anomalous subspace data stream that is, so far as they can tell, coming from everywhere at once and no where in particular. With this omnipresent quality, the data stream bears a remarkable similarity to the universal background radation detectable with normal radio telescopes - the signal strength is equal in all directions and extremely faint. Nothing in the known Remnant ships would be capable of detecting this signal.\n\nHowever, the Array has detected a second, more conventional subspace signal. Analysis suggests that it is an amplified version of the fainter signal and that it is originating inside our galaxy! \n \n The location of the Remnant signal is now revealed. If we wish to learn more then we will need to find it and see what secrets it holds!"
 UKR: "Ваші пошуки таємниць Древніх тривають. Виявляється, теорії ваших вчених правильні: після активації масиву виявлення Древніх вони одразу ж виявили аномальний підпросторовий потік даних, який, наскільки вони можуть судити, надходить звідусіль одночасно і нізвідки конкретно. Завдяки своїй всюдисущності потік даних має дивовижну схожість з універсальним фоновим випромінюванням, яке можна виявити за допомогою звичайних радіотелескопів - потужність сигналу однакова в усіх напрямках і надзвичайно слабка. Жоден з відомих кораблів Древніх не здатен виявити цей сигнал.\n\nОднак, Масив виявив другий, більш звичайний підпросторовий сигнал. Аналіз показує, що це посилена версія слабшого сигналу, і що він походить з нашої галактики! \n \n Тепер ми знаємо, звідки походить залишковий сигнал. Якщо ми хочемо дізнатися більше, нам потрібно знайти його і дізнатися, які таємниці він приховує!"
 PTB: "Sua busca para descobrir os segredos dos Remanescentes continua. Parece que as teorias dos seus cientistas estavam corretas: ao ativar a Matriz de Detecção dos Remanescentes, eles identificaram imediatamente um fluxo anômalo de dados subespaciais que, até onde conseguem determinar, vem de todos os lugares ao mesmo tempo e de nenhum lugar específico. Com essa qualidade onipresente, o fluxo de dados tem uma semelhança notável com a radiação cósmica de fundo detectável por radiotelescópios comuns — a força do sinal é igual em todas as direções e extremamente fraca. Nada nas naves Remanescentes conhecidas seria capaz de detectar esse sinal.\n\nNo entanto, a Matriz detectou um segundo sinal subespacial mais convencional. A análise sugere que ele é uma versão amplificada do sinal mais fraco e que se origina dentro da nossa galáxia!\n \n A localização do sinal Remanescente foi revelada. Se quisermos aprender mais, precisaremos encontrá-lo e ver que segredos ele guarda!"
