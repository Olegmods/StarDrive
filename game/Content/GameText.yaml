 Id: 239
 ENG: "Randomly places an Agent on an enemy colony, providing several key benefits. \n \n Most importantly, the Agent gives you an additional 10% to effectiveness of your espionage investments. The more Agents you have, the faster you will be able to gain intelligence penetration. \n \n Second, Agents give you the ability to inspect the colony where they are placed as if the colony were your own. "
 RUS: "Случайным образом внедряет агента на вражескую колонию, что дает определенные выгоды. \n \n Во-первых, агент дает вам дополнительный 10% бонус к эффективности ваших инвестиций в шпионаж. Чем больше агентов работает на вас, тем легче будет их внедрять. \n \n Во-вторых, внедренные агенты позволяют вам просматривать вражеские колонии, в которых они шпионят, как если бы эти колонии принадлежали вам. "
 SPA: "Sitúa aleatoriamente a un agente en una colonia enemiga, lo que supone varias ventajas importantes. \n \n La principal es que el agente aumenta un 10% extra la eficacia de tu inversión en espionaje. Cuantos más agentes tengas, más rápido podrás infiltrarte y obtener información sobre los rivales. \n \n Otra importante ventaja es que los agentes te permiten inspeccionar la colonia en la que están como si fuera una de las tuyas. "
 UKR: "Випадковим чином розміщує агента у ворожій колонії, надаючи кілька ключових переваг. \n \n Найголовніше, агент дає вам додаткові 10% до ефективності ваших інвестицій у шпигунство. Чим більше у вас агентів, тим швидше ви зможете отримати розвідувальну інформацію. \n \n По-друге, агенти дають вам можливість інспектувати колонію, в якій вони розміщені, так, ніби це ваша власна колонія."
 PTB: "Coloca aleatoriamente um Agente em uma colônia inimiga, fornecendo vários benefícios importantes. \n \n Mais importante: o Agente concede 10% adicionais à eficácia dos seus investimentos em espionagem. Quanto mais Agentes você tiver, mais rápido conseguirá obter penetração de inteligência. \n \n Segundo: Agentes dão a você a capacidade de inspecionar a colônia onde estão posicionados como se ela fosse sua. "
