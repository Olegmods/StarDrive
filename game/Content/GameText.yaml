ShipWillRotateSoThat:
 Id: 201
 ENG: "Maximum Range: \n\nShip will rotate so that forward-firing weapons are facing its target. \nIf in a fleet, it will attempt to maintain formation. If not, ship will maneuver to within maximum weapons range. \nIf a carrier the ship will use the Carrier Hangar range."
 RUS: "Корабль будет разворачиваться таким образом, чтобы носовые оружия смотрели на цель. В составе флота корабль будет пытаться сохранять построение.В остальных случаях корабль будет маневрировать на максимальной дистанции стрельбы"
 SPA: "La nave girará de modo que las armas frontales sigan apuntando al objetivo. Si está en una flota, intentará mantener la formación. Si no lo está, maniobrará para que el radio de alcance de las armas sea el máximo"
 UKR: "Максимальна дальність: \n\nКорабель буде обертатись, щоб фронтальна зброя була направлена на ціль \nЯкщо у флоті, буде підтримувати формацію. Якщо ж ні - буде маневрувати на максимальній дальності зброї \nЯкщо корабель є носієм, він буде використовувати дальність ангарів"
 PTB: "Alcance Máximo: \n\nA nave girará para que as armas de disparo frontal fiquem apontadas para o alvo. \nSe estiver em uma frota, tentará manter a formação. Se não estiver, a nave manobrará até ficar dentro do alcance máximo das armas. \nSe for um porta-aeronaves, a nave usará o alcance do Hangar de Caças."
ShipWillManeuverToKeep:
 Id: 202
 ENG: "Ship will maneuver to keep its target on the port side"
 RUS: "Корабль будет пытаться развернуться к цели левым бортом"
 SPA: "La nave maniobrará para mantener el objetivo a babor"
 UKR: "Корабель маневруватиме, щоб тримати ціль по лівому борту"
 PTB: "A nave manobrará para manter o alvo a bombordo"
ShipWillManeuverToKeep2:
