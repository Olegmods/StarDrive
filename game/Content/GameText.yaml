 PTB: "Abre um painel exibindo todas as tropas que você possui em órbita, estejam elas em transportes ou não. Se esta for sua colônia e você tiver um porto espacial, tropas guarnecidas em naves (mesmo que essas naves não tenham baías de assalto) também serão exibidas aqui. Você pode arrastar uma tropa desta lista para os espaços disponíveis para pousá-la ou simplesmente dar dois cliques nela para pousá-la em um espaço aleatório."
