ImproveTracking:
 Id: 1460
 ENG: "Improve target tracking by adding more systems with FCS Target Tracking power such as control systems, or try to group your weapons to face similar directions."
 RUS: "Улучшеное отслеживание целей, добавляет больше Сис.Наведения огня, таких как системы управления огнем.Групирует оружие так что оно сосредоточено в одном направлении."
 UKR: "Покращіть відстеження цілей, додавши більше систем з функцією відстеження цілей СКВ, наприклад, системи керування, або спробуйте згрупувати зброю так, щоб вона була спрямована у схожих напрямках."
 PTB: "Melhore o rastreamento de alvo adicionando mais sistemas com poder de Rastreamento de Alvo FCS, como sistemas de controle, ou tente agrupar suas armas para ficarem voltadas em direções semelhantes."
