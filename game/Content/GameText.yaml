 RUS: "Эти модули взрываются при уничтожении, вызрыв повреждает ближайшие модули. Радиус будет уменьшаться, поскольку расположенные поблизости модули поглощают взрыв. Номер указан в виде ячеек. Таким образом, радиус 4 означает, что центр взрыва будет затронут примерно 4 ячейками."
