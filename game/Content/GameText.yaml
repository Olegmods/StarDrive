ThisSimpleStructureIsUsed:
 Id: 18049
 ENG: "This simple structure is used as a \"filler\" for ships which do not require more module functionality"
 RUS: "Эта простая структура используется в качестве \"наполнителя\" для кораблей, которым не требуется дополнительная функциональность модуля."
 UKR: "Ця проста структура використовується як \"наповнювач\" для кораблів, які не потребують більшої функціональності модуля"
