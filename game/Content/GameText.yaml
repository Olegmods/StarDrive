ReactorsAreTheBeatingHearts:
 Id: 1003
 ENG: "Reactors are the beating hearts of spaceships.  This basic fission model provides a moderate level of power output and power storage. Explodes when destroyed. "
 RUS: "Реактор - это бьющееся сердце космического корабля. Базовая модель, основанная на расщеплении ядерного топлива, предоставляет средний уровень энергоснабжения. Будучи уничтоженным, реактор взрывается."
 SPA: "Los reactores son el corazón vivo de las naves espaciales.  Este modelo de fisión básico proporciona un nivel moderado de generación y almacenamiento de energía. Explota al ser destruido. "
 UKR: "Реактори - це серця космічних кораблів.  Ця базова модель поділу забезпечує помірний рівень вихідної потужності та зберігання енергії. Вибухає при руйнуванні."
 PTB: "Reatores são o coração das espaçonaves. Este modelo básico de fissão fornece um nível moderado de geração e armazenamento de energia. Explode quando destruído. "
