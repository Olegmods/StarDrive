 RUS: "Обычно, когда вы вручную добавляете здание в очередь строительства колонии, вы получаете уведомление, когда оно будет завершено. Вы можете отключить эти уведомления."
 UKR: " Зазвичай, коли ви вручну додаєте будівлю до черги на будівництво колонії, ви отримаєте сповіщення про її завершення. Ви можете вимкнути ці сповіщення, якщо ви будуєте більшість будівель вручну."
 PTB: " Normalmente, quando você adiciona manualmente um edifício à fila de construção da colônia, será notificado quando ele for concluído. Você pode desativar essas notificações se costuma construir manualmente a maioria dos seus edifícios."
