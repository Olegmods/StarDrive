TheTimcorpPhalanxPointDefense:
 Id: 2248
 ENG: "The TimCorp Phalanx Point Defense Cannon is a short range, rapid-fire chaingun capable of shredding incoming missiles. However, the fletchettes fired by this weapon are not suitable as anti-ship weaponry. The Phalanx is programmed only to fire upon incoming missiles and torpedoes. "
 RUS: "Пушка точечной защиты \"Фаланга\" представляет собой скорострельный пулемет ближней дальности, способный превращать вражеские ракеты буквально в решето. Однако снаряды, используемые \"Фалангой\" в качестве боеприпасов, непригодны для ведения огня по кораблям, поэтому это орудие запрограммировано только на уничтожение ракет и торпед."
 SPA: "El cañón de defensa puntual de falange tiene un corto alcance y una rápida cadencia de disparo para interceptar misiles enemigos. Sin embargo, los proyectiles disparados con esta arma no sirven para atacar a otras naves. Por tanto, la falange está programada únicamente para neutralizar misiles y torpedos de impacto inminente. "
 UKR: "Зенітна гармата TimCorp Phalanx Point Defense - це скорострільний кулемет з малою дальністю стрільби, здатний подрібнювати ракети, що летять на кораблі. Однак, флетчети, що випускаються цією зброєю, не придатні для використання як протикорабельна зброя. Фаланга запрограмована лише на вогонь по ракетах і торпедах."
 PTB: "O Canhão de Defesa de Ponto Phalanx da TimCorp é uma metralhadora giratória de curto alcance e disparo rápido, capaz de despedaçar mísseis em aproximação. No entanto, as flechettes disparadas por esta arma não são adequadas como armamento antinave. O Phalanx é programado apenas para disparar contra mísseis e torpedos em aproximação."
