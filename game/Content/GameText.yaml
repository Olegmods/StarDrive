 Id: 2198
 ENG: "Execute this mission for the indicated cost. Your chance of success (or failure) depends on the level of your agent and the difficulty of the task being undertaken. Defending Agents will also have a chance to foil your mission.\nTraining is not possible for Agents Level 3 or above/"
 RUS: "Выполнить это задание за указанную стоимость. Вероятность вашего успеха (или неудачи) зависит от уровня вашего агента и сложности поставленной перед ним задачи. Вражеские агенты контрразведки также с определенной вероятностью могут сорвать вашу миссию.\nОбучение невозможно для агентов 3 уровня и выше."
 SPA: "Ejecuta esta misión por el coste indicado. Tus probabilidades de éxito (o de fracaso) dependen del nivel de tu agente y de la dificultad de la tarea asignada. Los agentes de defensa también tienen ocasión de frustrar la misión."
