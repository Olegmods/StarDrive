 RUS: "Орудийные батареи стреляю стандартными снарядами и предоставляют планете значительную дополнительную защиту. Во-первых, они гарантированно наносят 1 ед. урона всем высадившимся на планету вражеским войскам. Во-вторых, они выполняют роль оборонительных отрядов при наземных вторжениях, нанося средний урон защищенным целям."
