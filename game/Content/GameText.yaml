AsYourForcesApproachThe:
 Id: 1809
 ENG: "As your forces approach the downed vessel, they note that it is in surprisingly excellent shape. They are able to breach the hull through an airlock and they begin to explore the ship. They report finding an extremely odd piece of equipment in what they assume to be the engineering room. They take the equipment and leave. However, their presence has not gone unnoticed! Indigenous carnivores are attacking!"
 RUS: "Когда ваши отряды подошли к упавшему кораблю, они сразу обратили внимание, что тот находится в удивительно приличном состоянии. Они смогли проникнуть внутрь через воздушный шлюз и начали осмотр корабля. Они сообщили, что нашли какой-то очень странный объект в инженерном отсеке (как им показалось). Они забрали его и покинули корабль, однако их присутствие не осталось незамеченным! На них напали местные хищники!"
 SPA: "Cuando tus fuerzas se acercan a una nave estrellada, descubren con asombro que se encuentra en excelentes condiciones. Son capaces de adentrarse en el casco a través de una esclusa y comienzan a explorar su interior. Informan de que han descubierto un equipo sumamente extraño en lo que creen que es la sala de ingeniería. Cogen el equipo y se marchan. Sin embargo, ¡su presencia no ha pasado desapercibida! ¡Les atacan indígenas carnívoros!"
 UKR: "Коли ваші війська наближаються до збитого корабля, вони помічають, що він знаходиться в напрочуд гарній формі. Їм вдається проникнути в корпус через шлюз і вони починають досліджувати корабель. Вони повідомляють, що знайшли надзвичайно дивне обладнання в тому місці, яке, на їхню думку, було інженерним відсіком. Вони забирають обладнання і йдуть геть. Однак їхня присутність не залишилася непоміченою! Місцеві хижаки атакують!"
 PTB: "Quando suas forças se aproximam da nave abatida, percebem que ela está em estado surpreendentemente excelente. Elas conseguem atravessar o casco por uma eclusa de ar e começam a explorar a nave. Relatam ter encontrado um equipamento extremamente estranho no que acreditam ser a sala de engenharia. Elas pegam o equipamento e partem. No entanto, sua presença não passou despercebida! Carnívoros nativos estão atacando!"
AsYourForcesApproachThe2:
 Id: 1810
 ENG: "As your forces approach the downed vessel, they note that it is in surprisingly excellent shape. A weapon module extends out of the wreckage and they are able to detach it for further examination. They find nothing of interest in the rest of the ship. However, their presence has not gone unnoticed! Indigenous carnivores are attacking!"
 RUS: "Когда ваши отряды подошли к упавшему кораблю, они сразу обратили внимание, что тот находится в удивительно приличном состоянии. Среди обломков они обнаружили оружейный модуль и смогли снять его. В остальной части корабля они не нашли ничего интересного. Однако их присутствие не осталось незамеченным! На них напали местные хищники!"
 SPA: "Cuando tus fuerzas se acercan a una nave estrellada, descubren con asombro que se encuentra en excelentes condiciones. Del naufragio sobresale un módulo de armas que son capaces de desmantelar para examinarlo con más detenimiento. No hallan nada en el resto de la nave. Sin embargo, ¡su presencia no ha pasado desapercibida! ¡Les atacan indígenas carnívoros!"
 UKR: "Коли ваші війська наближаються до збитого судна, вони помічають, що воно перебуває у напрочуд гарній формі. З уламків висувається модуль озброєння, і вони можуть від'єднати його для подальшого вивчення. У решті корабля вони не знаходять нічого цікавого. Однак їхня присутність не залишилася непоміченою! Місцеві хижаки атакують!"
 PTB: "Quando suas forças se aproximam da nave abatida, percebem que ela está em estado surpreendentemente excelente. Um módulo de arma se projeta para fora dos destroços, e elas conseguem removê-lo para análise posterior. Não encontram nada de interesse no restante da nave. No entanto, sua presença não passou despercebida! Carnívoros nativos estão atacando!"
