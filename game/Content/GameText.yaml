CornersIsARaceMatch:
 Id: 4103
 ENG: "Corners is a 4 race match similar to a sandbox game, except the map is divided into quarters, with 1 faction in each quarter, offering clear boundaries between regions of space. Defend your territory at all costs!"
 RUS: "Углы - это матч для 4 рас, похожий на игру в песочнице, за исключением того, что галактика розделена на части, по одной фракции в каждой четверти, это обеспечивает четкие границы между областями пространства. Защитите свою территорию любой ценой!"
 SPA: "El modo de juego de esquinas es un juego de 4 razas similiar al modo sandbox, except excepto que el mapa esta dividio en cuartetos, con una facción en cada esquina, Ofreciendo una vista territorial clara entre imperios. ¡Defiende tu territorio a cualquier coste!"
 UKR: "Кути - це матч на 4 раси, схожий на гру в пісочницю, за винятком того, що карта розділена на квартали, з 1 фракцією в кожному кварталі, пропонуючи чіткі межі між регіонами простору. Захистіть свою територію за будь-яку ціну!"
 PTB: "Cantos é uma partida de 4 raças semelhante a um jogo sandbox, exceto que o mapa é dividido em quartos, com 1 facção em cada quarto, oferecendo fronteiras claras entre regiões do espaço. Defenda seu território a qualquer custo!"
