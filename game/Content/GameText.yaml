 RUS: "Корабль всегда будет стараться сохранять построение  и направление на цель"
 SPA: "La nave intentará mantener la formación y la orientación en todo momento"
 UKR: "Корабель намагатиметься зберігати стрій та напрямок руху весь час"
 PTB: "A nave tentará manter a formação e a orientação o tempo todo"
AMeasureOfHowCooperative:
 Id: 206
 ENG: "A measure of how cooperative a ship is; the weight given to targeting ships that are being targeted by allies"
 RUS: "Показатель того, насколько синергично корабль действует в составе флота; вес выбора целями вражеских кораблей, атакуемых союзниками"
 SPA: "Medida de lo cooperativa que es una nave; valor específico dado para apuntar a las naves que disparan a los aliados"
 UKR: "Показник того, наскільки корабель готовий до співпраці; вага, надана при націленні на кораблі, які є цілями союзників."
 PTB: "Uma medida de quão cooperativa uma nave é; o peso dado para mirar em naves que estão sendo alvejadas por aliados"
AMeasureOfHowProtective:
 Id: 207
 ENG: "A measure of how protective a ship is; the weight given to targeting ships that are targeting friendly ships"
 RUS: "Показатель того, насколько оборонительно действует корабль.Вес выбора целями вражеских кораблей, атакующих союзников"
 SPA: "Medida de lo protectora que es una nave; valor específico dado para apuntar a las naves que están disparando a naves amigas"
 UKR: "Показник того, наскільки захисним є судно; вага, яка надається націлюванням на кораблі, які атакують союзні кораблі"
 PTB: "Uma medida de quão protetora uma nave é; o peso dado para mirar em naves que estão mirando em naves aliadas"
AMeasureOfHowOpportunistic:
 Id: 208
 ENG: "A measure of how opportunistic a ship is; the weight given to targeting ships that are damaged"
 RUS: "Показатель того, насколько корабль нацелен на добивание.Вес выбора целями вражеских кораблей, получивших повреждения"
 SPA: "Medida de lo oportunista que es una nave; valor específico dado parar apuntar a las naves que están dañadas"
